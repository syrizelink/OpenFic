appId: com.openfic.app
productName: OpenFic

directories:
  output: ../dist-electron

# Electron 壳仅需 main 进程；前端由 PyInstaller 后端托管，不打包 Farm 产物
files:
  - electron/main.cjs
  - package.json

# PyInstaller onedir 产物作为额外资源打入安装包
extraResources:
  - from: ../backend/dist/openfic-server
    to: openfic-server
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
      artifactName: OpenFic-${version}-win-setup.${ext}
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  # 首版不做签名公证
  identity: null

# 版本号由 CI 从 pyproject.toml 同步写入 package.json
