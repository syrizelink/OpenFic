id: builtin-skill--story-quality
name: 网文质量审查
summary: 按完整 Rubric 和检查清单审查用户提供的章节、片段、剧情方案或故事设定，输出 PASS/WARN/FAIL、S1-S4 Findings、发布门槛和可执行修改方向。
is_enabled: true
content: |
  # 通用网文内容审查 Rubric 与完整检查清单

  用于审查用户当前会话提供的故事文本、章节、片段、剧情方案或设定。评估对象是故事文本质量，不是 Skill 或插件实现质量。只输出有原文或用户材料证据支持的问题；证据不足列入“证据不足”，不得当作 finding。审查不是改写，除非用户明确要求，不直接替用户重写正文。

  ## 一、审查流程

  1. 确认范围：章节、片段、剧情方案、设定；以及目标是故事效果、连贯性、人物、文字、格式、读者契约还是平台适配。
  2. 先读整体，再按核心卖点、冲突推进、任务卡点、情绪曲线、钩子、人物动机、对话、设定、因果、格式、关系和伏笔检查。
  3. 重点检查最小剧情循环：目标 → 阻碍 → 行动 → 反馈/代价 → 新期待。
  4. 检查高潮是否完成蓄能、假胜或加压、崩解、反转/兑现；平铺直给、无代价或无情绪落点要标出缺口。
  5. 每条 finding 必须含 `severity`、`category`、`location`、`evidence`、`issue`、`fix`；先列 S1/S2，再列 S3/S4。
  6. 建议必须具体到事件、顺序、角色选择、信息呈现或句子功能，不写“加强”“更自然”这类空话。
  7. 事实或一致性问题的 fix 只写统一事实、时间线、角色属性或因果方向，不借机提出无关文学创作建议。
  8. 若当前环境提供可执行检查脚本或工具，可以使用；若不可用，改为人工按本清单检查，不因工具不可用而跳过检查，也不虚报脚本结果。

  ## 二、PASS / WARN / FAIL Rubric

  每项按 PASS/WARN/FAIL 标记，再将 WARN/FAIL 转换为 Findings Schema：影响主线、角色动机、世界规则或读者信任为 S1；明显影响留存、节奏、章节效果或人物可信度为 S2；局部质量、格式、措辞或轻微节奏问题为 S3；风格建议或可选增强为 S4。

  | 维度 | PASS | WARN | FAIL |
  |---|---|---|---|
  | 核心卖点 | 章节围绕明确卖点推进，读者知道为什么继续看 | 卖点存在但表达弱或被支线稀释 | 看不出本章服务什么卖点或主线 |
  | 冲突推进 | 有明确冲突、阻碍、选择或代价 | 冲突较轻，推进感不足 | 主要是解释、闲聊、总结，无实际推进 |
  | 任务卡点 | 角色办事被卡住，并卡出信息、关系、代价、选择或伏笔变化 | 有卡点但变化偏弱，可压缩 | 卡点只是流程细节，删除不影响故事 |
  | 情绪曲线 | 有铺垫、升温、释放或反转 | 情绪有变化但节点不清 | 情绪平直或突兀转向 |
  | 钩子与期待 | 开头或结尾至少一处建立期待 | 钩子弱但仍有后续问题 | 没有悬念、目标或未完成期待 |
  | 角色动机 | 行为符合目标、性格、处境和关系压力 | 局部行为缺少铺垫 | 角色为推动剧情而失真 |
  | 对话质量 | 有潜台词、信息控制和角色差异 | 有信息堆叠或声音略同质 | 像说明书，人人同腔 |
  | 设定一致性 | 不违背既有规则、时间线和属性 | 有轻微模糊点需补证据 | 与已写设定或前文事实冲突 |
  | 文字自然度 | 具体、可感、动作承载信息 | 偶有套话或抽象总结 | AI 腔、陈词滥调、总结体明显 |
  | 格式可读性 | 按戏剧单元/镜头自然断开，对话独立，无多余空行，主语节奏自然 | 局部偏长、偏碎或主语重复 | 大段堆叠、机械切段、对话/叙述难读 |
  | 剧情循环 | 目标→阻碍→行动→代价/反馈→新期待清晰闭环 | 有循环但缺一环或反馈偏弱 | 无目标、无阻碍或无反馈，局势不变 |
  | 高潮构建 | 蓄能→假胜→崩解→反转/兑现有层次 | 有爆点但蓄能或兑现不足 | 平铺直给、无代价、无兑现或情绪落空 |
  | 关系进展 | 互动尺度匹配关系阶段，越界有铺垫 | 局部推进略快但可补证据 | 突然亲密、信任或敌对，关系跳变 |
  | 伏笔状态 | 埋设、状态和回收路径可追踪 | 伏笔偏密或偏疏但不影响理解 | 与设定冲突、断线或造成主线混乱 |

  ## 三、S1-S4、Findings Schema 与发布门槛

  ### 严重度

  | 严重度 | 定义 | 典型影响 |
  |---|---|---|
  | S1 | 破坏主线、人物动机、世界规则或读者信任 | 核心因果崩坏、主角被夺走核心选择、设定冲突 |
  | S2 | 明显影响留存、节奏、章节效果或人物可信度 | 章内无推进、高潮无兑现、钩子失效、动机缺铺垫 |
  | S3 | 局部质量、格式、措辞、轻微节奏或信息组织问题 | 可定位的句式、段落、信息顺序问题 |
  | S4 | 可改可不改的偏好项或风格微调 | 可选增强，不应阻塞发布 |

  ### Findings Schema

  ```yaml
  severity: S1 | S2 | S3 | S4
  category: 结构 | 人物 | 文字 | 设定 | 因果 | 格式 | 关系 | 读者契约 | 伏笔
  location: 原文位置、章节、段落或句子
  evidence: 支持判断的原文短引或明确材料事实
  issue: 具体描述发生了什么以及造成什么阅读后果
  fix: 具体可执行的事件、顺序、角色选择、信息呈现或句子功能调整
  ```

  Findings 必须按 S1、S2、S3、S4 排序；没有证据的判断不进入 Findings。`consistency`/`factual` 类问题的 fix 只写“统一事实、属性、时间线或因果”，不写泛化的文学建议。

  | 综合情况 | Verdict |
  |---|---|
  | 无 S1/S2，S3 可快速处理 | APPROVE |
  | 有 S2，或 S3 数量多且影响阅读 | CONCERNS |
  | 有 S1，或核心卖点、动机、规则崩坏 | REJECT |

  ### 黄金三问

  1. 读者为什么翻下一页？答不出，至少 S2。
  2. 本章改变了什么？情节、目标、风险、信息、关系、资源、身份或情绪立场至少改变一项；答不出，至少 S2。
  3. 哪个证据支持判断？没有原文证据的 finding 不输出，改为“证据不足”。

  ## 四、通用检查清单

  ### 章节结构

  - [ ] 开头有钩子，不是天气、风景或无功能日常开场。
  - [ ] 中段有推进；快节奏题材有可见事件，慢热题材有可见状态变化即可。
  - [ ] 局势发生变化，读完后世界、关系、信息或风险不同。
  - [ ] 结尾落在变化上，不是总结。

  ### 开篇检查：前 300-500 字

  - [ ] 有钩子，能抓住注意力。
  - [ ] 不从天气、风景或日常开始，除非日常本身就是卖点或异常。
  - [ ] 主角快速出场，或明确的代理冲突快速建立主角问题。
  - [ ] 卖点或危机可见。

  ### 章节推进

  - [ ] 本章至少改变目标、风险、信息、关系、资源、身份、情绪立场之一。
  - [ ] 快节奏/爽文有可见事件或爽点；慢热/情感文可用低压小变化达标，不强求每章高潮。
  - [ ] 不是水字数：删除本章会损失哪项状态变化？答不出才需压缩。
  - [ ] 任务卡点有用：卡住之后带来目标、风险、信息、关系、资源、身份或情绪变化。
  - [ ] 推进强弱符合本书已建立的题材、兑现节奏和对标，不套固定通用字数。

  ### 信息传递

  - [ ] 没有大段设定说明文。
  - [ ] 信息跟着冲突走，通过事件、选择、后果或对话传递设定。
  - [ ] 一章通常不超过 3 个新概念；超过时检查是否有消化、例证和冲突锚点。

  ### 场景检查

  - [ ] 场景有目标：人物要什么。
  - [ ] 场景有阻碍：什么挡着人物。
  - [ ] 场景有变化：结束后与开始不同。
  - [ ] 人物在做事情，而不是只感觉事情。
  - [ ] 没有可删除且不影响目标、冲突、信息、关系或情绪的段落。

  ### 章尾

  - [ ] 结尾落在变化上。
  - [ ] 至少有危机、决定、发现、反转中的一个。
  - [ ] 不是总结式结尾。
  - [ ] 拉住读者翻下一页；低压章可用阶段目标或小钩子，不强求强悬念。

  ### 语言与格式

  - [ ] 没有空洞抒情段落。
  - [ ] 没有连续多段同一情绪而无变化。
  - [ ] 对话符合人物身份，不同人物说话方式不同。
  - [ ] 标点节奏符合语气和声线，没有通篇句号化，也没有随机堆叠问号/感叹号。
  - [ ] 正文不残留不必要的省略号或破折号；迟疑、打断已用动作、短句、逗号或句号承载。
  - [ ] 情绪通过动作、选择和后果落地，不直接写“他很难过”作为唯一证据。
  - [ ] 标题行以外没有章节/写作元信息：不得出现“第 X 章”“上一章”“本章”“前文”“后文”“伏笔”“细纲”“读者”等元信息词，除非故事内确实讨论这些概念。

  ### 连载连续性

  - [ ] 没有遗忘之前的承诺或伏笔。
  - [ ] 没有突然塞入大量新设定。
  - [ ] 伏笔有推进、验证、误导或回收路径。
  - [ ] 故事引擎仍在运转。

  ### 水文检测

  - [ ] 全章对话有新信息、选择、关系变化或情绪后果。
  - [ ] 同一情绪没有连续 3 段以上只换说法重复。
  - [ ] 场景描写超过 500 字时仍推进剧情、信息、关系或氛围目标。
  - [ ] 回忆旧事带来新视角、证据或认知变化。
  - [ ] 连续 2 章以上无冲突时，确认是否为有功能的呼吸章；红线是连续两章压力级≤1或相邻章情绪趋同。
  - [ ] 删掉流程细节或任务卡点会损失状态变化；若不会，压缩或删除。

  ## 五、长篇专项

  ### 黄金三章检查

  - [ ] 第一章前 500 字有钩子。
  - [ ] 主角第一章出场，或核心代理冲突立即指向主角。
  - [ ] 第一章有事件，不是纯铺垫。
  - [ ] 第二章有升级，矛盾加深或代价扩大。
  - [ ] 第三章给出追读理由。
  - [ ] 前三章有至少 2 个可辨识爽点或情绪触动。
  - [ ] 世界观没有大段说明文。
  - [ ] 每章结尾有往下看的理由；低压/过场章可以是弱钩子或阶段目标。

  ### 节奏检查

  - [ ] 最近 5 章有明确进展。
  - [ ] 高压/推进章的爽点间隔没有超过约 5000 字；低压、关系或信息整理章单独判断。
  - [ ] 没有连续 2 章以上无冲突；呼吸章正常，但连续两章压力级≤1或情绪趋同需标记。
  - [ ] 一卷有章节定位高低层次，不是全程同一力度。
  - [ ] 低压与过场合计克制，参考不超过约 15%，并确认每章仍有小变化。

  ### 人物检查

  - [ ] 主角行为符合已建立的人设、目标和处境。
  - [ ] 配角有独立功能、选择或情绪，不只是工具人。
  - [ ] 反派逼格匹配当前阶段，能力和失败均有因果。

  ### 五维评分

  每项 0-100 分，并写证据与精修策略，不写“很好/一般”：

  1. 核心一致度：关键冲突、关键行动、人物动机前后一致。
  2. 表层重写度：句式和措辞足够原创，避免套路化表达。
  3. 格式一致度：戏剧单元、镜头、主语、角色名、对话和章节格式自然统一。
  4. 可读性：啰嗦、AI 腔、空泛总结、套路修辞、比喻堆叠和心理说明是否过量。
  5. 逻辑连贯：句段、设定、时间线、角色属性、因果链是否一致。

  #### 五维问题与修复表

  | 维度 | 问题 | 严重度参考 | 修复方向 |
  |---|---|---|---|
  | 核心一致度 | 动机突然改变无铺垫 | S1/S2 | 补触发事件或统一行动与动机 |
  | 核心一致度 | 核心冲突前后不一致 | S1 | 回溯统一冲突设定 |
  | 核心一致度 | 关键行动与性格矛盾 | S2 | 调整行动或补可见选择依据 |
  | 核心一致度 | 次要矛盾遗忘 | S3 | 回收或明确弱化 |
  | 表层重写度 | 照搬原句造成语气不自然 | S3 | 只在确有问题时改写，正常原句不动 |
  | 表层重写度 | 大量 AI 标志词 | S2/S3 | 换成具体动作、物件、声音和后果 |
  | 表层重写度 | 同一句式重复 | S3 | 变换表达方式，保留信息功能 |
  | 表层重写度 | 描写过于文学化 | S3 | 改为口语化或动作化 |
  | 格式一致度 | 机械按字数切段、主语过密 | S3 | 按戏剧单元重排，段首点名、段中代词/省略、转折再点名 |
  | 格式一致度 | 章节字数偏离目标 | S2 | 写作/大纲时回到细纲补情节点；已有正文去 AI 味不得新增剧情 |
  | 格式一致度 | 对话/描写格式混乱 | S3 | 统一格式 |
  | 可读性 | 空泛总结 | S3 | 删除，用行动或后果代替 |
  | 可读性 | 套路比喻 | S3 | 删除或换具体描述 |
  | 可读性 | 比喻堆叠 | S3 | 保留少数有叙事功能的比喻，其余改动作、物件、声音或后果 |
  | 可读性 | 情绪标签 | S3 | 改为行为表现 |
  | 可读性 | 连续 3 句以上心理独白 | S3 | 压缩为 1 句或转为对话/行动 |
  | 逻辑连贯 | 设定前后矛盾 | S1 | 查找并统一设定 |
  | 逻辑连贯 | 时间线错误 | S1/S2 | 标记时间线并修正 |
  | 逻辑连贯 | 角色信息不一致 | S2 | 建立角色档案对照并统一 |
  | 逻辑连贯 | 因果链断裂 | S2/S3 | 补充事件、选择或过渡证据 |

  精修策略：核心一致度低用 `rewrite`；字数或无意义卡点用 `compress`；AI 腔重用 `de_ai`；局部问题多用 `polish`。策略必须由 Findings 证据支持。

  ## 六、读者契约与终局储备双向审查

  审稿先问“无毒吗”，再问“好看吗”。无契约破坏不等于情绪兑现充分。风险分为契约安全、需补强、契约破坏：

  - [ ] 本章/本卷兑现开篇承诺，没有把核心卖点交给机构、配角或偶然性。
  - [ ] 主角代理权按因果权+结算权审查，而非按出场时长：谁决定事情为什么发生，谁作出不可替代的选择，谁承担或选择关键后果，核心收益/认可/权力结算给谁。
  - [ ] 配角可以执行局部动作，但不能无声夺走期待所有权。
  - [ ] 期待债被偿还，或延期并支付利息，没有被解释、流程或设定吞掉。
  - [ ] 本单元没有提前动用本阶段不该解锁的宿敌、真相、身份或金手指上限。
  - [ ] 没有让升级线逼近天花板而后面无台阶可接。
  - [ ] 高潮/兑现后允许短暂低压和小而可见的收益，不机械立即加危机。
  - [ ] 新元素支付换书债，没有逃避旧承诺。
  - [ ] 履约爽文/能力幻想中，主角没有反复以可避免的愚蠢制造灾难并由他人收拾。
  - [ ] 自愿让渡只有在“长期净收益为负 + 控制/因果权下降”同时出现时亮红灯；战略让步应显示更大控制、未来收益、权力或信息交换。
  - [ ] 删除安全解释后，情绪更强则优先保留事件和结果；保留风险情节应带来更强期待、代价或爽点。
  - [ ] 契约、代理权、期待债、终局储备互相支撑，而不是只做到“无毒”。

  ## 七、短篇专项

  ### 虐爽节奏

  理想分布：`虐1 → 虐2 → 虐3 → 爽1（小）→ 虐4 → 爽2（大）`。

  禁忌分布：连续虐而无爽点会造成流失；连续爽而无铺垫会造成爽感疲劳。检查每 300 字至少一个小冲突，虐点间隔不超过全文 30%，最大爽点位于全文 70%-85%，结尾必须有情绪落点。

  ### 对话密度

  | 指标 | 合格标准 | 警戒线 |
  |---|---|---|
  | 对话占全文比 | 45%-65% | <30% 太干，>75% 太水 |
  | 对话条数 | 12-18 条/千字 | <8 条缺交互，>25 条碎片化 |
  | 伤人性对话 | 虐文 35%-45%，爽文 20%-30% | 虐文<20%不够痛，爽文>40%太压抑 |

  ### 打脸/复仇主角冷静度

  - [ ] 主角有标志性冷静动作，例如端水杯、整理衣服、转笔；必须是文本中可见动作，不凭空要求。
  - [ ] 复仇文主角情绪失控最多 1 次且位于前 30%，除非文本已建立其他契约。
  - [ ] 反派比主角更歇斯底里，反差服务于爽感。
  - [ ] 主角台词平均比反派短约 30%-50%，短是力量效果而非硬规则。
  - [ ] 审判式对话至少 2 处：主角提问，对方自爆；没有时标记证据不足或对应缺口。

  ### 复仇/打脸证据链

  - [ ] 证据至少分 3 次揭露，不能一次全给。
  - [ ] 每个证据前文有铺垫。
  - [ ] 反派先得意再被打脸，形成先扬后抑。
  - [ ] 最终证据最致命，并改变全局认知。
  - [ ] 至少有 1 个主角提前布局的“定时炸弹”证据，若题材不适用则标记不适用而非硬套。

  ### 短篇毒点、代入、震惊、开头、结尾和期待速查

  | 检查项 | 标准 |
  |---|---|
  | 爽文不爽 | 金手指效果或主角能力展示清楚 |
  | 压制无目的 | 每次压制服务后续爆发 |
  | 反派结局与主角无关 | 反派结局应由主角行动或主角选择造成，除非文本契约明确另有设计 |
  | 经济/战力崩坏 | 设定前后一致，以普通人或已建立基准为锚 |
  | 女主/女配降智 | 正常人设可写，避免为套路强行降智 |
  | 期待长时间不满足 | 适时满足或引入有代价的新期待 |
  | 主角行为不可理解 | 补事件、信息或选择依据，确保可理解、可共鸣 |
  | 氛围被突兀梗破坏 | 氛围优先于突兀梗，乐子文除外 |
  | 钩子不回收 | 标为留白或遗漏，可能构成烂尾风险 |
  | 震惊分层 | 点→网→深度，不能只写单点震惊 |
  | 震惊阶梯 | 逐步上升，不是直线堆叠 |
  | 震惊广度 | 关系网有相应反应，不只主角独自知道 |
  | 前 50 字 | 有冲突或异常，不能只是背景铺垫 |
  | 前 100 字 | 读者知道核心矛盾 |
  | 开头情绪强度 | 参考 ≥7/10，按题材校正 |
  | 结尾具体 | 动作、对话或画面，禁止总结/反思 |
  | 结尾余韵 | 读者离开后仍有情绪或问题 |
  | 结尾强度 | 虐≥8，爽≥7，治愈≥6 |
  | 情绪对等释放 | 虐多少补多少，反派结局与主角行动有关 |
  | 期待管理 | 两长一短不断，核心卖点贯穿 |

  ## 八、最终输出模板

  - 审查范围：
  - 审查目标与题材定位：
  - 检查方式：自动检查可用 / 人工检查（说明不可用项）
  - 各维度状态：PASS / WARN / FAIL
  - 总体结论：APPROVE / CONCERNS / REJECT
  - Findings：
    - severity：S1 / S2 / S3 / S4
    - category：结构 / 人物 / 文字 / 设定 / 因果 / 格式 / 关系 / 读者契约 / 伏笔
    - location：
    - evidence：
    - issue：
    - fix：
  - 证据不足：
  - 未适用检查项及原因：
  - 长篇/短篇专项结果：
  - 优先修改顺序：先 S1，再 S2，再高收益 S3，S4 最后
references:
  - name: 通用审查标准与五维评分
    content: |
      黄金三问：读者为什么翻下一页？本章改变了什么？哪个证据支持判断？前两问答不出至少 S2，第三问答不出改为证据不足。

      章节至少改变目标、风险、信息、关系、资源、身份或情绪立场之一；快节奏题材应有可见事件，慢热题材可用低压变化。设定量可控，一章通常不超过3个新概念；信息跟着冲突走。场景必须有目标、阻碍、变化，人物在做事而不是只感觉。结尾落在变化、危机、决定、发现或反转上，不用总结。

      长篇前3章应完成钩子、主角、事件、升级和追读理由；低压章可用阶段目标弱钩子。章节字数、爽点间隔和压力级按本书定位与对标判断，不套固定门槛。文字检查空泛总结、套路比喻、比喻堆叠、情绪标签、大段心理和章节元信息。每个 finding 给证据、严重度和修复方向；设定或事实 finding 只给统一事实方向。
  - name: 严重度与发布门槛
    content: |
      S1：会破坏主线、人物动机、世界规则或读者信任。
      S2：明显影响留存、节奏、人物可信度或情绪兑现。
      S3：局部措辞、格式、节奏或信息组织问题。
      S4：可改可不改的偏好项或风格微调。

      APPROVE：无 S1/S2，S3 可快速处理。
      CONCERNS：有 S2，或 S3 数量多并影响阅读。
      REJECT：有 S1，或核心卖点、动机、规则崩坏。

      Findings Schema：每条必须包含 severity、category、location、evidence、issue、fix；先列 S1/S2，再列S3/S4。无证据不输出 finding。consistency/factual 类 fix 只写事实统一方向。
  - name: 网文质量检查清单
    content: |
      ### 通用检查

      章节结构：开头有钩子；中段有推进；局势有变化；结尾落在变化上。

      开篇前300-500字：有钩子；不从天气/风景/日常开始；主角快速出场；卖点或危机可见。

      章节推进：至少改变目标/风险/信息/关系/资源/身份/情绪立场之一；不是水字数；任务卡点带来状态变化；推进符合本书题材、兑现节奏和对标。

      信息：没有大段设定说明；信息跟着冲突走；一章不超过3个新概念。

      场景：有目标、阻碍、变化；人物在做事情；没有可删除段落。

      章尾：落在变化；有危机/决定/发现/反转至少一项；不是总结；拉住下一页。

      语言：没有空洞抒情；没有连续同一情绪；对话符合身份且有声线差异；标点符合语气；动作承载情绪；标题行外没有章节/写作元信息，除非是故事内真实语境。

      连载连续性：不遗忘承诺/伏笔；不突然塞大量设定；伏笔有推进；故事引擎运转。

      水文信号：全章对话无新信息；同一情绪写3段以上；场景超过500字不推进；回忆无新视角；连续2章无冲突；可删流程不损失状态变化。

      ### 长篇专项

      黄金三章：第一章前500字有钩子；主角第一章出场；第一章有事件；第二章升级；第三章有追读理由；前三章至少2个爽点或触动；无大段说明；每章结尾有理由继续。

      节奏：最近5章有进展；高压/推进章爽点间隔不超过约5000字；没有连续2章无冲突；一卷有高低层次；低压与过场合计克制，参考不超过约15%。

      人物：主角符合人设；配角有存在感；反派逼格匹配阶段。

      五维：核心一致度检查冲突、行动、动机；表层重写度检查句式、措辞和 AI 标志词；格式一致度检查段落、主语、对话和开头结尾；可读性检查啰嗦、总结、套路修辞、比喻堆叠、情绪标签和大段心理；逻辑连贯检查设定、时间线、角色信息和因果链。

      读者契约：开篇承诺是否兑现；主角是否保有因果权和结算权；期待债是否偿还或延期付息；是否提前动用终局底牌；收益和认可归属是否清楚；战略让步是否显示更大控制、未来收益、权力或信息交换；高潮后是否允许短暂低压与小收益；是否删除安全解释后情绪更强。

      ### 短篇专项

      理想节奏：虐1→虐2→虐3→爽1（小）→虐4→爽2（大）。禁忌是连续虐无爽或连续爽无铺垫。每300字至少1个小冲突；虐点间隔不超过全文30%；最大爽点在70%-85%；结尾有情绪落点。

      对话占比45%-65%，每千字12-18条；虐文伤人性对话35%-45%，爽文20%-30%。打脸/复仇文检查冷静动作、失控次数、反派歇斯底里、主角台词长度和至少2处审判式对话。证据至少分3次、有铺垫、反派先扬后抑、最后证据改变全局认知，并尽量有1个主角提前布局的证据。

      速查：金手指效果清楚；压制服务爆发；反派结局与主角行动有关；经济/战力一致；角色不为套路降智；期待及时满足或升级；主角行为可理解；氛围不被突兀梗破坏；钩子回收；震惊点→关系网→深层认知递进；前50字有冲突/异常；前100字知道核心矛盾；开头强度参考≥7；结尾具体、有余韵；虐结尾≥8、爽≥7、治愈≥6；核心卖点持续贯穿。
