  - name: 短篇拆解流程与节点规则
    content: |
      ## 短篇分析顺序

      故事核 → 结构 → 人物 → 情感线 → 写作手法 → 共鸣、爆点性、话题性 → 综合评估。每个阶段回答一个问题：故事核回答“这篇故事卖什么”；结构回答“如何布局”；人物回答“谁在推动故事”；情感线回答“读者情绪怎样被拉扯”；写作手法回答“怎样制造这种体验”；共鸣和爆点回答“为什么读者会传播或讨论”；综合评估回答“哪些功能结构可迁移”。

      禁止主观评价；从体验反推手法；核心维度深度优先；每个分析点必须有复用条件、迁移动作和风险边界。

      ## Stage 2

      识别章节或小节，记录标题和字数；提取设定、主题、核心行动三层故事核并合并为一句；写 200-500 字梗概；识别 POV 和叙事时间线；按功能划分 4-6 段，必须包含开端、发展、高潮、结局。

      情节点每 200-300 字一个，每节 3-8 个。全文目标：≤5000 字 15-25 个，5000-8000 字 25-40 个，8000-12000 字 35-55 个，>12000 字 45-60 个。节点只能使用情绪、信息、冲突、转折、对话、氛围六类。字段包括序号、类型、客观描述、原文引用≤300字、情绪类型和强度、全名人物、手法标记。

      ## Stage 3

      每节至少一个情绪节点，曲线节点至少 `max(5, 节数)`。输出起点、形态、极值、净变化、翻转次数和触发事件。爆点写铺垫、积累、延迟、释放、余波、印象；叠加爆点分表层和深层；多爆点写数量、递进或并列、间隔风险。逐节追踪核心期待、次级期待、已兑现、延期代价和新期待；不超过两节不制造新期待，不超过一节不推进核心期待。

      情绪强度只用 -9、-7、-5、-3、0、+3、+5、+7、+9。开头和结尾另用 1-10 绝对强度。

      ## Stage 4

      有传统反转时，至少两条线索，记录位置、误导方向、揭示方式、回看合理性、揭示百分比和铺放比。多重反转逐项写因果；删除任意一层后其他层仍成立，则标记堆砌。伏笔式反转比较初读和重读含义。无反转时拆恶行→报应→爽感，并区分主角设局自爆与反派自毁。

      至少分析五项手法：POV、对话、时间、信息、感官、句式、对比、意象物件、留白、专业技能武器化、倒计时、双视角、弹幕评论、反差萌。每项有位置、证据、效果、复用条件、风险边界。

      ## Stage 5

      有名字且有台词或推动剧情者必须提取；无名但反复出现至少两节且有功能者必须提取；群体称呼和无功能路人不提取。分类使用叙事角色轴（主人公、重要配角、功能人物）和行动角色轴（主动型、被动型、转变型）。字段包括性格、内在矛盾、关键台词、始→转→终弧线、功能标签。关系只从直接互动或明确情感描述中提取，状态变化写触发事件。

      开头检查前3句、前50字、前100字、钩子、强度、代入、信息密度、声音辨识度；结尾检查类型、绝对强度、情绪落点、余韵、传播欲、钩子回收和价值观；做首尾呼应表和钩子回收表。

  - name: 短篇情绪节奏与共鸣标准
    content: |
      ## 情绪强度

      | 值 | 含义 |
      |---:|---|
      | +9 | 极致爽感：打脸、碾压、终极反转、恶人伏法 |
      | +7 | 强烈满足：关键证据揭露、核心期待满足 |
      | +5 | 明显正面：小胜利、温情时刻 |
      | +3 | 轻微正面：小进展、日常温馨 |
      | 0 | 中性：过渡、铺垫 |
      | -3 | 轻微不适：小挫折、小委屈 |
      | -5 | 明显负面：羞辱、误解、威胁 |
      | -7 | 强烈虐感：抛弃、背叛、孩子受委屈 |
      | -9 | 极致虐感：生死威胁、信仰崩塌、灵魂碾压 |

      曲线形态：V形、倒V、波浪、阶梯上升、断崖下跌、压缩弹簧、双峰、混合型。双峰可同为虐，也可先解脱后通透；甜宠和喜剧全程正值时属于阶梯上升变体。

      ## 节奏

      事件密度标准 3-6/千字；对话密度 45%-65%；冲突密度 30%-50%；信息密度 20%-35%。连续两节冲突低于15%是节奏塌陷；连续三节高于60%是冲突过载；连续两节对话低于20%是对话荒漠；单节高于80%是对话泛滥；单节信息超过50%是信息洪峰；连续两节出现三层以上反转是反转过载，反转间隔参考至少800字。

      ## 九层共鸣

      情感、价值观、经历、社会现象、文化、普世价值、哲学思考、情感深度、人物深度。每层标记极强、强、中、弱、无。至少三层达到强或中，才可说具备传播潜力。情感共鸣是即时共情，情感深度共鸣是持续余韵；价值观共鸣是具体价值认同，普世价值共鸣是对自由、尊严、爱等共同追求的认同。

      ## 质量阈值

      节点覆盖≥90%；每个节点有情绪标记；写作手法≥5项；对话分析覆盖≥80%；有名人物提取100%；共鸣至少3层达到强或中；可复用结构至少3条且每条含手法、用法、适用场景。甜宠、喜剧、反差萌可将反转设计替换为反差萌浓度，将情感拉扯替换为甜度曲线，并写明原因。

  - name: 长篇章节原子提取与扩写表
    content: |
      ## 章节摘要

      每章用100-300字因果链概括，列出3-5个关键事件、出场人物、主题标签、章节基调和推进度。推进度可标大转折、日常过渡、铺垫伏笔。

      ## 原子节点密度

      目标为字数÷200到字数÷150，硬范围10-40。≤1000字仍拆足10个；3000字15-20个；5000字25-34个；8000字以上不超过40个。节点类型：转折点、信息揭示、冲突、解决、铺垫、行动、对话、状态变化。字段：序号、客观白描、引用≤400字、全名人物、地点、关键物品、相对时间。

      六律：绝对时序、客观白描、信息保真、高度浓缩、复合合并、客观事实。连续微动作服务同一戏剧目的时合并；禁止“展现实力”“感到心碎”等框架词。

      ## 关键信息与扩写技法

      每章至少一条，标准章2-5条；过渡章必须写维持的期待或冷却的情绪。表格字段：关键信息/剧情走向、原文如何扩写、扩写技法、读者情绪作用、可复用提醒。技法可用铺垫后置、反应层放大、信息差、对比锚点、延迟揭示、身体反应、小目标嵌套或其他。可复用提醒只能抽象情绪逻辑和功能位，不得复制专名、台词、独特设定或桥段。

      ## 角色轻量提取

      只记录新出场或本章有新发展者。major：台词≥3句，或推动主线，或有重要决策；supporting：台词1-2句，或参与互动但非核心；minor：被提及或有名无台词。轻量提及不做跨章合并，完整档案在聚合后建立。

  - name: 长篇框架与两步剧情聚合
    content: |
      ## 框架

      升级流按等级阶段聚合；复仇线按复仇对象和阶段聚合；日常或单元文按卷或单元聚合；多线交织按线索聚合并标记交叉点；蜕变成长按成长阶段聚合。依据概要、前三章和后三章；证据不全要标记。

      章节数对应剧情数量：<30章为3-6条，30-100章为5-15条，100-300章为10-25条，>300章为15-40条。偏差超过±30%重查粒度。自检覆盖率≥85%、粒度适当、四项独立性和数量范围。

      ## 第一步：大纲

      每条剧情大纲：标题≤15字；概要150-300字因果链；具体可衡量核心目标；具体冲突对象和事件；类型；主题≤3个；起止章节；铺垫、发展、高潮、收尾期。类型：主线、爱情、成长、复仇、寻宝、悬疑、战斗、权谋、修炼、危机、谜团、日常、其他。目标类型：获得型、解决型、创造型、探索型。

      ## 第二步：节点分配

      先按主题溯源和目标收集节点，再识别触发起点与完成或失败终点，随后按时序排列并验证覆盖，最后补充概要和结构分布。归属标准：主题相关、角色匹配、因果关系、目标导向、章节范围。

      剧情必须同时具备独立核心目标、独立主要冲突、相对独立角色群、独立叙事节奏。单事件过细，宏观成长过粗。共享章节超过50%时检查剧情与阶段混淆；两个独立目标不因人物相同而合并。

      ## 故事线

      故事线位于剧情之上，类型为主线、感情线、成长线、复仇线、夺宝线、冲突线、谜团线或其他。每条含标题、300-600字发展描述、主要人物、主题关键词、至少一个剧情、3-8个阶段。每阶段含核心冲突、关键角色及作用、能力/资源/地位演进、主题母题；独立追踪伏笔-回收链，标记并行、交织、依赖关系。

  - name: 长篇节奏与情绪模块
    content: |
      ## 节奏索引

      统一追踪关键信息推进、爽点循环、情绪触动点、爆发节奏。每条链写：信息进入视野 → 延迟/误导/验证 → 情绪爆发 → 余波/新钩子，并回指章节或节点。连续三章以上无触动点，必须解释小钩子、阶段目标、关系变化或信息推进怎样维持期待。

      ## 情绪模块卡

      先判断读者需求，再把具体剧情抽成情绪链和功能位。模块卡字段：读者需求、触发条件、铺垫、延迟、释放、余波、可替换项、不可照搬项、适用题材、风险边界、原文来源。来源采用 best-effort；没有把握就留空，不硬凑、不删模块。所有可复用项只写功能位和条件，禁止专名、独特事件顺序和标志性台词。

      桥段标签为可扩展种子，命中才标：都市/言情（打脸、扮猪吃虎、马甲掉落、先婚后爱、追妻火葬场、破镜重圆、替身、契约婚姻、萌宝助攻）；玄幻/修仙（废柴逆袭、越级战斗、夺宝、护短打脸、绝境翻盘、机缘逆天）；历史/种田（先知先觉、改变历史、科举经商崛起、攒钱起家、技能点亮）；悬疑/无限（信息差、反转打脸、规则怪谈、身份揭穿、复盘解谜）；系统流（任务奖励、签到、面板升级、强制任务、积分兑换）；重生/穿越（前世复仇、改命、身份调换、双重生、未卜先知）；世情/家庭（极品亲戚、婆媳争斗、偏心打脸、维权反击、自我觉醒）；直播/两界（直播整活、低调用资源、两界差价、围观震惊）。

  - name: 长篇角色实体与世界观关系
    content: |
      ## 一人一实体

      不同人物绝不合并；无法确定是否同一人时分开。proper_name 与 nickname 仅在同位说明、括号别名、上下文明确指代或明确改名且置信度≥0.85时合并。descriptor 和 title 永不触发合并。

      角色级别：主角 = 出现章节≥50%且推动主线且有完整成长；反派 = 与主角对立、推动核心冲突且有明确动机；核心配角 = 出现≥20%或推动重要支线或有独立人格成长；功能角色 = 出现<20%且作用有限。前期minor后期supporting要升级；重要导师和伙伴可因作用重要而列supporting。

      完整档案200-500字，按身份背景、核心经历、性格特质、能力特长、主要关系、成长轨迹排列。相互关联共同作用的金手指合并；完全独立能力来源才拆分。类型：system、space、rebirth、transmigration、special_physique、artifact、bloodline、other；没有金手指写无。

      世界观按类型、核心规则、特殊设定、力量体系、地理、势力、金手指记录。力量体系写名称、等级、晋升方式；地理写区域和关键地点；势力写门派、组织、家族、国家。没有文本证据时不补规模、数量和等级。

      关系从情节点提取，字段为角色A、角色B、关系类型、情感倾向、关系本质和建立过程。类型：家人、师徒、朋友、敌人、恋人、同事、上下级、商业、其他；倾向：正面、负面、中性、复杂。变化写章节、旧状态、新状态、触发事件、情感转变。间接关系标[推断]，第三方评价约0.7，共同出现约0.6；主要角色关系少于3条检查遗漏，多于10条检查误合并。

  - name: 长篇质量溯源与散落节点
    content: |
      ## 阈值

      归类置信度≥0.85；情节点覆盖率85%-95%；每章至少一条关键信息与扩写技法；剧情重叠率≤35%；模块来源best-effort。小体量单主线连续叙事覆盖率接近100%且散落接近0是正常情况，不为数字强拆。

      ## 事实溯源

      力量等级、数值、距离、属性、势力数量、谁说了什么、角色出场章节必须回指原文。摘要没有而原文也没有时写“原文未明确/节选未涉及”。坐骑等级不等于骑手等级，A台词不等于B台词，本章数字不等于相邻章数字。抽查设定、角色、剧情和报告中的硬事实，命中不到就改未知或删除。

      ## 孤立节点六步

      1. 孤立比例低于5%可标“少量散落，无需处理”。
      2. 收集所有未分配节点，任何节点不得丢弃。
      3. 按角色、地点、因果计算相关性：0.8-1.0强相关归入并标[孤立情节归入]；0.5-0.8中相关归入并标[低置信归入]；<0.5弱相关不强行归入。
      4. 弱相关按主题聚类，达到5个形成候选剧情并标[聚类生成]，不足5个不建条。
      5. 仍无法归类的按章节归档，写明原因。
      6. 覆盖率=(总数-散落数)/总数×100%。低于85%回到相关性归类并谨慎降低阈值；高于95%检查过度归并。

  - name: 长篇分块与跨块合并
    content: |
      只有当前会话无法容纳完整材料时分块。<50章按阶段整体；50-100章整体或智能分块；100-500章按5-8章；>500章按自然语义边界分50-200章，最多10块。每块覆盖全部章节且不重叠，输出块标题、起止章节、2-5个主题、2-5个关键事件、主角阶段。

      分块在转折、场景切换、时间跨越处切分，不在紧密剧情中间切。修仙/升级按境界或地图，都市按事件线和身份转变，历史按阶段或战役，玄幻按地图或势力，有卷部篇优先遵循原结构，无结构才均匀切。

      跨块只检查相邻块边界，必须同时满足同一核心事件或目标、主要人物相同、发展连续、不是两个独立因果事件。不合并不同目标、独立阶段、不同地图；不确定时保持独立。应合并同一竞选事件的准备和投票、同一次突破被切开的前后；不合并在办公室立足与竞选秘书、炼气与筑基、东域与中州。

  - name: 长篇拆文参考与题材实战
    content: |
      拆书六原则：有目的、有方法、拆出理论、摒弃好恶、扬长避短、拆自己真正需要的书。抽象五步：一句话概括、拆信息团、按上行/下行/转折归类、提取条件框架、用新素材填充。

      三幕：第一幕建立矛盾、主角/金手指、意外、拉扯和主线；第二幕进入新世界、遇更强对手、中点反转，下行后上行；第三幕收束线索、推到矛盾极限，以关键选择体现弧光，完成决战和主题落点。

      情绪拉扯工具：熟悉套路换人设；期待断掉后用新人物或事件续上；鄙视链、人际舞台、正反向传播制造打脸；复合型配角做主角白手套。倒计时可安排发现→观测→打捞→失败→坠落。卖点循环“小目标获利→资源投入主线→奖励→能力或身份升级→新地图对抗”，每轮必须更新地图、角色、冲突或情感细节。

      多线拆为事件节点、情绪链、事业线、感情线。感情线模板：相遇态度→关键转折→态度递进（厌恶→好奇→心动→沦陷）→引爆点。第一章可用小事件展示性格，日常用重复行为巩固标签，配角情绪要有转变。常见开篇链为被动入局→了解世界→困境→目标→展示能力→可见收获，但必须以文本实际顺序为准。

      题材对照：历史文看先知先觉和改变历史；军事文看国与国、信仰和意识形态；种田脑洞看密集小爽点和面板细节；直播流看目标、对抗、阶段性和正反馈；两界穿梭看低调用资源和时间尺度；重生流看前世被辜负、今生改命及爽点形式更新。对照标尺不能补充原文事实。

  - name: 统一节点与质量检查表
    content: |
      ## 节点表

      编号严格按时间顺序；短篇类型为情绪、信息、冲突、转折、对话、氛围，长篇类型为转折点、信息揭示、冲突、解决、铺垫、行动、对话、状态变化；客观描述只写发生了什么；短篇引用≤300字，长篇≤400字；人物写全名；地点、时间、物品有证据才写；补直接结果、功能、后续影响、情绪强度和手法标签。

      ## 短篇检查

      节点覆盖≥90%；每个节点有情绪；手法≥5项；对话覆盖≥80%；有名人物100%；故事核一句话完整；共鸣至少3层达到强或中；可复用结构≥3条。结构必须覆盖开端、发展、高潮、结局；爆点必须写铺垫、积累、延迟、释放、余波、印象；无反转时必须写报应设计。

      ## 长篇检查

      每章至少一条关键信息与扩写技法；节点有时序、客观描述和事实来源；剧情满足四项独立性；覆盖率、置信度、重叠率通过；故事线含阶段、角色、资源地位、伏笔回收和交织关系；情绪模块有读者需求、触发、铺垫、延迟、释放、余波、替换项和风险；角色别名有证据；关系变化有触发事件；散落节点不丢弃；硬事实可回指原文；文本未说明和证据不足单列。

      ## 复用边界

      可复用结构只抽象功能位、前置条件、动作、情绪机制和风险。禁止复制具体作品专名、原句、标志性台词、独特世界观、独特事件顺序和一对一桥段映射。

  - name: 故事拆解输出工作表
    content: |
      - 路由依据：长篇 / 短篇 / 灰区待确认
      - 文本范围、标题、字数、章节或小节边界：
      - 故事核：设定 / 主题 / 核心行动 / 一句话
      - 结构分段与字数占比：
      - 情节点：序号 / 类型 / 客观描述 / 引用 / 人物 / 地点 / 时间 / 物品 / 结果
      - 情绪曲线：起点 / 形态 / 极值 / 触发 / 余波 / 净变化 / 翻转
      - 期待与爆点：铺垫 / 积累 / 延迟 / 释放 / 余波 / 新期待
      - 反转或报应：线索 / 误导 / 揭示 / 回收 / 因果 / 主动或自毁
      - 写作手法：位置 / 证据 / 效果 / 可复用条件 / 风险边界
      - 人物与关系：双轴或级别 / 内在矛盾 / 弧线 / 功能 / 状态变化 / 别名证据
      - 长篇剧情：目标 / 冲突 / 角色群 / 范围 / 阶段 / 节点覆盖
      - 故事线与情绪模块：阶段 / 伏笔回收 / 交织关系 / 读者需求 / 功能位
      - 世界观：核心规则 / 特殊设定 / 力量 / 地理 / 势力 / 金手指
      - 事实待复核：
      - 散落节点和覆盖率：
      - 文本未说明：
      - 可复用结构：只写功能位和条件，不写专名、原句和独特桥段
