  - name: 原始反转设计工作手册
    content: |
      # 反转设计工具箱原始补充

      ## 反转类型的设置与揭示步骤

      ### 身份反转
      **触发条件**：角色真实身份与读者认知不同。

      **设置步骤**：
      1. 确定表面身份和隐藏身份。
      2. 通过行为细节泄露，禁止用叙述者直接说明。
      3. 回看至少埋 3 处暗示。

      **揭示步骤**：
      1. 用场景同时揭示身份和动机。
      2. 禁止让角色自说“其实我是 XX”。
      3. 选在读者最不期待揭示的时机。

      | 表面身份 | 隐藏身份 | 铺垫线索 |
      |----------|----------|----------|
      | 乖巧继女 | 幕后操控者 | 总在关键时刻“恰好”不在场 |
      | 热心邻居 | 伤害主角的人 | 对主角家里的布局太熟悉 |
      | 死去的恋人 | 还活着 | 遗物里有一件不该存在的东西 |
      | 陌生人 | 主角失忆前的至亲 | 叫出只有至亲才知道的小名 |

      示例铺排：铺垫 1（5%）邻居帮修水管，对水管走向异常熟悉；铺垫 2（25%）邻居随口提到主角家灯每天几点关；铺垫 3（50%）梦到有人站床前，醒来闻到烟味，而邻居抽烟；揭示（75%）监控里每晚站床前的人穿邻居的灰色外套。

      ### 视角反转
      **触发条件**：叙事者视角片面，真相从另一个角度完全不同。

      1. 确保所有叙述都是事实，但不是全部事实。
      2. 叙述者解读引导读者走错方向。
      3. 关键信息被合理地跳过或淡化。
      4. 叙述者自己真诚相信这套叙事，他不是在骗读者，自己也被骗了。

      揭示时引入另一角色视角或证词，展示主角没看到的场景，用证据打破认知。

      | 主角视角 | 真实视角 | 关键差异 |
      |----------|----------|----------|
      | 丈夫出轨对不起我 | 我才是被蒙在鼓里的第三者 | 时间线上的空白 |
      | 同事在排挤我 | 我的好心一直在伤害别人 | 别人视角下我的行为 |
      | 我在拯救这段关系 | 我在控制对方 | 对方的反应其实是在自保 |
      | 我是受害者 | 我是施害者 | 记忆被叙述者篡改了 |

      ### 动机反转
      先给合理的表面动机，将真正动机藏在表面之下，并埋下轻微矛盾。高压场景迫使角色二选一：表面动机指向 A，但角色选择 B，选择行为直接暴露真正动机。

      | 表面动机 | 真正动机 | 行为矛盾线索 |
      |----------|----------|-------------|
      | 想和前夫复婚 | 想拿回藏在婚房里的东西 | 从不关心他的生活，只关心房子 |
      | 保护妹妹 | 嫉妒妹妹，想控制她 | 每次保护都让妹妹更孤立 |
      | 追求公平正义 | 报个人私仇 | 目标人物恰好和当年的事有关 |
      | 害怕失去朋友 | 害怕朋友发现自己背叛她 | 每次朋友接近真相就制造危机 |

      ### 时间线反转
      先确定真实时间顺序和读者理解的顺序，用叙述技巧让读者以为 A 在 B 之前，实际 B 在 A 之前。不撒谎，只调整叙述顺序；使用时态、季节、物品新旧作为天然线索。揭示可寻找不可能存在的时间矛盾、尚未发生的事件或与时间线不符的物品状态。写完必须画时间线图自查。

      | 读者以为的时间线 | 真实时间线 | 揭示方式 |
      |------------------|-----------|----------|
      | 丈夫丧妻后变质 | 妻子“死后”还活着 | 时间戳对不上的消息 |
      | 姐姐在弟弟出事后崩溃 | 弟弟出事因姐姐先做了某事 | 医院记录上的时间 |
      | 两人正在恋爱 | 这是一段回忆，已分开 | “我当时不知道那是最后一次” |
      | 重生后第二天 | 重生前的最后一天循环 | 镜子里倒影和之前不一样 |

      ### 信息反转
      给读者来自可靠来源的事实，让所有人物据此行动，再在后果中埋矛盾证据。新证据直接否定旧事实，读者和主角同时发现被骗，前面剧情获得新解读。核心是一条假信息。

      | 错误信息 | 真实信息 | 揭示的连锁反应 |
      |----------|----------|---------------|
      | 遗嘱遗产给长子 | 遗嘱被调包，本给次子 | 长子的孝心都是演戏 |
      | 医生说孩子亲生 | DNA 报告被篡改 | 配偶从受害者变加害者 |
      | 朋友说看到他出轨 | 朋友在撒谎 | 朋友的安慰其实是操控 |
      | 老板说提拔我 | 岗位已取消 | 老板画饼只是让我多干活 |

      ### 认知反转
      重点不是纠正一条事实，而是翻转读者对整个人物或关系的感情判断。全程积累一种感情色彩，每个负面场景埋一个小而容易忽略的反向细节，揭示时用一个场景或遗物让负面行为同时获得反向解释，不替读者长篇总结。

      | 全程认知 | 翻转后认知 | 反向细节铺垫 |
      |----------|-----------|-------------|
      | 后妈刻薄赶我走 | 她怕仇家牵连我 | 每次骂完都往我包里塞钱 |
      | 丈夫冷漠不管家 | 他在外面替我扛了所有债 | 深夜应酬电话都是催债 |
      | 师父偏心打压我 | 他知道我会被盯上 | 每次罚我都安排在别人看得见的地方 |

      追妻火葬场、世情常用的主力反转，是男主、婆婆或亲人全程被恨，结尾翻成原来一直在爱或保护，意难平拉满。

      ### 无反转
      甜宠、喜剧、反差萌、报应型复仇或重生故事本就可能没有传统反转。报应型的爽点是反派逐步毁灭和每条恶行精确对应一条报应；甜宠型的爽点是关系密集升温，每节给一个甜点或反差点。不为显得有设计感硬加反转。

      ## 嵌套反转详细执行

      双层结构：读者以为 A，第一层反转其实是 B，给读者 1-2 段消化时间，第二层揭示 B 也是假的其实是 C。第二层必须同时解释 A 和 B，比第一层更震撼。

      示例：丈夫出轨，妻子收集证据准备离婚；第一层（70%）丈夫没出轨，那女人是他的线人，他在调查妻子的公司；第二层（90%）妻子公司确实有问题，举报人却是妻子自己，丈夫只是被引导发现，她故意让丈夫发现，只有丈夫“不经意”揭发她才能拿到保险赔偿。

      三层结构只适合 15000 字以上的高智商悬疑或精心设计的复仇：第一层 50-60%，第二层 75-80%，第三层 90-95%；第三层最短最狠，一句话也可以，且必须回答前面所有疑问，每层都要有情感冲击。

      ## 时机铁律

      - 禁止在 50% 之前揭示，除非揭示后的新冲突足够强。
      - 禁止在 95% 之后揭示，揭示后没有展开空间。
      - 最优区间为 70-85%。
      - 双反转可安排第一层 55-65%，第二层 80-90%。

      ## 误导与自检补充

      - 加法路径：在真实信息上叠加假信息；线索既能用常见逻辑解释为误导方向，也能用真实逻辑解释为真相，误导成立时同步暗埋真相线索。
      - 减法路径：不添加假信息，只隐藏关键信息的一部分，只让主角得知成功的一半。
      - 选择性叙述：主角只关注某些信息，读者跟着他的注意力走。
      - 情绪引导：用温暖或残酷场景引导判断，再改变情绪含义。
      - 红鲱鱼：可疑角色或事件必须推进情节或增加趣味，不能只是废线。
      - 刻板印象利用：利用社会认知偏见制造误判，例如强势婆婆其实在保护儿媳。
      - 信息分层：把真相和假信息混在一起，其中一部分是真的，另一部分负责误导。

      | 错误 | 问题 | 修正 |
      |------|------|------|
      | 天降反转 | 前面完全没铺垫 | 至少埋 3 条线索 |
      | 解释过多 | 大段文字解释反转 | 用行动或场景让读者自己明白 |
      | 反转太弱 | 读者早就猜到 | 加误导或换类型 |
      | 反转太多 | 3 个以上反转互相削弱 | 砍到 1-2 个做到极致 |
      | 反转无感 | 只改变信息没改变情绪 | 同时改变读者情感判断 |
      | 反转作弊 | 引入前面不存在的信息 | 所有要素前置出现 |

      ## 反转揭示后验收

      - [ ] 回看铺垫至少有 3 处暗示指向反转。
      - [ ] 反转由角色选择推动，不依赖巧合。
      - [ ] 没有引入前文完全没提过的决定性信息。
      - [ ] 反转后情绪强度高于反转前。
      - [ ] 读者会重新理解前面剧情并产生回看冲动。
      - [ ] 读者在反转前有可能猜到，但不要求一定猜到。
      - [ ] 没有对读者撒谎，只是没有说出全部真相。
      - [ ] 揭示通过行动、场景或证据完成，不靠大段解释。
      - [ ] 揭示快速、干脆，建议不超过 300 字。
      - [ ] 揭示后有足够篇幅展示影响。
      - [ ] 结尾落在反转产生的情绪上。

      ## 打脸的深层节奏

      | 方式 | 特点 | 适用场景 |
      |------|------|----------|
      | 主动挑衅后打脸 | 简单粗暴 | 小白文最常见 |
      | 对手挑衅后被打脸 | 压主角，同时给读者安全感和反击暗示 | 需要积蓄仇恨时 |
      | 借他人之手打脸 | 支持者代为回击，不损主角形象 | 保持主角高逼格时 |

      - 压抑不能太长，连输 8 场写 3 万字不可取，应改成连输 4 场加略写。
      - 压制的同时必须给读者信心暗示，例如主角自信到近乎自大的话：“我们还是联赛前四！”
      - 比起主角被欺负，读者更厌恶主角自暴自弃。
      - 高潮部分要拉长，最大化利用球迷反应、解说员和赛后跟进。
      - 大高潮不要险胜，充分铺垫后应尽情碾压，干净利落地大胜。

      ## 高潮间过渡

      升级练功也有爽点，但大爽点落在升级后的打脸，读者期待的是升级后的兑现。过渡段可以给小而可见的能力、资源、关系或信息收益，让下一次高潮拥有新的期待基础。

      ## 情绪拉扯与打脸

      1. 展示物品或能力强大，期待 +1。
      2. 配角因信息差认为鸡肋，打脸期待 +1。
      3. 展示反派特性恰好被克制，期待 +1。
      4. 配角拿更强装备失败，期待 +1。
      5. 众人看衰主角，期待继续累积。
      6. 主角秒杀或完成压制，期待满足。
      7. 众人震惊，配角马后炮分析，情绪完成释放。
      8. 新一轮收获产生新期待。

      打脸有三种：主动挑衅后打脸；对手挑衅、主角承压后打脸；借他人之手局部回击但核心高光归主角。压抑不能太长，压制中要给读者主角能翻盘的信心，大高潮应充分铺垫后干净兑现，不能依赖险胜拖延。

      ## 特殊反转技法

      ### 虚晃一枪反转法
      先给出“应该不会发生”的预期让读者放松，然后意外以反转形式发生，类似鬼片推开门什么都没有，松口气后回头撞鬼。

      ### 超额收获反转
      反转后收获超出预期，产生二次惊喜。短篇中，主角以为只解决一个问题，结果连带解决隐藏的更大问题；网游文可让 Boss 爆出三样东西：立刻能用的、送人拉关系的、暂时用不到但一看很厉害的。

      ### 反转工作表
      ```
      读者当前相信的结论 A：
      角色当前相信的结论：
      真实结论 B：
      反转类型：身份 / 视角 / 动机 / 时间线 / 信息 / 认知 / 无反转
      前置线索 1：正读意义 / 回看意义
      前置线索 2：正读意义 / 回看意义
      前置线索 3：正读意义 / 回看意义
      可信误导：
      揭示场景与触发选择：
      揭示改变的事实、关系、行动或情绪：
      揭示后的后果与新期待：
      ```

      ### 反转自检清单
      - [ ] 回看铺垫至少有三处暗示。
      - [ ] 反转由角色选择推动，不依赖巧合。
      - [ ] 没有引入前文完全没提过的决定性信息。
      - [ ] 反转后情绪强度高于反转前。
      - [ ] 反转改变读者对前面剧情的理解，并产生回看开头的冲动。
      - [ ] 读者有可能在反转前猜到，但不要求一定猜到。
      - [ ] 没有对读者撒谎，只是没有说出全部真相。
      - [ ] 揭示通过行动、场景或证据完成，不靠大段解释。
      - [ ] 揭示快速、干脆，揭示后有足够篇幅展示影响。
      - [ ] 结尾落在反转产生的情绪上。
