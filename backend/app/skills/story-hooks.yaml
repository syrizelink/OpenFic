  - name: 章级钩子完整手册
    content: |
      # 章级钩子：章首/章尾钩子选择与写作

      ## 决策路由

      ### 章尾钩子：根据本章情绪选类型

      | 本章情绪/阶段 | 推荐钩子 | 为什么 |
      |-------------|---------|-------|
      | 悬念/未知 | 突然揭示 / 神秘物品 / 留白 | 激发好奇 |
      | 紧迫/危机 | 紧急危机 / 倒计时 / 未完成动作 | 制造焦虑 |
      | 反转/真相 | 身份反转 / 隐藏含义 / 回声 | 颠覆认知 |
      | 情感/关系 | 两难抉择 / 承诺威胁 / 情感转折 | 拉扯情绪 |
      | 系统文特有 | 系统激活 / 选择型 | 期待能力或奖励 |
      | 氛围/日常 | 意象钩子 / 离奇消失 / 信息差 | 暗流涌动 |

      ### 章首钩子：根据开篇策略选类型

      | 开篇策略 | 推荐钩子 | 为什么 |
      |---------|---------|-------|
      | 直接冲击 | 未完成动作开局 / 倒计时开局 | 即时紧迫感 |
      | 制造好奇 | 悬念对话 / 闪前碎片 / 神秘独白 | 信息差驱动 |
      | 对比冲击 | 反差场景 / 意象预示 | 反差吸引 |

      ### 章节阶段与钩子强度

      | 故事阶段 | 推荐类型 | 强度 |
      |----------|---------|------|
      | 第 1 章 | 系统激活 / 截断 / 危机升级 | 必须强 |
      | 2-3 章 | 选择 / 信息差 / 情感转折 | 强 |
      | 中期日常 | 对话悬念 / 信息差 / 身份即将揭露 | 中 |
      | 高潮前 | 危机升级 / 悬念预知 | 强 |
      | 大结局 | 时间跳跃 / 情感转折 | 收束 |

      ## 章尾钩子 13 式

      | # | 名称 | 公式 | 示例 |
      |---|------|------|------|
      | 1 | 突然揭示 | 抛出改变全局的信息 | “信上的日期，是他死后第七天。” |
      | 2 | 紧急危机 | 下章必须回应的紧迫威胁 | “裂缝在扩大，灵石还差三块。” |
      | 3 | 未完成动作 | 动作被新变量打断 | “他刚伸手，手腕忽然被人扣住。‘别动。’身后传来一个声音。” |
      | 4 | 身份反转 | 身份真相偏离读者预期 | “她叫林小月。但档案上写的是：林小月，已故。” |
      | 5 | 两难抉择 | 被迫在两个坏选项中选一个 | “签了这份文件，公司保住了，但他得进去。” |
      | 6 | 神秘物品 | 重要但含义未知的物件 | “包裹里是一把钥匙，附了张纸条：‘你欠我的。’” |
      | 7 | 倒计时 | 时间不够用 | “医生说还有三个月。那是两个月前的事了。” |
      | 8 | 承诺/威胁 | 有人宣布行动意图 | “今晚十二点之前，我会告诉所有人你做了什么。” |
      | 9 | 离奇消失 | 不可能的消失 | “手铐还在，人没了。整个房间只有一个门，门没开过。” |
      | 10 | 隐藏含义 | 表面正常，实际暗藏信息 | “他说：‘你和妹妹真像。’可她是独生女。” |
      | 11 | 意象钩子 | 反复出现的意象发生变化 | “窗台上那盆枯了一个月的茉莉，突然冒出了花苞。” |
      | 12 | 回声钩子 | 章尾句呼应开头，关键细节变了 | 开头：“她说她永远不会原谅他。”结尾：“她说她永远不会原谅他。但她的手，攥得更紧了。” |
      | 13 | 留白钩子 | 只展示反应，不揭示发生了什么 | “他看了信。脸色变了。什么也没说，把信叠好放进口袋。” |

      ## 章首钩子 7 式

      | # | 名称 | 公式 | 示例 |
      |---|------|------|------|
      | 1 | 悬念对话开局 | 直接从意味深长的对话开始 | “你确定要这么做？/ 确定。/ 那你就别后悔。” |
      | 2 | 闪前碎片 | 先给结果碎片，再回正常叙事 | “后来他才知道，那个电话改变了所有事。但此刻他还一无所知。” |
      | 3 | 倒计时开局 | 开头就建立紧迫感 | “距离合同到期还有 72 小时。” |
      | 4 | 神秘独白 | 第一人称诡异内心独白 | “我一直在想，那天如果我没有回头，一切会不会不一样。” |
      | 5 | 反差场景 | 两个截然不同的场景并列 | “一边是婚礼现场，香槟塔堆得老高。另一边，医院走廊的灯在闪。” |
      | 6 | 未完成动作开局 | 动作进行中被截断 | “他刚把钥匙插进锁孔，门里传来一声轻响。” |
      | 7 | 意象预示 | 用环境意象暗示即将发生的事 | “天边烧得通红，像是什么东西在着。她抬头看了一眼，继续走。” |

      ## 章尾实战模板

      ### 系统激活型
      ```
      就在{主角}{最低谷状态}之际。
      {一个感官描写}。
      叮！
      【{系统名}，正式启动。】
      ```

      ### 悬念预知型
      ```
      {主角}{冷静/冷漠地}看着{对方的嚣张行为}。
      {一个短句：继续吧/慢慢来/不着急}。
      {预告即将发生的反转，不透露细节}。
      ```

      ### 截断型
      ```
      {一个小动作}。
      {剧烈反应}。
      {震惊/疑问。本章结束，不给答案}
      ```

      ### 选择型
      ```
      【选择一：{诱人选项}】奖励：{极其诱人} 代价：{隐含风险}
      【选择二：{另一选项}】奖励：{另一种诱人} 代价：{另一种风险}
      ```
      章节结束，不给出选择结果。

      ### 危机升级型
      ```
      {突然的声响/动作}！
      {新威胁出现}。
      {主角的恐惧/紧迫反应}。
      ```

      ### 身份即将揭露型
      ```
      {一个旁观者}突然{提出疑问/发现线索}。
      “{暗示主角真实身份的话}”
      {其他人不以为意，主角暗暗紧张}。
      ```

      ### 情感转折型
      ```
      就在这时，{角色}的{表情/态度}突然{大变}。
      {一个出人意料的示弱/请求动作}。
      “{戳中主角软肋的话}”
      ```

      ### 信息差型
      ```
      {主角的自我怀疑/感慨}。
      {一个意象/比喻}。
      {暗示即将改变，但不明说}。
      ```

      ### 对话悬念型
      ```
      “{提出请求的前半句}”
      “{对方回应}”
      “{意想不到的后半句，不是读者预期的}”
      ```

      ### 时间跳跃型
      ```
      {精确/模糊的时间标记}。
      {出人意料的结果}。
      {暗示过程的一句话}。
      ```

      ## 爽点与章尾检查

      爽点 = 大众逻辑与主角逻辑的冲突。对手不可战胜带来恐惧或绝望，主角却掌握不同的信息、准备或能力；落差越大，释放越强。

      - 吃瓜群众通过议论吹高对手逼格，并用震惊反应放大打脸。
      - 对手必须嚣张到让读者产生明确情绪，打脸才有重量。
      - 主角铺垫时可以低调，释放时要干脆。
      - 打脸前必须有前置小无敌：道具、人物、实力或信息要准备好。
      - 铺垫比打脸重要，分量足够的人物反应比普通路人更有效。
      - 章首前 100 字有钩子，章尾有继续阅读理由，连续两章不要使用同一种钩子，钩子点到即止。
  - name: 段落级钩子完整手册
    content: |
      # 段落级钩子技法

      ## 段落级钩子 11 种

      | # | 名称 | 公式 | 示例 | 有效性 |
      |---|------|------|------|--------|
      | 1 | 信息差 | 读者知道关键信息，角色不知道 | “他笑着接过咖啡，不知道她刚才在里面加了一片安眠药。” | ★5 |
      | 2 | 倒计时 | 设置明确的时间压力 | “离婚冷静期还剩最后三天。三天后，他签不签都无所谓了。” | ★4 |
      | 3 | 反转 | 读者预期突然被打破 | “她打开遗嘱，继承人那一栏空着。下一页压着她母亲的死亡证明。” | ★5 |
      | 4 | 暗牌 | 主角藏了一张牌没打，读者等亮牌 | “婆婆骂了整整十分钟。我一句话没说。手机录音还在跑。” | ★4 |
      | 5 | 打脸 | 角色正在得意，读者知道马上要被打脸 | “‘就你？也想跟我争？’她笑得前仰后合。我没说话。只是把那份亲子鉴定报告从包里拿了出来。” | ★5 |
      | 6 | 代价 | 暗示主角即将失去某样东西或选择要付出代价 | “我知道举报他意味着什么。举报了他，我也完了。但我还是按下了发送键。” | ★4 |
      | 7 | 弱者/孩子 | 引入需要被保护的弱者，激发保护欲 | “女儿躲在门后面，捂着耳朵。她才四岁，什么都不懂。但她知道不该出声。” | ★4 |
      | 8 | 灵魂旁观 | 主角已死，以灵魂视角叙述，全知但无力改变 | “我的魂魄慢慢飘起来，看着妈妈铁青的脸。对不起妈妈，我没能站直。” | ★5 |
      | 9 | 异常物件 | 不该出现的物件引发全局 | “避孕套日期突然变了，连味道也变成了我以前过敏的芒果味。我笑着点头。” | ★5 |
      | 10 | 假意顺从 | 主角主动给出前世拼命保护的东西，对手以为她疯了 | “‘你既然想要，就都给你吧。’反正谁拿到这笔遗产谁就大祸临头。” | ★4 |
      | 11 | 冷发现 | 发现异常后保持极度冷静，冷静本身制造悬念 | “钥匙扣上印着‘悦安月子中心VIP’。我们明明没有孩子。我笑着点头。” | ★5 |

      ### 使用要点
      - 信息差不能拖太久，超过较长篇幅后要补充新信息或改变方向。
      - 倒计时一旦设定，必须到期兑现，不能烂尾。
      - 反转必须有铺垫，无铺垫的反转是作弊。
      - 暗牌不能藏太久，短篇最多藏到约 30% 篇幅。
      - 打脸要干脆利落，一句有效台词常胜过一段解释。
      - 代价必须真实，主角最后什么都没失去则代价钩子失效。
      - 弱者不能只是工具人，要有自己的行动线。
      - 灵魂视角的限制必须严格遵守。

      ## 钩子组合

      | 组合 | 效果 | 适合题材 |
      |---|---|---|
      | 信息差 + 暗牌 | 读者知道主角在憋大招 | 复仇、世情 |
      | 倒计时 + 代价 | 时间紧迫且选什么都亏 | 悬疑、婚恋 |
      | 反转 + 打脸 | 情绪过山车 | 爽向短篇 |
      | 弱者 + 代价 | 共情增强 | 追妻、世情、悲剧 |
      | 暗牌 + 打脸 | 爽感蓄力最强 | 复仇、逆袭 |
      | 异常物件 + 冷发现 | 日常悬疑与智商碾压 | 悬疑 |
      | 灵魂旁观 + 弱者 | 悲剧与保护欲 | 悲剧题材 |
      | 假意顺从 + 暗牌 | 三重信息差与爽感蓄力 | 复仇 |

      技巧服务表达，不要为了用技巧而用技巧。技巧可以杂糅，没用就丢弃，不能从技巧本身硬推剧情。

      ## 钩子禁忌
      - 假悬念：威胁不存在或立刻解除。
      - 机械降神：章尾抛出危机，下章靠巧合解决。
      - 过度留白：连续多章不揭示任何信息。
      - 低风险钩：用无关紧要的小事制造悬念。
      - 同类型连用：连续三章以上使用同一种钩子。

      ## 对话情绪五级递增
      | 级别 | 类型 | 强度 |
      |---|---|---|
      | 1 | 客观陈述事实 | 最弱 |
      | 2 | 客观陈述并提出建议 | 礼貌但有力 |
      | 3 | 主观指责 | 开始有冲突感 |
      | 4 | 主观指责并强制命令 | 强情绪 |
      | 5 | 主观指责并以关心或为你好抬高自己 | 最强 |

      ## 不公平伤害钩子
      不公平伤害 = 主角无辜的不公平 + 物理或精神伤害。精神伤害通常更能拉动读者情绪。

      | 类型 | 动机 | 行为 | 态度 |
      |---|---|---|---|
      | 利益转移型 | 反派不想承担代价 | 掠夺、命令、逼迫 | 理所应当 |
      | 损失转嫁型 | 反派将惩罚嫁祸给主角 | 做局、逼迫顶罪 | 隐蔽阴险 |
      | 针锋相对型 | 主角打破反派秩序 | 陷害、算计、伤害 | 不留活路 |

      正确压法：尽量用“他人否定、主角打脸”替代主角真的长期受损；否定理由要符合当时信息；不同人物的否定方式要有差异；只在关键高潮时集中施压。

      ## 围观者质量层级
      | 层级 | 对象 | 特征 |
      |---|---|---|
      | 低质量 | 群演、打杂、实习生 | 纯情绪反应，无后续 |
      | 中质量 | 懂行从业者、副手 | 能做专业对比，有态度变化 |
      | 高质量 | 行业顶层、关键角色 | 反应伴随信息展露、关系进展和新期待 |

      围观者分层时优先增加角色种类、角色层级、关系深度和不同反应，不要只增加“所有人都震惊”。
  - name: 悬念编排完整手册
    content: |
      # 悬念编排操作手册

      悬念的本质是读者面对两个或更多可能走向，认为它们都有可能发生。悬念与伏笔的差别在于：悬念通常短期揭晓并制造紧张、好奇或期待；伏笔长期埋线，在揭示时制造震惊和回溯感。

      ## 多线悬念周期
      | 弧线长度 | 跨度 | 示例 |
      |---|---|---|
      | 短弧 | 2-3 章 | 一场打斗、一次冲突 |
      | 中弧 | 5-8 章 | 一段关系变化、一个小谜题 |
      | 长弧 | 整卷或全书 | 终极秘密、主线大反转 |

      规划时同时铺设不同长度的弧线，保证任何时刻至少有两条悬念线在运行。每章结尾必须有未解问题或未达成期待；期待分短期、中期、远期三层运作。

      ## 期待接力
      1. 让读者脑中始终有三个好奇点：两条长期线和一条短期线。
      2. 长期待即将收回时，转化为短期爆发，同时提前种下新的长期期待。
      3. 主角即将得到某样东西但尚未得到时，不要结束当前期待；先在兑现前套上下一条钩子。
      4. 大期待和小期待交替推进，任何时刻都不要让所有问题同时闭环。

      ## 情绪折线与蓄力
      `铺垫上行 → 挫折下行 → 再铺垫上行 → 再挫折下行 → 爆发上行`。

      上行可以多一些，下行要精准控制。下行太猛会造成弃读，太轻则打不响。网文下行优先使用小挫折和小波折，避免主角长期真实憋屈；蓄力太久会疲惫，不够则爽感不足，释放后下一次爽点应逐级增强。

      ## 道具或能力展示的八步期待模板
      1. 展示宝物或能力强大。
      2. 配角因信息不足认为它鸡肋。
      3. 展示一个恰好被其克制的反派或困境。
      4. 配角用更强装备失败。
      5. 主角做针对性方案。
      6. 主角上场，众人不看好。
      7. 主角完成压制，众人震惊，鸡肋变成神器。
      8. 产生新收获和新期待。

      ## 震惊分层
      - 点震惊：一个人反应，最弱。
      - 网震惊：关系网内多人出现不同反应。
      - 深度震惊：成就一、成就二、成就三逐层升级。

      震惊对象应与后续戏份匹配：陌生人只提供弱情绪，熟人可以产生态度变化，重要角色和高位者的震惊应伴随信息、关系或新期待。道具的视觉和物理变化通常比“他震惊了”更有力。

      ## 常用拉期待手法
      - 持续伪装等待暴露。
      - 非常规能力展示。
      - 违反人设预期的行为。
      - 展示部分实力并保留底牌。
      - 突发意外打破平静。
      - 暗中蓄力等待时机。
      - 在高风险中谋利。
      - 混乱中周旋。
      - 跨势力角色串联。
      - 多方势力对同一事件产生不同反应。
      - 名声扩散引起新关注。
      - 重要角色遇险等待主角出手。
      - 逐步接近目标，每一步产生新期待。
      - 暗中威胁逐步浮现。
      - 解决一个麻烦后引出更大麻烦。
      - 获得稀缺资源并暗示用途。
      - 用独特方式变废为宝。
      - 新地图、新规则、新能力组合或更深一层的已知信息。
      - 绝路出现转机。
      - 升级路径、新能力效果和升级后的兑现。
      - 重要角色牺牲或主角暗中布局等待收网。

      所有技巧都服务表达，不是必须填满的清单。

      ## 强敌破局三层
      | 层次 | 做法 |
      |---|---|
      | 硬碰硬 | 实力碾压，简单直接 |
      | 预判反制 | 反派出 A，主角提前准备 B 克制 A |
      | 反预判 | 反派针对 A，主角利用 A 设局引导反派落入 B |

      核心爽点是主角在更高层面的思考、准备和掌控力，而不是反派突然变蠢。

      ## Hook 上瘾模型
      触发 → 行动 → 奖励 → 投入。触发提醒欲望，行动降低理解和参与门槛，奖励既要可预期又要有意外，投入让读者关心已经积累的装备、排名、关系和成果。收获不应只有“经验和钱”，也可以是意外但合理的额外成果。

      ## 深度机制
      - 意外像炸弹突然爆炸，悬念像听见定时器滴答作响；悬念通常更有持续力量。
      - 章末让人物面临未解决的危险或选择。
      - 用时间锁压缩行动空间，隔一段时间给出进展。
      - 期待比爽点更重要，爽是释放过程，不是全部情绪。
      - 解决麻烦后必须产生新的麻烦、目标或关系变化，不能让故事引擎停止。

      ## 完整质量检查
      - 悬念等级是否符合章节定位。
      - 期待链是否至少有一条未解线运行。
      - 每个悬念点是否有角色反应。
      - 读者与角色之间是否存在有效信息差。
      - 章末是否有未解决问题或未达成期待。
      - 下行是否控制在可承受的波折范围。
      - 震惊是否有点、网、深度的层次。
      - 递进是否有视觉或物理变化。
      - 爽感是否逐次增强。
      - 麻烦是否没有消失。
      - 是否保持多线并行。
      - 底牌展示后反派是否受到对应压制。
  - name: 原始钩子实战补充
    content: |
      # 章级钩子原始实战补充

      ## 章尾实战模板示例

      ### 系统激活型
      ```
      就在{主角}{最低谷状态}之际。
      {一个感官描写}。
      叮！
      【{系统名}，正式启动。】
      ```
      示例：就在他万念俱灰之际。一个冰冷的机械音，突然在他脑海中响起。叮！【年少轻狂系统，正式启动。】

      ### 悬念预知型
      ```
      {主角}{冷静/冷漠地}看着{对方的嚣张行为}。
      {一个短句：继续吧/慢慢来/不着急}。
      {预告即将发生的反转，不透露细节}。
      ```
      示例：我冷眼看着笑得前仰后合的人。笑吧。多笑会儿。过了今天，你们就再也笑不出来了。

      ### 截断型
      ```
      {一个小动作}。
      {剧烈反应}。
      {震惊/疑问。本章结束，不给答案}。
      ```
      示例：仅仅一口！她的瞳孔猛地收缩成针尖状。轰！一股恐怖到难以形容的热流，瞬间在她的腹中炸开！这粥有问题！里面到底放了什么？

      ### 选择型
      ```
      【选择一：{诱人选项}】奖励：{极其诱人} 代价：{隐含风险}
      【选择二：{另一选项}】奖励：{另一种诱人} 代价：{另一种风险}
      ```
      章节结束，不给出选择结果。

      ### 危机升级型
      ```
      {突然的声响/动作}！
      {新威胁出现}。
      {主角的恐惧/紧迫反应}。
      ```
      示例：“都给老子出来！快点！”哐啷！！！一只沾满泥污的军靴，粗暴地踹开了笼门。

      ### 身份即将揭露型
      ```
      {一个旁观者}突然{提出疑问/发现线索}。
      “{暗示主角真实身份的话}”
      {其他人不以为意，主角暗暗紧张}。
      ```

      ### 情感转折型
      ```
      就在这时，{角色}的{表情/态度}突然{大变}。
      {一个出人意料的示弱/请求动作}。
      “{戳中主角软肋的话}”
      ```

      ### 信息差型
      ```
      {主角的自我怀疑/感慨}。
      {一个意象/比喻}。
      {暗示即将改变，但不明说}。
      ```
      示例：花有重开日，人无再少年。自己怎么就把日子，过成了这副狗屎样？

      ### 对话悬念型
      ```
      “{提出请求的前半句}”
      “{对方回应}”
      “{意想不到的后半句，不是读者预期的}”
      ```
      示例：“我有一个请求。”苏牧缓缓说道。“你说。”“离婚之前，我要证明一次自己。”

      ### 时间跳跃型
      ```
      {精确/模糊的时间标记}。
      {出人意料的结果}。
      {暗示过程的一句话}。
      ```
      示例：三分三秒后。江亦瑶神色从容地走出房间，整理了一下微乱的衣服。

      ## 三种速写章末钩子

      ### 收获预告型（副本/任务尾声）
      ```
      {当前行动接近完成}。
      {暗示即将获得的奖励}。
      {一句话暗示奖励比预期更大}。
      ```

      ### 反派逼近型（铺垫段结尾）
      ```
      {主角当前状态}。
      {暗处/远方，反派的某个行动}。
      {暗示这个行动将影响主角}。
      ```

      ### 行动预告型（装逼/打脸前）
      ```
      {主角做出一个决定}。
      {一个准备动作}。
      {暗示即将发生的行动}。不写结果。
      ```

      ## 装逼打脸节奏

      | 阶段 | 公众期（5 章循环） | VIP 期 |
      |------|-------------------|--------|
      | 人设 | 1 章 | 1-2 章 |
      | 铺垫 | 2 章 | 5 章 |
      | 打脸 | 1 章 | 1-2 章 |
      | 善后 | 1 章 | 1 章 |

      - 前置小无敌：打脸前必须把道具、人物或实力准备好，否则嘲讽会变成虐主。
      - 铺垫比打脸重要；铺垫到位后，主角站着不说话都能装逼。
      - 打脸对象层级决定爽感层级，路人甲震惊不等于有分量角色震惊。
      - 章末钩子约 100 字即可显著提升完读率。

      ## 章级质量检查

      - [ ] 章首前 100 字有钩子，不是风景或天气开头。
      - [ ] 章尾有让读者想翻下一页的东西。
      - [ ] 钩子强度与章节阶段匹配，日常章不必强钩子。
      - [ ] 连续两章不用同一种钩子。
      - [ ] 钩子约 100 字，点到即止，不拖沓。

      # 段落级钩子原始补充

      ## 段落级钩子 11 种

      | # | 名称 | 公式 | 示例 | 有效性 |
      |---|------|------|------|--------|
      | 1 | 信息差 | 读者知道关键信息，角色不知道 | “他笑着接过咖啡，不知道她刚才在里面加了一片安眠药。” | ★5 |
      | 2 | 倒计时 | 设置明确的时间压力 | “离婚冷静期还剩最后三天。三天后，他签不签都无所谓了。” | ★4 |
      | 3 | 反转 | 读者预期突然被打破 | “她打开遗嘱，继承人那一栏空着。下一页压着她母亲的死亡证明。” | ★5 |
      | 4 | 暗牌 | 主角藏了一张牌没打，读者等亮牌 | “婆婆骂了整整十分钟。我一句话没说。手机录音还在跑。” | ★4 |
      | 5 | 打脸 | 角色正在得意，读者知道马上要被打脸 | “【就你？也想跟我争？】她笑得前仰后合。我没说话。只是把那份亲子鉴定报告从包里拿了出来。” | ★5 |
      | 6 | 代价 | 暗示主角即将失去某样东西或选择要付出惨重代价 | “我知道举报他意味着什么。举报了他，我也完了。但我还是按下了发送键。” | ★4 |
      | 7 | 弱者/孩子 | 引入需要被保护的弱者，激发保护欲 | “女儿躲在门后面，捂着耳朵。她才四岁，什么都不懂。但她知道不该出声。” | ★4 |
      | 8 | 灵魂旁观 | 主角已死，以灵魂视角叙述，全知但无力改变 | “我的魂魄慢慢飘起来，看着妈妈铁青的脸。对不起妈妈，我没能站直。” | ★5 |
      | 9 | 异常物件 | 不该出现在这里的物件引发全局 | “避孕套日期突然变了，连味道也变成了我以前过敏的芒果味。我笑着点头。” | ★5 |
      | 10 | 假意顺从 | 重生后主动给出前世拼命保护的东西，对手以为她疯了 | “‘你既然想要，就都给你吧。’反正谁拿到这笔巨额遗产谁就大祸临头，正愁保命的方法呢。” | ★4 |
      | 11 | 冷发现 | 发现异常后第一反应保持极度冷静，冷静本身制造悬念 | “钥匙扣上印着‘悦安月子中心VIP’。我们明明没有孩子。我笑着点头。当天就去月子中心记下了预约单。” | ★5 |

      ### 使用要点
      - 信息差不能拖太久，超过 3000 字读者会烦。
      - 倒计时一旦设定，必须到期兑现，不能烂尾。
      - 反转必须有铺垫，无铺垫的反转是作弊。
      - 暗牌不能藏太久，短篇里最多藏 30% 篇幅。
      - 打脸要干脆利落，一句话打脸比一段话打脸爽。
      - 代价必须真实，主角最后什么都没失去则代价钩子失效。
      - 弱者不能只是工具人，要有自己的行动线。
      - 灵魂视角只能看不能动，限制必须严格遵守。

      ## 钩子组合完整表

      | 组合 | 效果 | 适合题材 |
      |------|------|----------|
      | 信息差 + 暗牌 | 读者知道主角在憋大招 | 复仇、世情 |
      | 倒计时 + 代价 | 时间紧迫且选什么都亏 | 悬疑、婚恋 |
      | 反转 + 打脸 | 情绪过山车 | 所有爽向短篇 |
      | 弱者 + 代价 | 共情拉满 | 追妻、世情、死人文学 |
      | 暗牌 + 打脸 | 爽感最强 | 复仇、逆袭 |
      | 异常物件 + 冷发现 | 日常悬疑感与智商碾压 | 悬疑 |
      | 灵魂旁观 + 弱者 | 极致悲剧与保护欲 | 悲剧题材 |
      | 假意顺从 + 暗牌 | 三重信息差与爽感蓄力 | 复仇 |
      | 阶梯背叛 + 冷发现 | 层层加码与全程冷静 | 复仇、世情 |

      1. 技巧服务表达，不要为了用技巧而用技巧。
      2. 构思剧情阶段可同时考虑多种技巧丰富剧情。
      3. 技巧可杂糅使用，没用就丢弃。
      4. 不要通过单个技巧推导剧情，技巧是工具不是束缚。

      ## 钩子禁忌

      | 禁忌 | 说明 |
      |------|------|
      | 假悬念 | 威胁不存在或立刻解除，读者被骗一次就不会再信 |
      | 机械降神 | 章尾抛出危机，下章开头用巧合解决 |
      | 过度留白 | 连续多章不揭示任何信息，读者失去耐心 |
      | 低风险钩 | 用无关紧要的事制造悬念 |
      | 同类型连用 | 连续 3 章以上使用同一种钩子类型 |

      ## 对话情绪五级递增

      | 级别 | 类型 | 强度 |
      |------|------|------|
      | 1 | 客观陈述事实 | 最弱 |
      | 2 | 客观陈述并提出建议 | 礼貌但有力 |
      | 3 | 主观指责 | 开始有冲突感 |
      | 4 | 主观指责并强制命令 | 强情绪 |
      | 5 | 主观指责并以“为你好”抬高自己 | 最强 |

      最强话术打着“为你好”的幌子，句句不离关心，但句句都是嫌弃、指责和厌恶。

      ## 不公平伤害钩子

      不公平伤害 = 不公平（主角无辜）+ 伤害（物理 + 精神）。精神伤害更能拉动读者情绪，因为大多数读者受气的时候多。“不患寡而患不均”：减月例大家都减是公平，但唯独主角药材降了一等是不公平。随便挑一种写到位都能拉起对反派的仇恨。

      | 类型 | 动机 | 行为 | 态度 |
      |------|------|------|------|
      | 利益转移型 | 反派不想自己承担代价 | 掠夺、命令、逼迫主角 | 理所应当、趾高气昂 |
      | 损失转嫁型 | 反派将受惩罚嫁祸给主角 | 威逼利诱、做局、逼迫顶罪 | 隐蔽、阴险 |
      | 针锋相对型 | 反派所处秩序被主角打破 | 陷害、算计、伤害 | 不留活路 |

      1. 尽量不压，用“他人否定，主角打脸”替代“主角真受委屈”。
      2. 否定间接化，当面嘲讽改为内心活动或背后议论。
      3. 否定理由要合情合理，基于当时已有信息。
      4. 否定人物要多元化，不同立场采用不同方式。
      5. 只在卷高潮时稍微压一下。

      ## 围观者质量与分层

      | 层级 | 对象 | 特征 |
      |------|------|------|
      | 低质量 | 群演、打杂、实习生 | 纯情绪反应，无后续 |
      | 中质量 | 懂行的从业者、副手 | 能做专业对比，有态度变化 |
      | 高质量 | 导演级别、行业顶层 | 反应伴随信息展露、关系进展和期待 |

      | 维度 | 原则 |
      |------|------|
      | 角色种类 | 多种角色优于单种角色，每种产生不同反应 |
      | 角色数量 | 多人优于少人，选择可多人出场的场合 |
      | 角色层级 | 多层级优于单层级，路人、同行、高手、反派各有反应 |
      | 关系深度 | 熟人优于陌生人，熟人震惊远爽于陌生人震惊 |

      ## 拆文检查清单

      1. 钩子类型是什么？
      2. 钩子在第几句话或第几个字出现？
      3. 钩子强度（1-10）是多少？
      4. 钩子是否在合理位置兑现？
      5. 铺垫和兑现之间的距离是否合适？
      6. 是否有钩子未兑现或烂尾？

      ## 段落级使用原则补充

      信息差、倒计时、反转、暗牌、打脸、代价、弱者、灵魂旁观、异常物件、假意顺从和冷发现可以在同一段中形成递进，但必须明确哪一个是主钩子、哪一个是辅助钩子。主钩子应在读者最容易识别的位置出现，辅助钩子负责加压或延迟兑现。

      设计时逐项记录：钩子类型、出现位置、强度（1-10）、兑现位置、铺垫与兑现距离、是否存在未兑现风险。短篇暗牌通常不超过 30% 篇幅，倒计时必须到期，代价必须真实，灵魂旁观必须遵守只能观察不能行动的限制。

      ## 拉期待手法速查（8 大类 36 种）

      | 类别 | 手法 | 说明 |
      |------|------|------|
      | 角色行为 | 持续伪装等待暴露 | 主角持续扮演某身份，期待暴露时刻 |
      | 角色行为 | 非常规能力展示 | 主角用特殊能力解决，期待更大规模 |
      | 角色行为 | 违反人设预期的行为 | 做出与形象不符的行为，制造惊喜 |
      | 角色行为 | 展示部分实力留底牌 | 展现部分实力，期待全面爆发 |
      | 时局/事件 | 突发意外 | 意外事件打破当前平静，迫使剧情加速 |
      | 时局/事件 | 暗中蓄力等待时机 | 角色暗中蓄力，期待亮剑时刻 |
      | 时局/事件 | 高风险中谋利 | 在危险中谋利，紧张感拉满 |
      | 时局/事件 | 混乱中周旋 | 在混乱局面中巧妙保全或谋利 |
      | 关系网扩展 | 跨势力角色串联 | 不同势力角色产生意外联系，扩大冲突面 |
      | 关系网扩展 | 多方势力不同反应 | 多方势力对主角或事件产生不同反应 |
      | 关系网扩展 | 名声扩散引起新关注 | 名声扩散引起新势力注意 |
      | 关系网扩展 | 帮助支线改变境遇 | 支线角色因主角帮助而改变境遇，建立忠诚 |
      | 关系网扩展 | 重要角色遇麻烦等主角出手 | 重要角色遇麻烦，期待主角出手 |
      | 矛盾升级 | 逐步接近目标每步拉期待 | 逐步接近目标，每一步都拉起新期待 |
      | 矛盾升级 | 暗中威胁浮现 | 威胁线索逐渐浮现，读者先于主角察觉 |
      | 矛盾升级 | 不可调和矛盾到爆发临界 | 矛盾积累到爆发临界 |
      | 矛盾升级 | 解决一个麻烦引出更大麻烦 | 解决一个麻烦后引出更大麻烦 |
      | 矛盾升级 | 升级引发各方反应 | 各方势力对主角升级产生不同反应 |
      | 资源/实力 | 获得稀缺资源暗示用途 | 获得稀缺资源，期待其用途 |
      | 资源/实力 | 独特方式变废为宝 | 用独特方式将无用之物变成宝物 |
      | 资源/实力 | 恰好解决当前困境的手段 | 恰好获得解决当前困境的手段 |
      | 资源/实力 | 信息或实力远超他人认知 | 掌握的信息或实力远超他人认知 |
      | 新线索/设定 | 前往新地图 | 即将前往新区域，刷新场景和冲突 |
      | 新线索/设定 | 新规则或设定揭示 | 新规则、设定或体系揭示 |
      | 新线索/设定 | 已有能力新组合方式 | 已有能力形成新的组合方式 |
      | 新线索/设定 | 已知信息下更深内容 | 从已知信息继续挖出更深层内容 |
      | 新线索/设定 | 谜团逐步揭开 | 谜团层层揭开，满足好奇心 |
      | 新线索/设定 | 绝路出现转机 | 看似绝路出现转机 |
      | 等级/技能 | 描写升级路径拉期待 | 描写升级路径，期待每次突破 |
      | 等级/技能 | 新能力效果展示 | 展示新能力的具体效果和应用场景 |
      | 等级/技能 | 升级后装逼期待 | 升级后期待装逼打脸剧情 |
      | 等级/技能 | 主角能力克制当前对手 | 主角能力恰好克制当前对手 |
      | 等级/技能 | 晋升展现多种能力 | 晋升后展现不同新能力，保持新鲜感 |
      | 情绪/氛围 | 适当隐藏部分信息 | 适当隐藏信息，制造谜语人效果 |
      | 情绪/氛围 | 重要角色牺牲 | 重要角色牺牲带来情绪冲击和剧情转折 |
      | 情绪/氛围 | 主角暗中布局期待收网 | 主角暗中布局，等待收网 |

      组合原则：技巧服务表达，不是为了用而用。构思时可同时考虑多种技巧丰富剧情，没用就丢弃。
      6. 是否有钩子未兑现或烂尾？
