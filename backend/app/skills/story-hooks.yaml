id: builtin-skill--story-hooks
name: 故事钩子与悬念设计
summary: 设计段落、章节和跨章节的钩子与悬念，控制信息差、期待链和兑现节奏。
is_enabled: true
content: |
  # 故事钩子与悬念设计

  本 Skill 用于完整设计段落级钩子、章首章尾钩子和跨章节悬念。先按决策路由确定当前需要的层级，再选择具体类型、安排信息顺序，最后执行兑现和连续性检查。

  ## 一、决策路由

  | 当前任务 | 首先使用 |
  |---|---|
  | 设计章首或章尾 | 章级钩子类型与阶段强度 |
  | 设计段落内微钩子 | 段落级钩子类型与组合规则 |
  | 设计完整悬念体系 | 悬念周期、强度分级和期待接力 |
  | 设计爽点前的期待 | 信息差、底牌前置和震惊分层 |

  ## 二、基本原则

  1. 先写清楚读者当前知道什么、角色当前知道什么，以及下一步最想知道什么。
  2. 钩子必须承担具体功能：制造好奇、提高风险、推动行动、改变认知、制造情绪或承接下一段剧情。
  3. 悬念与伏笔不要混淆：悬念让读者猜接下来会怎样，通常在短期内揭晓；伏笔为较晚的揭示提供线索，揭示时产生震惊或恍然大悟。
  4. 信息顺序必须服务期待。虚假提示要足够可信，反转要有前文线索，不能靠作者故意隐瞒必要事实。
  5. 每次兑现后都要留下新的自然问题，但不能用强行新增设定逃避旧承诺。
  6. 低压或过渡章节可以使用弱钩子、阶段目标或情绪余韵，不要求每章都制造最高强度危机。

  ## 三、悬念信息顺序

  | 类型 | 信息顺序 | 适用场景 |
  |---|---|---|
  | 直白剧情 | 提出疑问 → 公布答案 | 基础叙事 |
  | 探索剧情 | 提出疑问 → 正常提示 → 公布答案 | 铺垫段 |
  | 意外剧情 | 提出疑问 → 虚假提示 → 公布答案 | 反转段 |
  | 意外加反转 | 提出疑问 → 虚假提示一 → 虚假对立提示二 → 公布答案 | 高潮段 |

  选择模板后按顺序安排信息。虚假提示只能引导合理误判，不能与已知事实冲突。

  ## 四、悬念强度

  | 等级 | 名称 | 阅读效果 | 常见位置 |
  |---|---|---|---|
  | 1 | 微悬念 | 好奇 | 过渡章 |
  | 2 | 小悬念 | 想看下一段 | 正文章 |
  | 3 | 中悬念 | 想看下一章 | 关键章 |
  | 4 | 大悬念 | 暂时放不下 | 爆发章 |
  | 5 | 极悬念 | 强烈追读 | 卷末或阶段高潮 |

  过渡章至少有一级，正文章至少有二级，关键章至少有三级。强度来自问题的具体性、风险和信息差，不来自夸张措辞。

  ## 五、多线悬念与期待接力

  - 短弧通常跨 2-3 章，适合一场冲突、一次调查或一个即时目标。
  - 中弧通常跨 5-8 章，适合一段关系变化、小谜题或阶段性敌人。
  - 长弧可贯穿一卷或全篇，适合终极秘密、主线大反转和最终目标。
  - 同时运行长、中、短三类弧线时，任意时刻至少保持两条期待线；短篇则至少有一条主悬念和一条副悬念。
  - 每章结尾至少留下一个未解问题、未完成动作或未达成的期待。
  - 当旧期待即将兑现时，提前种下下一条期待，形成“提出 → 升级 → 兑现 → 新提出”的接力。
  - 主角即将得到某样东西但尚未得到时，期待通常最高；不要在兑现前无理由结束期待。

  ## 六、单章三段钩子

  1. 种：前 30% 埋下钩子种子，给出异常、目标、时间限制或信息差。
  2. 养：中间 50% 逐步加压，让读者意识到事情比最初更复杂。
  3. 收：末 20% 引爆或延迟引爆。延迟引爆时，必须给出足够的新信息支撑下一章。

  ## 七、驱动力与爽点

  核心循环是：产生诉求 → 给予希望 → 努力解决 → 得偿所愿。

  - 产生诉求：用低地位、困境、威胁、不公或未曾拥有的东西制造“本不该如此”。
  - 给予希望：展示能力、资源、线索或改变局面的可能。
  - 努力解决：让困境分层递进，或解决一个问题后引出更高层级的新问题。
  - 得偿所愿：完成可见的情绪或利益兑现，并留下下一轮目标。

  爽点来自大众逻辑与主角逻辑的落差：对手看似不可战胜，主角却掌握不同信息、准备或能力。前置铺垫越具体，兑现越有力。打脸对象的身份和分量决定爽感层级，普通路人的反应不能替代关键人物的态度变化。

  ## 八、四层触发型钩子

  1. 展示初步成果，并给出周围人的初步反应。
  2. 揭示这还不是最终结果，升级期待。
  3. 展示超出预期的元素，制造震惊。
  4. 暗示主角还能进一步提升或即将面对更大问题，开启下一段。

  每一层都要有角色反应验证力度。没有场内反应，悬念容易变成作者自说自话。

  ## 九、完成后的输出

  - 钩子位置与层级：
  - 主要功能：
  - 读者已知信息：
  - 角色已知信息：
  - 当前未知问题：
  - 采用的类型或组合：
  - 信息顺序：
  - 预计兑现点：
  - 兑现后的新期待：
  - 未兑现风险：

  详细类型、模板和检查项见下方参考文档。
