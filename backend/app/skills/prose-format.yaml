id: builtin-skill--prose-format
name: 小说正文格式规范
summary: 规范章节、小节、段落、对话、标点和正文元信息，兼顾手机阅读节奏与自然叙事。
is_enabled: true
content: |
  # 正文格式执行指令

  先确认用户或目标平台是否有明确要求；有要求时覆盖默认格式。按平台模板选择章节标记、段落形态和引号，严格执行段间换行、无缩进、标点禁用、正文元信息禁令和 Markdown 禁令。短篇适用时再执行 beat 字数、子事件和小节衔接规则。完成交付前逐项执行全部原始检查清单。
references:
  - name: 正文格式与小节结构原始方法论
    content: |
      # 正文格式与小节结构

      ## 章节标记

      默认格式（按灵活度排序）：

      | 格式 | 平台适用 | 示例 |
      |------|----------|------|
      | `###1.` | 短篇默认 | `###1.` `###2.` `###3.` |
      | `###第一章` | 部分平台 | `###第一章` `###第二章` |
      | `1.`（纯数字） | 知乎 | `1.` `2.` `3.`（无 ### 前缀） |

      **规则**：全文统一一种格式，不要混用。短篇推荐 `###1.` 或纯数字，简洁高效。

      ## 段落格式

      ### 核心规则：戏剧单元优先

      默认交付排版是**按戏剧单元/镜头自然断段，段落紧密排列**。不要把固定字数当成强制切刀；先判断“一件事/一个推理链/一个情绪变化”是否完成。

      - 一段承载一个戏剧单元：一个动作链、一个线索发现、一次视线切换、一轮心理判断，或一条连续的氛围/推理/情绪链。
      - 场景结束、一件事结束、新动作、新物件、新信息、新对话另起一段；同一瞬间的发生、感知、反应应织在一起，不拆成动作层/感知层/反应层。
      - 正文相邻段落之间**只允许一个换行符 `\n`**；不得出现空行或连续换行 `\n\n`（紧密排列）。
      - 无缩进（平台渲染器自行处理，不需要 `　　` 或空格）。
      - 长度只作诊断：读起来拥挤、混入多个拍点、或手机屏上难以跟读时才拆；完整推理、氛围铺陈、情绪递进未结束时，允许稍长段保留连贯性。

      ### 段落节奏（长短交错 + 疏密有别）

      短段快读，是网文手机阅读的底色；长段负责承载完整推理、氛围和情绪沉淀。**忌通篇同长度**，也忌把每段按同一字数阈值切开：

      - **长短交错**：高潮、打脸、反转压到最短（单句成段）；推理链、环境压迫、情绪沉淀、章节收束可保留较长段，让读者读完一个完整变化。
      - **疏密有别（详略）**：爽点、转折 beat 写密（感知、动作、细节铺满）；过场、连接 beat 写疏（1-2 句带过，不平均用力）。每个 beat 一样长、一样细，正是 AI 腔的来源。
      - **不过度碎片化**：连续多个极短段若仍属于同一镜头/同一件事，应合并成自然段，避免像提纲或诗行。

      ### 主语与角色名节奏

      角色名不宜一味省略，也别每句都点名。按“主语重置”使用：

      - 段首、场景切换、多人同场、或主语可能混淆时，用主角名/角色名建立视角。
      - 同一段或同一动作链内，优先混用代词、动作承接和合理省略，避免每句都以同一角色名开头。
      - 关键转折、情绪爆点、身份反差或读者需要重新盯住主角时，可以再次点名强化。
      - 审查主语节奏看“读起来是否打磕巴”，不按全章出现次数一刀切；只有连续句/连续段无主语重置却反复点名，才算主语过密。

      ## 对话格式

      ### 对话标记

      按目标平台/用户要求选择；未指定时使用默认格式：

      | 优先级 | 格式 | 适用平台 |
      |--------|------|----------|
      | 首选 | `"说话内容"` | 短篇默认、番茄 |
      | 平台/项目指定 | `「说话内容」` | 知乎盐言短篇、部分古言、日式或用户指定 |

      **默认用 `""`**；用户或平台指定盐言风格时改为 `「」`，不要把 `「」` 视为错误。

      ### 对话规则

      1. 对话**独立成行**，不嵌在叙述段落中
      2. 用动作代替对话标签：不用“他说”“她道”，改为动作描写 + 对话
      3. 两人对话连续出现时，省略标签，靠内容区分说话人

      **正确示例**：
      ```
      她把杯子放下。
      "你走吧。"
      他没有动。
      "我说，你走吧。"
      ```

      **错误示例**：
      ```
      她把杯子放下，说道："你走吧。"他没有动，她又说："我说，你走吧。"
      ```

      ## 语气标点谱系

      标点服务语气、人物声线和情绪节奏，不能通篇句号化，也不能为了“丰富”随机堆砌符号。先判断当前句子的功能，再选择标点：

      | 语气 / 功能 | 标点策略 | 防线 |
      |---|---|---|
      | 压迫 / 冷静 / 克制 | 短句、逗号、句号，必要时用冒号压出判断落点 | 不人工加感叹号；克制不是每句都平铺句号 |
      | 质问 / 试探 / 反问 | 问号 + 短促追问片段，配合动作停顿 | 避免每句话都以 `？` 结尾 |
      | 惊讶 / 爆发 / 打脸 | 真正爆点可用 1 个感叹号，连续爆发最多 1-2 处 | 禁止 `!!!`、整段喊叫式感叹 |
      | 犹豫 / 吞咽 / 未说完 | 逗号、句号、短句断开、动作 beat | 不用 `……` 制造停顿；优先用动作和句长变化 |
      | 被打断 / 拖长音 | 不使用 `——`；改用动作打断、换行、短句或未完成动作 | 正文和对话都禁止 `——` / `—` / `--` |
      | 信息揭示 / 判断落点 | 冒号、分号或单句成段制造落点 | 保持手机阅读友好，不写论文式分号串 |

      执行规则：写对话时先看角色关系和权力位置；写叙述时用句长、逗号停顿和单句成段制造节奏，不要把破折号当节奏工具；精修时检查通篇句号化与随机标点堆砌。引号风格按项目/平台约定，知乎盐言的 `「」` 是合法对话格式。

      ## 小节（beat）结构

      ### 基本规则

      - 用数字编号（`1` `2` `3`）分割小节，每个小节是一个完整的叙事 beat
      - 每小节 800-1500 字（爽文可压缩至 500-800 字/节）
      - 8-15 个小节覆盖全文（按目标字数反推；8000÷1000≈8节，12000÷800≈15节）
      - 每小节推进一个明确的情节点

      ### 小节内部结构

      每个小节应该有：

      1. **一个主事件** + **3-5 个子事件**（主事件推进核心情节，子事件丰富层次；初稿偏短时先回到小节或细纲补足计划内子事件、对话或冲突；去 AI 味已有正文时不得新增剧情）
      2. **一个情绪变化**（读者的感受如何变化）
      3. **一条读者新获知的信息**
      4. **3-5 轮对话交锋**（揭示关系/升级冲突；特定场景如独自发现/翻阅日记可标零，按当前设计任务要求执行）
      5. **每个子事件三维度揉进**：发生+感知+反应揉进同一段正文

      ### 小节之间的衔接

      - 小节结尾留一个钩子（悬念/未解决的情绪/新问题）
      - 下一节开头快速接续，不要重新铺垫
      - 情绪跨节递进：每一节的情绪强度 ≥ 上一节。例外：峰值情绪（反转节）后允许维持 1 节不降，但不允许骤降

      ## 平台对话格式覆盖表

      | 平台 | 章节标记 | 对话格式 | 特殊要求 |
      |------|----------|----------|----------|
      | 知乎盐言 | `1.` | `「」` | 导语需单独标注 |
      | 番茄 | `###第一章` | `""` | 首段需有吸引力 |
      | 红果 | `###1.` | `""` | 无 |

      **通用原则**：用户未指定平台时，默认使用短篇通用格式（`###1.` + `""`）；用户或平台指定盐言风格时，`「」` 是允许的。

      ## 绝对禁止

      1. **禁止机械按字数分段**：不要因为超过某个字数就强拆；先判断段落是否仍是一个完整戏剧单元。若混入多个动作/信息/视线切换才拆，完整推理、氛围、情绪链可保留稍长段
      2. **禁止段间空行**：正文相邻段落之间只允许一个换行符 `\n`，不得出现空行或连续换行 `\n\n`
      3. **避免对话标签机械化**：高频或公式化的“他说”“她道”“他笑了笑说”用动作/上下文替代；普通“说”可保留
      4. **禁止缩进**：不使用 `　　`（全角空格）或半角空格缩进
      5. **禁止正文段落 Markdown 渲染**：除统一的小节/章节标记（如 `###1.`）外，正文段落中不使用加粗 `**`、斜体 `*`、标题 `#`、分隔线 `---` 等 Markdown 语法
      6. **正文不使用破折号**：正文（含叙述、对话、心理描写）不使用破折号 `——`/`—` 或双连字符 `--`，改用句号、逗号、换行、动作 beat 或短句断开；不再设置“对话例外”
      7. **禁止通篇句号化或随机标点堆砌**：标点必须跟语气/人物声线/情绪功能匹配；该质问时用问号，该爆发时少量感叹；犹豫、吞咽、未说完用动作或句长变化表达，不用 `……` / `——` 硬造停顿，也不得无功能地乱撒 `？`/`！`
      8. **禁止正文混入章节元信息**：章节号只允许出现在标题/小节标记/文件名/追踪记录中。正文叙述、对话、心理描写里不得出现 `第[一二三四五六七八九十百千万两0-9]+章|上一章|上章|前一章|本章|这一章|前文|后文|伏笔|细纲|读者` 这类写作工程词；要改成角色能感知的事件锚点或相对时间。例外：角色在故事世界内真实阅读/讨论“第X章”文本，或真实身为作者/读者并谈论读者身份时，可保留相应词。

      ## 快速检查

      - [ ] 段落按戏剧单元/镜头断开，而不是机械按字数切开？
      - [ ] 三维度揉进段是否按镜头/信息变化断开，完整推理/氛围/情绪链是否保留连贯？
      - [ ] 主语/角色名节奏是否自然：段首能建立主语，段中有代词/省略，关键转折再点名，避免无必要连续重复？
      - [ ] 正文相邻段落之间是否只有一个 `\n`，没有空行/`\n\n`？
      - [ ] 对话独立成行，且引号风格符合项目/平台约定（盐言 `「」` 合法）？
      - [ ] 标点节奏是否匹配语气/人物声线，避免通篇句号化，也没有随机堆砌 `？`/`！` 或用 `……`/`——` 硬造停顿？
      - [ ] 正文（含对话）里的 `——`/`—`/`--` 是否已改为逗号、句号、动作 beat 或短句断开？
      - [ ] 对话标签是否避免高频/公式化，普通“说”是否按语境保留？
      - [ ] 无缩进？
      - [ ] 每个小节有事件+情绪+信息？
      - [ ] 标题/小节标记之外，无 `第[一二三四五六七八九十百千万两0-9]+章|上一章|上章|前一章|本章|这一章|前文|后文|伏笔|细纲|读者` 这类元信息词；故事内真实阅读/讨论“第X章”或真实读者身份语境除外？
  - name: 短篇正文格式原始方法论
    content: |
      # 短篇正文格式

      ## 章节标记

      全文统一一种，不混用。

      | 格式 | 平台适用 | 示例 |
      |------|----------|------|
      | `###1.` | 短篇默认 | `###1.` `###2.` `###3.` |
      | `###第N章` | 番茄 / 七猫 / 古言 | `###第一章` `###第二章` |
      | `1.`（纯数字，无 `###`） | 知乎盐言 | `1.` `2.` `3.` |

      短篇推荐 `###1.` 或纯数字，简洁。番茄系长一点的章用 `###第N章`。

      ## 段落：两套平台模板

      短篇正文形态按平台分两套。**不设统一的“每段 ≤ 3 句”“800-1500 字 / 节”硬线**，那是长篇迁移过来的产物，会把短篇切成一样长的提纲。先认平台底色，再按疏密原则分配字数。

      ### 黑岩：一句一段，留白快读

      - 一句一段为主，多换行制造下坠和停顿感。
      - 节奏密，每节体量小，节尾必留钩。
      - 单句成段是常态，不要为了“凑够字数”把短句焊回长段。

      模板示意：
      ```
      ###1.

      他递过来一份文件。

      是离婚协议。

      我笑了。

      "签完，你就自由了。"
      ```

      ### 番茄 / 七猫：短段为底色，叙述交织对话

      - 短段仍是手机阅读的底色，但**允许多句回溯叙述段和对话交织**：一段里可以有内心独白、回忆补刀、动作，再接对话。
      - 古言 / 世情可写更长的叙述段，承载完整的情绪链和场景铺陈。
      - 爽点、打脸、反转处压短（可单句成段）；过场、信息交代一句带过。

      模板示意：
      ```
      ###第一章

      我把热汤端到他面前的时候，他正低头看手机，屏幕亮着白月光的名字。三年了，我以为熬过了最难的日子，原来熬的只是我自己。

      "以后这种事不用你做。"他头也没抬，"她不喜欢闻油烟味。"

      我端着碗的手顿了一下。
      ```

      ### 两套共同的硬约束（所有平台）

      - 正文相邻段落之间**只允许一个换行符 `\n`**，不得出现空行或连续换行 `\n\n`（紧密排列）。章节标记前后另算。
      - **无缩进**：不用 `　　`（全角空格）或半角空格缩进，平台渲染器自行处理。
      - **禁正文段落 Markdown**：除统一的小节 / 章节标记（如 `###1.`），正文段落里不用加粗 `**`、斜体 `*`、标题 `#`、分隔线 `---` 等。
      - 长短交错，忌通篇同长度。把每段切成同一字数，正是 AI 腔来源。

      ## 对话

      ### 引号

      | 优先级 | 格式 | 适用 |
      |--------|------|------|
      | 首选 | `"说话内容"`（半角） | 短篇默认、番茄、红果、黑岩 |
      | 平台 / 项目指定 | `「说话内容」` | 知乎盐言、部分古言、用户指定 |

      **默认用 `""`**；用户或平台指定盐言风格时用 `「」`，不要把 `「」` 当错误改掉。

      ### 规则

      1. 对话**独立成行**，不嵌在叙述段落里。
      2. 用动作代替对话标签：少用“他说”“她道”“他笑了笑说”，改成动作 beat + 对话；普通的“说”按语境可留。
      3. 两人连续对话省略标签，靠内容区分说话人。

      正确：
      ```
      她把杯子放下。
      "你走吧。"
      他没有动。
      "我说，你走吧。"
      ```

      错误：
      ```
      她把杯子放下，说道："你走吧。"他没有动，她又说："我说，你走吧。"
      ```

      ## 标点硬约束

      **本仓库正文统一不出现 `……` / `——` / `—` / `--`**。叙述、对话、心理描写一律适用，无对话例外。

      停顿、哽咽、未尽、被打断、留白，一律用以下手段实现：短句、句号、逗号断开；动作 beat（“她顿了一下”“他攥紧了拳”）；换行 / 单句成段。

      其余标点跟语气走：

      | 语气 / 功能 | 标点 | 防线 |
      |---|---|---|
      | 压迫 / 冷静 / 克制 | 短句、逗号、句号，必要时冒号压判断落点 | 不人工加感叹号，也不通篇句号化 |
      | 质问 / 反问 | 问号 + 短促追问 | 别每句都以 `？` 结尾 |
      | 爆发 / 打脸 | 真爆点用 1 个感叹号，连续爆发最多 1-2 处 | 禁 `!!!`、禁整段喊叫式感叹 |
      | 信息揭示 / 判断落点 | 冒号、单句成段制造落点 | 别写论文式分号串 |

      题材包范例里若出现 `……`，只为示意手法，落到正文按本条改写。

      ## 禁正文混入章节元信息

      章节号、写作工程词只允许出现在标题 / 小节标记 / 文件名 / 追踪记录里。正文叙述、对话、心理描写中**不得出现**：

      ```
      第[一二三四五六七八九十百千万两0-9]+章 | 上一章 | 上章 | 前一章 | 本章 | 这一章 | 前文 | 后文 | 伏笔 | 细纲 | 读者
      ```

      要改成角色能感知的事件锚点或相对时间。例：“比第一章那三秒开火更疼”改成“比那三秒开火更疼”。例外：角色在故事世界内真实阅读 / 讨论“第 X 章”文本，或角色真实身为作者 / 读者并谈论读者身份时，可保留。

      ## 平台覆盖表

      | 平台 | 章节标记 | 对话格式 | 段落底色 | 特殊要求 |
      |------|----------|----------|----------|----------|
      | 知乎盐言 | `1.`（纯数字） | `「」` | 短段 + 叙述交织 | 导语需单独标注 |
      | 番茄 | `###第N章` | `""` | 短段为底色，允许叙述交织对话 | 首段需有吸引力 |
      | 红果 | `###1.` | `""` | 短段为底色 | 无 |
      | 黑岩 | `###1.` | `""` | 一句一段，多换行留白 | 节尾必留钩 |

      用户未指定平台时，默认短篇通用格式：`###1.` + `""` + 番茄系短段底色。

      ## 写完每段快速检查

      - [ ] 段落形态符合目标平台模板（黑岩一句一段 / 番茄系短段交织叙述）？没把它切成同一字数的提纲？
      - [ ] 相邻段落之间只有一个 `\n`，没有空行 / `\n\n`？
      - [ ] 无缩进（没有 `　　` 或空格）？
      - [ ] 标题 / 小节标记之外，正文段落没用 `**` `*` `#` `---` 等 Markdown？
      - [ ] 对话独立成行，引号风格符合平台（盐言 `「」` 合法），对话标签没机械化？
      - [ ] 正文（含对话）里没有 `……` / `——` / `—` / `--`，停顿改用短句 / 动作 / 换行？
      - [ ] 标点跟语气走：没通篇句号化，没乱撒 `？` / `！`？
      - [ ] 正文没混入 `第N章` / `上一章` / `本章` / `前文` / `后文` / `伏笔` / `细纲` / `读者` 这类元信息词（故事内真实阅读 / 真实读者身份语境除外）？
