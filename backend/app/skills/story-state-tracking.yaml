id: builtin-skill--story-state-tracking
name: 故事状态追踪
summary: 从已有故事上下文中筛选当前创作所需状态，追踪角色、关系、伏笔、世界约束和剧情进度。
is_enabled: true
content: |
  # 状态追踪协议

  本 Skill 的目标不是重复摘要全文，而是从当前可用材料中筛选“如果不知道，本章或本次审查就会写错”的信息，形成可继续使用的状态快照。

  ## 一、本节速记筛选逻辑

  从已有上下文提取三类信息：

  1. 当前状态：本节涉及角色的最新能力、关系变化和公众形象。
  2. 历史因果：与本节事件直接相关的伏笔成因和前史事件。
  3. 世界约束：本节涉及的力量体系、社会规则、地理限制和其他不能违反的设定。

  ### 筛选标准

  - 本节涉及某个角色：保留该角色当前状态和最近变化。
  - 本节回收或推进伏笔：保留伏笔首次出现的具体细节和前文铺垫。
  - 本节涉及地点、能力或规则：保留相关世界约束。
  - 纯背景知识、与本节没有因果关联的资料：暂不纳入速记。
  - 不确定的信息标注“材料未说明”或“待确认”，不要为了让表格完整而杜撰。

  ## 二、本节速记格式

  ```
  ## 本节速记

  ### 当前剧情
  {本节要推进的事件、目标或选择}

  ### 角色状态
  {角色A}：{一句话当前状态，含最近变化}
  {角色B}：{一句话当前状态}

  ### 相关伏笔/前史
  {伏笔1}：{首次出现的具体细节}，当前需要{回收/推进/暂不处理}

  ### 世界约束
  {约束1}：{与本节相关的规则或设定}

  ### 未解决问题
  {本节结束后必须保留的目标、风险、信息或关系问题}
  ```

  速记应足够短，能直接指导下一步写作或审查，但不能为了短而删除会影响因果、人物行为或设定一致性的事实。

  ## 三、角色状态快照

  主要角色可按以下格式维护：

  ```
  ## {角色名}
  - 当前身份：{最新身份/职业}
  - 当前能力：{最新能力水平}
  - 当前目标：{正在追求的目标}
  - 当前限制：{伤势、资源、规则、关系或信息限制}
  - 关键关系：
    - 与{角色B}：{当前关系状态}，最近变化：{事件}
    - 与{角色C}：{当前关系状态}
  - 公众形象：{外界如何看待该角色}
  - 已知信息：{角色明确知道的关键事实}
  - 误解或未知：{角色尚不知道或判断错误的事实}
  - 待回收伏笔：{与该角色相关的开放项}
  - 状态变更记录：
    - {位置或阶段}：{变化描述}
  ```

  ### 更新规则

  1. 状态截止到当前用户指定的位置，不把后文信息倒灌到前文。
  2. 每次事件后检查身份、能力、目标、限制、关系、公众形象和已知信息是否变化。
  3. 无变化的字段不必重复扩写。
  4. 只追踪主要角色：多次出场、拥有独立剧情线、影响主线或承担重要关系的角色；一次性路人不纳入。
  5. 变更记录保留最近的关键记录，较早记录可以合并为阶段摘要，但不能丢失影响当前行为的事实。
  6. 如果材料出现冲突，列出两个来源和冲突点，等待裁定，不静默覆盖。

  ## 四、伏笔追踪

  每条伏笔至少记录：
  - 首次出现位置。
  - 当时的表面意义。
  - 当前状态：未规划、已埋、已推进、已回收、已失效或材料未说明。
  - 可能回收条件和关联人物。
  - 回收后会改变的事实、关系、规则或主线理解。
  - 若继续悬置，会产生的期待和风险。

  回收不能只写“解释清楚了”，要说明旧细节如何获得新意义，以及回收后谁的目标、关系、资源或认知发生变化。

  ## 五、跨章状态检查

  - 当前章节是否使用了已经改变的角色身份、能力、关系和称谓。
  - 当前章节是否让角色知道了他此前不知道的信息。
  - 当前章节是否提前使用了尚未解锁的设定或能力。
  - 已承诺的目标、选择、代价和伏笔是否仍有状态记录。
  - 新增角色、地点、组织和规则是否会在后续复用；会复用的应进入状态追踪。
  - 章节结束后是否形成新的目标、风险、信息、关系、资源、身份或情绪状态。

  ## 六、输出原则

  - 优先记录会影响下一步决策的内容。
  - 区分原文事实、角色认知和分析判断。
  - 不用完整摘要代替状态字段。
  - 不补写用户未提供的事实。
  - 不把状态追踪说明、表格或元信息写进小说正文。

  ## 七、状态变化与冲突处理

  每次事件后按顺序检查：身份、能力、目标、限制、关系、公众形象、已知信息、误解、伏笔状态、资源、伤口、承诺和情绪立场。只记录会影响下一步决策的变化；无变化字段不重复扩写。

  如果材料出现冲突，列出来源、位置和冲突点，标注“待裁定”，不静默覆盖。状态截止到用户指定位置，不能把后文信息倒灌到前文；角色只能使用其截至该点合理知道的信息。

  ### 状态变更表

  ```
  位置/事件：
  触发因素：
  变化字段：目标 / 风险 / 信息 / 关系 / 资源 / 身份 / 能力 / 公众形象 / 情绪
  变化前：
  变化后：
  谁知道：
  对后续的影响：
  是否形成新承诺或伏笔：
  ```

  ### 章节结束检查

  章节是否使用了已经改变的身份、能力、关系和称谓；是否让角色知道了此前不知道的信息；是否提前使用尚未解锁的设定或能力；承诺、选择、代价和伏笔是否仍有状态记录；新增角色、地点、组织和规则是否会在后续复用；结束后是否形成新的目标、风险、信息、关系、资源、身份或情绪状态。
references:
  - name: 状态快照检查表
    content: |
      - 角色现在在哪里、是什么身份、正在做什么。
      - 角色当前想要什么、能做什么、不能做什么。
      - 角色知道哪些信息，误解哪些信息。
      - 关系相较于上一个状态点发生了什么变化。
      - 最近事件留下了什么代价、资源、伤口或承诺。
  - name: 伏笔追踪检查表
    content: |
      - 首次出现位置和当时的表面意义。
      - 当前状态和最近一次推进。
      - 回收需要的条件或可能关联。
      - 如果继续悬置，下一步会产生什么期待或风险。
      - 回收时是否会改变人物、关系、规则或主线理解。
