id: builtin-skill--short-submission
name: 短篇投稿结构设计
summary: 根据用户指定的平台目标，完整设计平台基调、导语骨架、黄金三角、付费点、投稿成品和双平台格式。
is_enabled: true
content: |
  # 投稿范式：平台基调 · 导语 · 付费点

  短篇是投出去过稿的，不是写完就算。这份方法论管三件投稿层的事：按平台定基调、单独打磨导语、把付费点卡在断点上。题材招式仍按用户提供的题材资料，本文只叠加“投稿怎么写才收得掉”这一层。当前会话人工执行，不调用网络、不写入项目目录、不依赖外部 Agent。

  ## 一、先定平台基调

  动笔前先确认投稿平台，正文的视角、矛盾烈度、章末钩子、结局质感随之切换。三大主流基调：

  | 平台 | 视角 | 矛盾演进 | 章末钩子 | 结局质感 |
  |---|---|---|---|---|
  | 知乎盐选 | 第一人称沉浸，生活化违和感切入（“老公副驾驶有根红头发”） | 心理战、信息差，靠细节拼图“细思极恐”，情绪层层剥洋葱 | 发现一个颠覆前文认知的炸裂细节，悬念内敛后劲大 | 极致反转 / 因果轮回 / 高智商收尾，留白多、重余韵 |
  | 小程序 | 上帝视角或强情绪第一人称，开局即地狱 | 冲突全外化到对白和动作，走“被羞辱→亮底牌→当众打脸→夺实利”快循环 | 卡脖子断点（巴掌将落、协议撕一半、话说一半） | 直白粗暴的爽，反派付实质代价（破产/入狱/众叛亲离），主角高位不留遗憾 |
  | 番茄短篇 | 流畅第一/第三人称，目标清晰、金手指直白 | 顺滑无毒点，反派挑衅一两节内转成主角升级/发财的垫脚石 | 开新地图 / 拿到新底牌 / 新人物带资源登场 | 圆满畅快，事业感情双收，坏人受罚 |

  - 小程序收稿量最大，打脸爽文是主力盘；同一个脑洞可以分别按知乎/小程序/番茄各跑一版，挑最顺的投。
  - 基调只调“声音和落点”，不覆盖题材招式和本篇情绪目标。基调是投放渠道的声音，与“短篇正文格式”的排版模板是两个轴——小程序基调的稿，排版仍按正文格式选一套 app 模板。
  - **调基调不松去 AI 底线**：强情绪靠具体动作和对白落地，别把话硬拆成三字碎句成片排列；前情背景靠场景带出，别整段插叙成“来龙去脉”说明书；对仗句式（“上辈子…这辈子…”）别高频复用。去 AI 味仍按完整去模板化规则。

  ## 二、导语（投稿门面，单独打磨）

  导语是正文最前面的引子，也是编辑第一眼看的东西。编辑一天审几百篇，**导语不行，正文再好也被一眼刷掉**。所以导语要单独当一件作品来打磨，别指望编辑往下翻。

  - **长度与形态**：约 150-220 字（题材包如写 150-300，投稿时按此收紧），就是正文开头那几段。一句一段指完整句各自独立成段，不是把整句拆成三字碎句；这是黑岩/盐言导语的形态，番茄导语按“短篇正文格式”该平台的短段叙织即可。导语写完即接正文（内容本身就是第一章开头，不重写）。
  - **四维骨架**：起因（悲剧源头或荒诞开端）+ 核心冲突（被凝视、被剥削、被算计的绝境）+ 人设底色（清醒、有底牌，不是纯惨）+ 情绪反转（钩子卡在最后半句，戛然而止）。
  - **黄金三角**：一个有冲击力的具体物件（撕碎的 B 超单、代持协议、落灰的旧相机）+ 一个信息差（主角藏在暗处的底牌，读者知道、施害者不知道）+ 一个留白的致命钩子。
  - **反面**：别用导语平铺背景或抒情；别把底牌全亮完（留给正文兑现）；别只写惨不写“她有后手”。

  ## 三、付费点（投稿结构）

  短篇按“免费试读 + 付费点 + 付费正文”投稿（投稿语境的“章”即本 Skill 的“节”）。付费点是免费段和付费段的分界，卡不好读者不付费，卡对了转化高。

  - **断点位置**：付费点卡在一个章末的卡脖子断点上——一个即将揭晓、读者必须付费才能看到的反转或对决瞬间（亲子鉴定撕开一半、底牌刚要拍上桌、名字念到一半）。别把核心大爽点在免费段全放完。
  - **剧情点密度**：付费点前每章 2-3 个剧情点（快速立处境、埋钩、层层加压）；付费点后每章比之前多 1-2 个（集中兑现打脸/反转/爽点）。剧情点适度加，太多会乱。
  - **反推法排细纲**：先定付费点卡在第几节章末，先把那一节的剧情想透（如复仇虐爽：前几节情绪递进越来越虐，付费点节章末预示反击），再倒推安排前面各节“情绪冲突逐渐递进”，最后排付费点之后的兑现段。
  - **投稿成品形态**：标题 + 导语（不写“导语”二字，只留那几句）+ 数字分节的正文（含付费点断点）。投稿建议区间比框架（8000-20000）更收敛：整篇约 8000-12000 字，每章约 1000-1300 字，章数约 7-12 章。

  ## 四、投稿基调兑现表

  | 基调 | 前段任务 | 后段任务 | 结尾 |
  |---|---|---|---|
  | 虐 | 建立羁绊和不公平伤害 | 补偿、错过或安静钝痛 | 具体动作，情绪落点强 |
  | 爽 | 压制、误判、主角暗牌 | 证据、反击、打脸和升级 | 兑现核心爽感并留余韵 |
  | 甜 | 建立关系和独特互动 | 用具体照顾、选择和承诺兑现 | 不用空泛“我爱你”收束 |
  | 悬疑 | 异常、问题、信息差 | 回收线索并改变理解 | 真相后留下新余波 |
  | 治愈 | 暴露弱点和困境 | 关系、行动或理解产生修复 | 保留安静细节 |

  ## 五、导语骨架

  ```
  {具体时间/场景}，{主角}因为{起因}被迫面对{核心冲突}。
  他/她本来{读者可理解的人设底色或目标}，却发现{信息差/异常事实}。
  {留下一个尚未完成的动作、选择或真相，不泄露结局。}
  ```

  导语必须有事件、处境和可理解的信息差；避免题材标签堆砌、空泛夸张、作者自评、结果全泄露和与正文不一致的语气。

  ## 六、付费断点规则

  - 断点前：建立人物、核心冲突、继续阅读理由和必要线索；至少让读者知道问题是什么、为什么必须关心、谁可能改变局面。
  - 断点位置：动作将完成、证据将揭示、真相将翻转、关系将重新定义或选择即将作出时；断点前必须有铺垫和升温。
  - 断点后：不能重复前段流程，必须增加信息、情绪、反击、反转、选择后果或余韵。
  - 禁止：无关新人物、新设定、强行误会、毫无铺垫的截断、靠未处理问题假装余韵。
  - 结尾：完成主线核心情绪；悬疑可留新问题，但不能留下本篇应该处理的旧问题。

  ## 七、投稿成品验收

  - [ ] 导语有具体事件、主角处境、核心冲突和信息差，没有泛题材介绍。
  - [ ] 投稿基调与正文事件、人物选择和结尾情绪一致。
  - [ ] 开头独立抓人，前段已建立继续阅读理由。
  - [ ] 断点卡在动作、证据、真相或关系变化未完成处，前后两段功能不同。
  - [ ] 断点后有新增信息或情绪兑现，没有无关人物和强行误会。
  - [ ] 结尾完成本篇主线情绪，具体落到动作、对话或画面。
  - [ ] 正文无过程说明、平台内部元信息、占位符和未处理旧问题。

  ## 八、短篇正文格式：章节标记

  全文统一一种，不混用。

  | 格式 | 平台适用 | 示例 |
  |------|----------|------|
  | `###1.` | 短篇默认 | `###1.` `###2.` `###3.` |
  | `###第N章` | 番茄 / 七猫 / 古言 | `###第一章` `###第二章` |
  | `1.`（纯数字，无 `###`） | 知乎盐言 | `1.` `2.` `3.` |

  短篇推荐 `###1.` 或纯数字，简洁。番茄系长一点的章用 `###第N章`。

  ## 九、短篇正文格式：两套平台模板

  短篇正文形态按平台分两套。**不设统一的“每段 ≤ 3 句”“800-1500 字 / 节”硬线**，那是长篇迁移过来的产物，会把短篇切成一样长的提纲。先认平台底色，再按疏密原则分配字数。

  ### 黑岩：一句一段，留白快读

  - 一句一段为主，多换行制造下坠和停顿感。
  - 节奏密，每节体量小，节尾必留钩。
  - 单句成段是常态，不要为了“凑够字数”把短句焊回长段。

  模板示意：

  ```
  ###1.

  他递过来一份文件。

  是离婚协议。

  我笑了。

  "签完，你就自由了。"
  ```

  ### 番茄 / 七猫：短段为底色，叙述交织对话

  - 短段仍是手机阅读的底色，但**允许多句回溯叙述段和对话交织**：一段里可以有内心独白、回忆补刀、动作，再接对话。
  - 古言 / 世情可写更长的叙述段，承载完整的情绪链和场景铺陈。
  - 爽点、打脸、反转处压短（可单句成段）；过场、信息交代一句带过。

  模板示意：

  ```
  ###第一章

  我把热汤端到他面前的时候，他正低头看手机，屏幕亮着白月光的名字。三年了，我以为熬过了最难的日子，原来熬的只是我自己。

  "以后这种事不用你做。"他头也没抬，"她不喜欢闻油烟味。"

  我端着碗的手顿了一下。
  ```

  ### 两套共同的硬约束（所有平台）

  - 正文相邻段落之间**只允许一个换行符 `\n`**，不得出现空行或连续换行 `\n\n`（紧密排列）。章节标记前后另算。
  - **无缩进**：不用 `　　`（全角空格）或半角空格缩进，平台渲染器自行处理。
  - **禁正文段落 Markdown**：除统一的小节 / 章节标记（如 `###1.`），正文段落里不用加粗 `**`、斜体 `*`、标题 `#`、分隔线 `---` 等。
  - 长短交错，忌通篇同长度。把每段切成同一字数，正是 AI 腔来源。

  ## 十、对话

  ### 引号

  | 优先级 | 格式 | 适用 |
  |--------|------|------|
  | 首选 | `"说话内容"`（半角） | 短篇默认、番茄、红果、黑岩 |
  | 平台 / 项目指定 | `「说话内容」` | 知乎盐言、部分古言、用户指定 |

  **默认用 `""`**；用户或平台指定盐言风格时用 `「」`，不要把 `「」` 当错误改掉。

  ### 规则

  1. 对话**独立成行**，不嵌在叙述段落里。
  2. 用动作代替对话标签：少用“他说”“她道”“他笑了笑说”，改成动作 beat + 对话；普通的“说”按语境可留。
  3. 两人连续对话省略标签，靠内容区分说话人。

  正确：

  ```
  她把杯子放下。
  "你走吧。"
  他没有动。
  "我说，你走吧。"
  ```

  错误：

  ```
  她把杯子放下，说道："你走吧。"他没有动，她又说："我说，你走吧。"
  ```

  ## 十一、标点硬约束

  **本仓库正文统一不出现 `……` / `——` / `—` / `--`**。叙述、对话、心理描写一律适用，无对话例外。

  停顿、哽咽、未尽、被打断、留白，一律用以下手段实现：
  - 短句、句号、逗号断开。
  - 动作 beat（“她顿了一下”“他攥紧了拳”）。
  - 换行 / 单句成段。

  其余标点跟语气走：

  | 语气 / 功能 | 标点 | 防线 |
  |---|---|---|
  | 压迫 / 冷静 / 克制 | 短句、逗号、句号，必要时冒号压判断落点 | 不人工加感叹号，也不通篇句号化 |
  | 质问 / 反问 | 问号 + 短促追问 | 别每句都以 `？` 结尾 |
  | 爆发 / 打脸 | 真爆点用 1 个感叹号，连续爆发最多 1-2 处 | 禁 `!!!`、禁整段喊叫式感叹 |
  | 信息揭示 / 判断落点 | 冒号、单句成段制造落点 | 别写论文式分号串 |

  题材包范例里若出现 `……`，只为示意手法，落到正文按本条改写。

  ## 十二、禁正文混入章节元信息

  章节号、写作工程词只允许出现在标题 / 小节标记 / 文件名 / 追踪记录里。正文叙述、对话、心理描写中**不得出现**：

  ```
  第[一二三四五六七八九十百千万两0-9]+章 | 上一章 | 上章 | 前一章 | 本章 | 这一章 | 前文 | 后文 | 伏笔 | 细纲 | 读者
  ```

  要改成角色能感知的事件锚点或相对时间。例：“比第一章那三秒开火更疼”改成“比那三秒开火更疼”。

  例外：角色在故事世界内真实阅读 / 讨论“第 X 章”文本，或角色真实身为作者 / 读者并谈论读者身份时，可保留。

  ## 十三、平台覆盖表

  | 平台 | 章节标记 | 对话格式 | 段落底色 | 特殊要求 |
  |---|---|---|---|---|
  | 知乎盐言 | `1.`（纯数字） | `「」` | 短段 + 叙述交织 | 导语需单独标注 |
  | 番茄 | `###第N章` | `""` | 短段为底色，允许叙述交织对话 | 首段需有吸引力 |
  | 红果 | `###1.` | `""` | 短段为底色 | 无 |
  | 黑岩 | `###1.` | `""` | 一句一段，多换行留白 | 节尾必留钩 |

  用户未指定平台时，默认短篇通用格式：`###1.` + `""` + 番茄系短段底色。

  ## 十四、写完每段快速检查

  - [ ] 段落形态符合目标平台模板（黑岩一句一段 / 番茄系短段交织叙述）？没把它切成同一字数的提纲？
  - [ ] 相邻段落之间只有一个 `\n`，没有空行 / `\n\n`？
  - [ ] 无缩进（没有 `　　` 或空格）？
  - [ ] 标题 / 小节标记之外，正文段落没用 `**` `*` `#` `---` 等 Markdown？
  - [ ] 对话独立成行，引号风格符合平台（盐言 `「」` 合法），对话标签没机械化？
  - [ ] 正文（含对话）里没有 `……` / `——` / `—` / `--`，停顿改用短句 / 动作 / 换行？
  - [ ] 标点跟语气走：没通篇句号化，没乱撒 `？` / `！`？
  - [ ] 正文没混入 `第N章` / `上一章` / `本章` / `前文` / `后文` / `伏笔` / `细纲` / `读者` 这类元信息词（故事内真实阅读 / 真实读者身份语境除外）？

  ## 输出格式

  - 目标平台与待确认规则：
  - 投稿基调：
  - 核心情绪与核心冲突：
  - 导语：
  - 断点位置与理由：
  - 断点前的信息、情绪和剧情任务：
  - 断点后的信息、情绪和剧情任务：
  - 结尾类型与兑现内容：
  - 平台适配风险：

