id: builtin-skill--reader-contract
name: 读者契约与剧情推进审查
summary: 检查核心阅读承诺、主角代理权、期待所有权、收益交换、终局储备和剧情推进风险。
is_enabled: true
content: |
  # 读者契约与终局储备

  读者契约是开篇、题材、主角配置和叙事口吻共同许诺的阅读快感。使用本 Skill 时先确认读者究竟来看什么：主角解决问题、团队群像、导师托举后辈、制度合作建设，还是其他明确承诺。同一情节在不同契约下风险不同。

  ## 一、主角代理权：因果权与结算权

  - 因果权：主角通过决策、布局、授权、不可替代的信息或资源，或者主动选择关键后果，决定事情为什么发生、如何进入和怎样转向。
  - 结算权：核心收益、认可、权力或关键后果依照既有承诺回到应得者。
  - 代理权不等于主角永远亲自动手，也不要求主角垄断每个镜头。可以组队、被救、接受指导或让他人执行局部动作，只要因果和结算没有被无声夺走。
  - 直给爽文通常期待主角当面出手和兑现；布局、权谋、经营、群像和导师题材可以让主角幕后运筹，但要明确主角的不可替代贡献。

  ## 二、期待所有权与关键节点四问

  承诺的高光属于本卷或本剧情单元已经许诺的主角或其他所有者。配角可以执行局部动作，但不能无声夺走期待所有权。群像、导师或制度合作可以把高光明确给团队成员、学生或机构，但要提前承诺并按约结算。

  遇到关键节点统一问：
  1. 谁决定事情为什么发生或如何进入？
  2. 谁作出不可替代的关键选择？
  3. 谁承担或选择关键后果？
  4. 核心收益、认可和权力最终结算给谁？

  ## 三、利益安全与期待债

  - 利益安全：读者相信自己追的核心卖点不会被没收、稀释、转赠或交给无关角色消化。
  - 谁铺垫、谁承压、谁选择，谁应拿到主要情绪回报；旁观者和配角反应可以放大爽点，不能替代核心兑现。
  - 金手指、关键资源、身份底牌、独家技术和关键证据不得无交换交出、暴露或被接管。必须交出时要获得可见交换：权力、保护、资源、渠道、名分、债权、信息、阶段胜利或更大主动权。
  - 每次承诺都会产生期待债：主角会反击、资源会升级、身份会揭开、感情会推进。延期可以，但必须支付利息：阶段性进展、新信息、局势变化、情绪释放或更清晰的下一目标。
  - 用解释、设定或机构流程拖延兑现，会增加合理化债务。

  ## 四、终局储备与推进节奏

  ### 终局底牌
  头号宿敌、终极真相或身世、金手指上限、身份或地位终点、核心情感最终确定，都属于一次性终局资源。设计时分阶段解锁，一卷通常只解锁一个大的终局里程碑，不能提前烧光。

  ### 升级台阶
  境界、等级、地图、势力层级和目标敌人要有剩余梯队。体系台阶不足是设计问题，不靠每章憋字解决；敌人、地图和目标逐级解锁，禁止提前秒杀顶级敌人或解决终极目标。

  ### 单元密度
  每个剧情单元设置一条主推线，例如战力、资源、身份、关系、信息、地图、制度、势力、事业或情感确定性，其余线可以自然产出战果。一场大胜同时破境、缴获、收势力、涨声望或推进关系是允许的，只要都没有越过阶段边界。

  快节奏作品保留每章可见事件或爽点推进；慢热、种田和情感作品可以只改变目标、风险、信息、关系、资源、身份或情绪立场之一。低压章用小而可见的变化承接，不强求每章高潮。高潮后可以短暂低压，让读者拿到小而可见的奖励后再进入下一轮压力。

  ### 透支两问
  1. 是否动用了本阶段还不该解锁的终局底牌？
  2. 是否让某条升级线逼近天花板，后面没有台阶可接？

  任一为“是”就是透支预警，需要回退或改纲；两者都为“否”时，多线齐涨通常可以放行。这是经验判断，按题材、平台和本书里程碑调整，不是固定硬门槛。

  ## 五、机构与旁观者

  政府、总部、组织、公司和其他高层级机构不是天然有毒，但一出现就可能开启制度和势力范围情节线。若开篇已承诺制度合作，主角可以作为专家、指挥者、关键资源拥有者或不可替代执行者，获得明确权力、保护、资源、收益或行动权限。

  旁观者适合负责震惊、误判、舆论扩散、资源报价、敌我站队和见证主角选择。不要让旁观者替主角复仇、替主角做最终裁决或拿走核心收益。

  ## 六、风险等级

  | 等级 | 定义 | 处理 |
  |---|---|---|
  | 契约安全 | 与开篇题材一致，主角有关键选择和不可替代贡献，收益归属清楚 | 可写，继续把交换和收益可视化 |
  | 需要补强 | 可能稀释高光或推进过快，但可用铺垫、交换、成本或题材声明修复 | 写前补理由、代价或阶段边界 |
  | 契约破坏 | 没收核心卖点，主角控制或因果权下降，无关角色夺走期待，核心资产无交换上交 | 必须修纲 |

  自愿让出聚光灯不自动等于契约破坏。只有长期净收益为负且主角控制或因果权下降，尤其没有可见战略交换时，才应判红。群像、导师和制度合作若开篇已承诺，可以按各自契约结算高光。

  ## 七、好坏例与续接风险

  - 好的授权：主角掌控方案、关键资源、谈判和风险，配角执行局部动作并证明主角识人或组织能力。
  - 坏的上交：主角无条件交出独家技术、金手指或关键证据，只换口头感谢，后续由机构推进主线。
  - 好的助攻：配角可以助攻或见证，关键证据、布局、决断、公开裁决或最后反击仍由主角完成。
  - 坏的抢结算：压迫主角多章的敌人被路过强者或随机事故解决，主角没有选择、出手、认知或资源变化。
  - 好的多线推进：一次胜利带来多个阶段内收益，但只揭一层真相、退一个敌人梯队、保留终局底牌。
  - 换书债：引入新地图、机构、能力、敌人或谜团时，既要支付必要铺垫，也会新增期待债，不能用新鲜元素逃避旧承诺。

  ## 八、审查输出

  - 核心读者承诺：
  - 本阶段应该交付的情绪和高光：
  - 主角因果权：
  - 主角结算权：
  - 关键节点四问：
  - 核心资产与可见交换：
  - 期待债与已支付利息：
  - 终局底牌和升级台阶风险：
  - 风险等级：契约安全 / 需要补强 / 契约破坏
  - 最小修正方向：

  ## 九、读者契约决策树

  1. 写出开篇承诺：题材、主角身份、核心能力、主要关系、核心情绪、阅读奖励和叙事视角。
  2. 写出本阶段承诺：读者正在等哪一个反击、升级、真相、关系变化、制度结果或情绪兑现。
  3. 标记关键节点的因果权、选择权、后果承担和收益结算者。
  4. 若主角没有亲自出手，检查是否拥有方案、授权、关键资源、不可替代信息或风险承担；有则不自动判毒。
  5. 若配角获得高光，检查是否在开篇或本阶段提前承诺，且主角的长期净收益、控制权或关系收益可见。
  6. 若资产被交出，记录交换的权力、保护、资源、渠道、名分、债权、信息、阶段胜利或未来主动权；没有交换就是契约风险。
  7. 若延期兑现，写出已支付的利息：阶段进展、新信息、局势变化、情绪释放或清晰的新目标。
  8. 检查是否烧掉宿敌、终极真相、身份终点、金手指上限或最后关系确定；若烧掉，必须重排阶段边界。

  ## 十、典型对照

  | 情况 | 判定 |
  |---|---|
  | 主角掌控方案和关键资源，配角执行局部动作 | 安全，主角仍有因果权 |
  | 主角无条件交出独家技术，只换口头感谢，机构接管主线 | 破坏，核心资产无交换 |
  | 配角助攻并见证，关键证据、布局和最后反击归主角 | 安全，助攻不等于夺走结算 |
  | 压迫主角多章的敌人被路过强者或事故解决 | 破坏，主角没有选择和结算 |
  | 一次胜利同时获得多个阶段内收益，只揭一层真相 | 通常安全，多线齐涨但未越阶段 |
  | 引入新地图和敌人来逃避旧承诺 | 风险，需补铺垫并支付期待债 |
references:
  - name: 契约审查清单
    content: |
      - 本段是否交付题材承诺，而不是退化成通用升级或流程。
      - 主角是否拥有关键因果的判断、选择、授权或结算权。
      - 核心收益、认可和权力是否回到承诺的归属者。
      - 行动成本是否真实且与收益相关，不为制造“成本”凭空惩罚。
      - 核心资产是否有可见交换，是否被无关机构或配角接管。
      - 期待债是否被偿还、延期并支付利息，是否被解释和流程吞掉。
      - 是否提前消耗终局真相、终极敌人、能力上限或身份终点。
      - 新地图、新机构、新能力和新谜团是否支付换书债。
  - name: 风险判定
    content: |
      - 契约安全：承诺、主角代理权、收益归属和阶段边界清楚。
      - 需要补强：方向正确，但需要补交换、铺垫、成本或可见收益。
      - 契约破坏：核心快感被替换，主角被夺走关键因果或提前耗尽长线资源；必须修纲。
  - name: 原始契约边界与案例
    content: |
      # 读者契约原始补充

      本参考用于检查读者契约、主角代理权（叙事能动性与主导性）、利益安全和阶段推进。相关判断来自问题帖与避坑帖样本，属于非统计共识，不能替代具体题材、平台和对标书判断。不得把来源站点隐私数据、访问凭证、cookies、tokens、请求签名、私有标识符或可反推出私域账号的信息带入运行时。

      ## 核心概念补充

      - 主角代理权首先看因果权与结算权，不看出场时长，也不要求主角永远亲自动手或垄断每个镜头。
      - 直给爽文中，主角亲自出手、当面碾压本身就是契约兑现；布局、权谋、经营、群像和导师题材才默认允许幕后运筹、隔人兑现。
      - 群像、导师和制度合作可以把期待所有权明确给团队成员、学生或机构角色，关键是预先承诺、按约结算，而不是事后解释抢戏合理。
      - 成本可以是时间、关系、暴露、资源消耗或新敌意；低压、过渡和纯奖励章不强制附加代价。

      ## 机构解释与合理化债务

      解释成本用于说明机构响应或接管、保密、资源调动、跨区执法和组织协作为什么成立。审查这些解释是否服务核心情绪；如果解释吞掉爽点、代入或主角高光，应缩短解释、改成可见交换，或把机构反应降级为旁观、阻碍或资源接口。

      ## 典型例外

      - 群像契约：每个 POV 有自己的目标和偿还，卷契约写清谁在本卷拥有高光。
      - 导师契约：导师主角的高光在设计训练、识破困局、关键兜底和承担更高层代价，不是每次亲手收割。
      - 制度合作契约：开篇即承诺国家或机构协作，主角以专家、指挥者、关键资源拥有者或不可替代执行者身份获得明确权力和收益。
      - 悲剧、悬疑和群像战争可让他人完成局部动作，但主角应获得新的核心任务、代价或认知推进。

      ## 续接风险

      换书债：引入新地图、新机构、新能力、新敌人或新谜团，既要支付必要铺垫成本，也会新增期待债，不能靠新鲜元素逃避旧承诺。履约爽文或能力幻想中，主角反复因愚蠢或可避免的无能制造灾难，再由别人收拾，会持续损害因果权、控制感和结算信任；这是依题材契约判断的高风险，不是所有故事的绝对禁令。
