id: builtin-skill--emotional-arc
name: 情绪弧线与情感拉扯
summary: 设计故事情绪弧线、情感羁绊、撕裂、蓄力、释放与余韵，控制读者情绪的起伏和兑现。
is_enabled: true
content: |
  # 情绪弧线执行指令

  先按“决策路由表”选择弧线或情感策略，再按对应的完整方法论设计情绪。必须区分角色情绪、文本传递情绪和读者实际情绪，保留触发事件、比例、赌注、期待开环与闭环。完成后执行全部原始检查清单，不得只用“热血”“悲伤”等标签概括。
references:
  - name: 情绪弧线设计原始方法论
    content: |
      # 情绪弧线操作手册

      ## 决策路由表

      | 你想写的情绪效果 | 选哪个弧线 | 关键要点 |
      |------------------|-----------|----------|
      | 虐完翻盘 | V 形 | 谷底 60-70%，治愈急速回升 |
      | 甜完刀死（BE） | 倒 V 形 | 高点 40-50%，坠落比上升快 |
      | 多反转猜不到 | W 形 | 每峰比前高，上限 3 起伏 |
      | 层层打脸升级 | 递进形 | 无回落，像台阶往上 |
      | 隐忍后大爆发 | 延迟满足 | 前 70-80% 铺垫，最后集中爆发 |
      | 结尾颠覆 | 急转形 | 70-80% 处急转弯，前面线索要能回看说通 |

      可叠加两种弧线（如“延迟满足 + 急转”），不超过两种。

      ## 六种弧线速查

      ### 一、V 形弧线（虐 -> 治愈）

      ```
      情绪
      10 |          *
       9 |         / \
       7 |        /   \
       6 |       /     *  治愈高点
       1 |  *  虐谷底
         +------------------> 进度
           0%  40%  70%  100%
      ```

      操作要点：谷底放在 60-70%，治愈急速回升，结尾情绪必须高于起点；谷底要够深，转折要突然，治愈不拖，谷底停留 1-2 场景即转折。

      | 题材 | 虐的部分 | 治愈的部分 |
      |------|----------|------------|
      | 重生复仇 | 前世被虐 | 重来后翻盘 |
      | 破镜重圆 | 分开的痛苦 | 重新在一起 |
      | 亲情催泪 | 误解/亏欠 | 和解/明白真相 |
      | 成长治愈 | 低谷遭遇 | 重新站起来 |

      字数分配（12000 字）：起始 10% -> 下沉 30% -> 谷底 15% -> 转折 10% -> 治愈上升 25% -> 高点收束 10%。

      ### 二、倒 V 形弧线（爽 -> 反转 -> 低谷）

      ```
      情绪
      10 |     *
       5 | *     \
       1 |        *  BE 落点
         +------------------> 进度
           0%  30%  60%  100%
      ```

      操作要点：高点放在 40-50%，反转后急速下坠；坠落速度必须快于上升，BE 结尾不加糖。

      | 题材 | 爽的部分 | 坠落的部分 |
      |------|----------|------------|
      | BE 虐恋 | 甜蜜/幸福 | 真相/分离 |
      | 职场翻车 | 升职/成功 | 发现是陷阱 |
      | 友情背叛 | 亲密无间 | 背后的算计 |
      | 信任崩塌 | 深信不疑 | 被欺骗的真相 |

      字数分配（12000 字）：起步 10% -> 上升 35% -> 顶点 10% -> 反转 5% -> 坠落 30% -> 低谷收束 10%。

      ### 三、W 形弧线（多起伏）

      ```
      情绪
      10 |       *           *
       5 |  *         \ /
       4 |             *
         +--------------------> 进度
           0%  20%  40%  60%  80%  100%
      ```

      操作要点：至少两个波峰一个波谷，通常三个起伏；每个峰必须比前一个高，最终峰在 80-90%；起伏之间必须有喘息空间，上限 3 个起伏。

      | 题材 | 说明 |
      |------|------|
      | 多反转悬疑 | 每次以为猜到了就再来一个反转 |
      | 追妻火葬场 | 反复拉扯，每次以为和好了又出问题 |
      | 商战博弈 | 你来我往，每次以为赢了又翻盘 |

      字数分配（15000 字，3 起伏）：起步+第1峰 25% -> 第1谷 10% -> 第2峰 25% -> 第2谷 10% -> 第3峰 20% -> 收束 10%。

      ### 四、递进弧线（逐步升级）

      ```
      情绪
      10 |                     *
       7 |             * /
       5 |       * /
       3 | * /
         +--------------------> 进度
           0%  25%  50%  75%  100%
      ```

      操作要点：不能有回落，像台阶一阶一阶往上；最高点在 85-95%，中间只给小胜利，不提前释放。

      | 题材 | 递进方式 |
      |------|----------|
      | 打脸爽文 | 一个一个打，每个比上一个狠 |
      | 层层揭秘 | 真相一层比一层震撼 |
      | 逆袭翻盘 | 每一步翻盘都比上一步大 |

      字数分配（10000 字）：压迫 20% -> 第1阶反击 20% -> 第2阶反击 25% -> 第3阶反击 25% -> 收束 10%。

      ### 五、延迟满足弧线（长铺垫 -> 爆发）

      ```
      情绪
      10 |                       *
       5 |              *--------|
       3 |       *------         |
       1 | *------                |
         +-------------------------> 进度
           0%  20%  40%  60%  80%  100%
      ```

      操作要点：前 70-80% 压制/铺垫，最后 20-30% 集中爆发；铺垫阶段每段必须有信息量和张力，不能无聊；压的方式要多样，爆发要密集，爆发后快收。

      | 题材 | 压的部分 | 爆发的部分 |
      |------|----------|------------|
      | 复仇爽文 | 隐忍、装弱、被欺压 | 一朝翻盘、全面清算 |
      | 身份揭秘 | 隐藏实力/身份 | 真实身份曝光，全场震惊 |
      | 长线布局 | 主角暗中操作 | 所有棋子同时落位 |

      字数分配（12000 字）：初始压制 20% -> 深层铺垫 25% -> 压力最大 15% -> 爆发触发 5% -> 集中爆发 25% -> 收束 10%。

      ### 六、急转弧线（70-80% 处急转弯）

      ```
      情绪
      10 |                *  急转后的新高/低点
       8 |           *--/
       3 |      /
         +-------------------------> 进度
           0%   30%   70%  80%  100%
      ```

      操作要点：前 70-80% 正常弧线，70-80% 处突然转向；急转只占 1-2 段，前面埋的线索回看时必须说得通。

      | 题材 | 前半段 | 急转后 |
      |------|--------|--------|
      | 细思极恐 | 温馨日常 | 恐怖真相浮现 |
      | 身份错位 | A 视角叙事 | 其实是 B |
      | 动机反转 | 以为是爱 | 其实是恨/利用 |

      字数分配（10000 字）：建立假象 35% -> 推高假象 30% -> 假象高点 10% -> 急转 5% -> 真相展开 15% -> 新情绪收束 5%。

      ## 中段加压四手段

      1. **公开升级**：把私下伤害搬到公开场合（家宴、公司会议、直播、典礼）。
      2. **双重背叛**：已知一层背叛后再加一层（经济背叛、名誉背叛、立场反转、证据篡改）。
      3. **代价加速**：不行动的代价不断升高（失去机会、当众羞辱、连累他人）。
      4. **战略性沉默**：主角暂不反击，沉默本身持续加压（他人误读、反派更放肆）。

      ## 题材赛道策略

      | 赛道 | 最佳爽点 | 中段重点 | 结尾偏好 |
      |------|----------|----------|----------|
      | 婚恋/追妻火葬场 | 开篇羞辱->公开反杀->渣男后悔->身份翻盘 | 公开/私下反差、代价升级、至少一个 mini-payoff | 静默优越、社会地位反转 |
      | 家庭伦理/亲情 | 高压现实场景、家人背叛断裂感 | 层层施压、道德绑架、一次拒绝兜底 | 边界清晰、脱离旧结构 |
      | 都市逆袭/职场 | 被轻视->展现实力->身份揭露 | 能力被低估但持续展示、关键场合意外表现 | 身份真相大白、对手代价可视 |
      | 悬疑反转 | 反常事实->层层剥开->颠覆认知 | 每层揭露引发新问题、至少一次“以为找到了但不是” | 真相一击（最后一句话重构全篇） |

      ## 期待感管理六法则

      1. **期待最大化定律**：爽点到来前那一刻是全篇张力最高位置。将满足而未满足时，读者需求最大。
      2. **信息顺序操纵**：先植入什么信息，读者就先入为主往哪个方向想。控制信息顺序 = 控制读者预期。
      3. **期待递增法**：在基底期待上不断添加细节，注入更具体化的需求缺口。添加的细节必须与核心梗一致。
      4. **断期待禁止**：下一个期待立起来之前，绝不能结束当前期待。旧期待即将兑现时，新期待的种子必须已种下。
      5. **下行情节安全原则**：写情绪下行时，锅都是别人的，功都是主角的。下行中必须给读者安全感（可能的解法/潜在收获）。
      6. **爽点递增对比**：连续爽点逐级递增。维度：影响范围（个人->群体->社会）、揭示深度（表象->本质->颠覆）、身份落差（路人->大佬->全场震惊）。

      ## 情绪核心公式

      写每个场景时分离三层情绪：角色自己的情绪（角色感受到的）、文本传递的情绪（文本要让读者感受的）、读者实际感受的情绪（读者真正的体验）。同一场景三层可以完全不同：角色在哭，文本在撩，读者在爽。

      例：女主当众被退婚，强忍着没掉泪——角色：屈辱；文本写她嘴角还挂着笑（角色：撑）；读者替她憋着、等后面打脸（读者：爽前蓄力）。

      ## 前反应-复现-后反应情绪结构

      用于虐/悲壮/遗憾类场景。按顺序执行：前反应，让读者提前知道坏结果，然后描写美好事物；复现，让坏结果真的发生；后反应，主角真情流露，作出改变（愤怒/拼命/振作）。操作示例：知道某人一天后要死 -> 让她经历美好（逛街、看烟花） -> 她真的死了 -> 主角愤怒拼命。

      ## 以小搏大情绪结构

      用于热血/逆袭类场景。按顺序执行：前反应，铺垫弱者的苦，用现在的弱与以前的强对比；复现，强者到来，“我知道你们苦，我来了”；后反应，弱势方被拯救；士气如虹，整体气势转变。

      ## 冲突中的情绪层次与死亡赌注

      | 赌注类型 | 适用场景 | 操作要点 |
      |----------|----------|----------|
      | 肉体死亡 | 恐怖诡异文 | 主角过强时赌注必须转为事业死亡，否则全书崩溃 |
      | 事业死亡 | 职场竞争、修仙门派争斗 | 失败 = 一切归零 |
      | 心理死亡 | 感情崩塌、信念毁灭 | 情绪冲击最深，优先用于感情线 |

      选一种作为主要赌注贯穿全书，其他辅助推动情节。对立双方必须无法轻易脱身，可用四种黏结剂：杀人理由（序列唯一性必然冲突）、工作职责、道德责任（亲人遇险）、实体场所（副本密室）。第一卷结局不能太圆满；解决一个麻烦的同时必须埋下下一个麻烦；越到后期，情绪张力必须越大。

      ## 基于不该如此的情绪驱动

      “不该如此”是最根本的情绪驱动力：写诬告、不公、恃强凌弱，读者天生生出“不该如此”的念头。核心情绪逻辑：想要爽，必先不爽；想要公平，必先不公平；想要强大，必先不强大。“悬而未决”也是强驱动力。好的题材必须具备勾起人们惋惜、渴望改变的特质。

      ## 理念矛盾的情感爆发力

      理念之争比利益之争更能引发读者深层共鸣；少量关键场景即可，不需要大量笔墨。理想主义与现实的冲突是塑造配角封神级人设的手法。理念认同 = 人设认同 = 读者情感投入。在主线中穿插理念型角色，用他们的追求和牺牲拔高全书情绪上限。

      ## 情绪调动的三层方法

      三层：**长期感情投入**、**短期事件冲突**、**场景描绘**。三者可叠加，核心是前两层。

      ### 长期引导三步骤

      1. **抛出共鸣炸弹**：找到角色最易引发共鸣的情感锚点（梦想、仇恨、恐惧）。
      2. **让读者变见证者**：展示角色付出和挣扎，每一步伴随收获。
      3. **让读者变参与者**：通过足够铺垫和细节，产生命运共同体感。

      ### 短期情绪引导

      短期靠独立事件冲突。**直白冲突比繁杂情节更容易引起共鸣**。事件分为推动情节发展的事件（让读者对角色处境产生认同）和塑造人物性格的事件（让读者对角色思想性格产生认同）。开篇必须选择塑造人物性格的事件，先认同角色这个人才关心角色的事。

      ### 情绪代入的陷阱

      读者未代入主角前，主角弱势可以引起同情，但**敌人弱势也同样引起同情**。读者还没建立认同时，不要把对手写得可怜。

      ### 情绪文笔技法

      短句 = 果决热血；情绪词如“骤然、猛然、刺眼”制造紧迫感；动作词如“抽、划、留下”强化画面并外化情绪；形容词精准克制使用。优先通过角色行为暗示情绪，而非直接描写。**以乐写悲**：角色在最悲伤时表现开心，情绪张力更强，赴死的人很开心往往比哭更悲。

      ## 男频恋爱文情绪设计

      ### 两大核心需求

      - **情绪价值**：读者缺爱，小说中漂亮优秀女生欣赏自己，填补情感空缺。
      - **自尊价值**：带校花/女总裁出场，旁人羡慕嫉妒恨。

      ### 恋爱当升级文写

      设定“好感度进度条”（路人->好人->朋友->喜欢不自知->...）。暧昧拉扯的过程通常比在一起的结果更吸引读者。制造内外部阻碍阻拦两人走到一起，通过克服阻碍加深感情。

      ### 感情升级的不对称性

      两条进度线不能齐头并进：情感快于社会关系（双方好感早已拉满但嘴硬不表白），或社会关系快于情感（穿越自带老婆/未婚妻，好感为零需逐步提升）。

      ### 关键禁忌与技巧

      男主不要主动追求，不要舔狗，用自身优秀品质吸引女主注意；事业线不可或缺，女主对主角事业起积极作用；要写女主对主角好，根据人设设计付出方式（自卑型偷偷塞丹药、傲娇型嘴硬做便当、直率型大方送礼物）；使用时间线对比和双标（对别人 vs 对主角）；用双重身份等信息差拉期待。

      ## 情绪调动统一视角

      终极公式：**平静 -> 调动 -> 释放 -> 爽**。

      | 技法 | 调动 | 释放 | 结果 |
      |------|------|------|------|
      | 装逼打脸 | 反派嚣张 | 主角碾压 | 爽 |
      | 拉仇恨 | 负面情绪 | 恶人受罚 | 爽 |
      | 先抑后扬 | 打压 | 爆发 | 爽 |
      | 期待感 | 制造鸿沟 | 弥合鸿沟 | 爽 |

      每个场景标注读者当前情绪在哪个阶段、下一步是调动还是释放。只有调动没有释放 = 读者憋屈弃书；只有释放没有调动 = 爽感平淡无力；调动程度决定释放爽度。

      ## 期待感维持的底层机制

      目标是角色要做什么，期待感是读者对目标达成后会怎样的预期。有目标无期待，读者不在乎结果，必须把目标转化为期待。

      确定型期待（爽文）：读者知道主角会赢，写“怎么赢”，过程创意大于结果悬念；不确定型期待（悬疑）：读者不知道结果，结果悬念大于过程体验。爽文不怕剧透，因为期待在过程不在结果。

      开环 = 制造鸿沟（提出问题/悬念）；闭环 = 弥合鸿沟（回答问题/揭晓）；嵌套开环 = 闭环一个期待的同时开启新的。规则：闭环一个期待时，必须已有下一个开环在运行。感情线没有阻碍 = 没有期待 = 白给 = 无意义，鸿沟来源包括身份差距、家族反对、误会、使命冲突。

      ## 质量检查清单

      ### 弧线选择与节奏
      - [ ] 弧线类型是否匹配你想写的情绪效果？（对照决策路由表）
      - [ ] 关键转折点是否在正确的进度位置？（V形谷底60-70%、倒V高点40-50%、急转70-80%）
      - [ ] 字数分配是否符合所选弧线的比例要求？

      ### 调动与释放
      - [ ] 每个场景是否清楚当前是“调动”还是“释放”阶段？
      - [ ] 是否存在只有调动没有释放的段落？（会憋屈弃书）
      - [ ] 是否存在只有释放没有调动的段落？（爽感平淡）
      - [ ] 连续爽点是否逐级递增？（影响范围/揭示深度/身份落差）

      ### 期待感
      - [ ] 每个目标是否已转化为读者期待？
      - [ ] 闭环一个期待时，下一个开环是否已在运行？（断期待禁止）
      - [ ] 感情线是否设置了阻碍？（无阻碍 = 无期待）

      ### 情绪代入
      - [ ] 开篇是否用了塑造人物性格的事件？（先认同人，再关心事）
      - [ ] 读者未代入主角前，是否避免了把对手写得可怜？
      - [ ] 下行情节中是否给了读者安全感？（锅是别人的，功是主角的）

      ### 长线维护
      - [ ] 解决一个麻烦时是否同时埋下了下一个麻烦？
      - [ ] 越到后期情绪张力是否越大？
      - [ ] 死亡赌注是否选了一种贯穿全书？
      - [ ] 对立双方是否有黏结剂无法轻易脱身？
  - name: 情感设计原始方法论
    content: |
      # 情感设计方法：三板斧 + 拉扯节奏 + 失败模式

      ## 决策路由

      | 你的情感设计场景是 | 用这个策略 | 跳转到 |
      |---------------|-----------|----------|
      | 建立角色羁绊（让读者相信关系） | 羁绊铺设（第一斧） | 三板斧 §1 |
      | 制造情感撕裂（反差/错位/背叛） | 情感撕裂（第二斧） | 三板斧 §2 |
      | 写结尾余韵（安静细节击穿读者） | 余韵钝痛（第三斧） | 三板斧 §3 |
      | 规划整体情感节奏曲线 | 拉扯节奏设计 | 拉扯节奏 |
      | 不同题材的情感策略选择 | 题材策略差异 | 按题材 |
      | 检查情感设计是否有效 | 失败模式排查 + 快速自查 | 底部清单 |

      ## 情感虐心三板斧

      ### 第一斧：羁绊铺设（前 1/3）

      **目标**：用具体物件/数字/细节建立关系质感，让读者相信这段关系是真实的。

      **方法**：用具体数字建立时间感：“相恋八年”“昏迷五年”“七年光景”；用具体物件承载感情：金锁（姐姐的生日礼物）、账本数字（还债记录）、木头小马（父王磨的）；用重复动作建立习惯：每天一碗粥、每两周来看一次、每年冬天冻得睡不着。

      **案例**：
      - 《迟来二十年》：用二十年的账本数字（八万块）建立母女关系的重量
      - 《我在佛前求你》：昏迷五年、求神拜佛的细节、从初中开始的暗恋
      - 《皇弟欺负幼子》：七年质子生涯的具体苦难（跪雪地、挨巴掌、吃馊饭）

      **核心**：羁绊越具体，后面的撕裂越痛。不要用“他们很相爱”这种抽象描述。

      ### 第二斧：情感撕裂（中后段）

      **目标**：制造反差，让读者以为恨对了 → 发现恨错了（或反过来）。

      **方法**：反差法，先展示温暖一面，再用残酷真相击碎；错位法，角色 A 以为在保护角色 B，实际上在伤害；延迟真相法，关键信息在读者最不期待的时候揭示。

      **案例**：
      - 《姐夫捎路要奶粉钱》：妈妈表面软弱可怜，实际一直操控姐姐索取钱财 → 金锁是假的（金包铜）→ 反差撕裂
      - 《皇弟欺负幼子》：王氏表面温柔（送手炉、煎汤药）→ 实际下药逼疯先皇后 → 用诛心话逼死
      - 《重生弟弟》：弟弟深爱女友 → 女友是诈骗犯 → 怀孕是假的 → 被骗到电诈园区

      **核心**：撕裂的力度取决于铺垫的厚度。没有好的羁绊铺设，撕裂就是无根之木。

      ### 第三斧：余韵钝痛（结尾）

      **目标**：不用大哭大闹，用安静细节击穿读者防线。

      **方法**：用日常动作承载巨大情感：继续喂粥、把衣服叠好、不回头；用物件细节制造余韵：坏掉的金锁、木头小马、沾血的戒指；用“不”制造留白：不解释、不回头、不流泪。

      **案例**：
      - 《皇弟欺负幼子》：“他拿着那匹被我磨得很光滑的木头小马……他握着正好。”
      - 《姐夫捎路要奶粉钱》：“我的手机清净了不少。那些困扰我很久的麻烦，在一瞬间变得很小很小。”
      - 《准儿媳打分》：“办了收养手续后，她第一次踏进这个陌生的家……我知道，这一次我没选错。”

      **核心**：最好的余韵不靠大哭，靠“看完之后很久都忘不掉”。

      ## 情感拉扯节奏设计

      基本节奏曲线：

      ```
      温暖 → 残忍 → 善意 → 真相 → 原谅 → 来不及 → 释然 → 细节暴击
      ```

      不是所有故事都走完整曲线。按题材选择子集：

      | 题材 | 典型节奏 | 核心拉扯 |
      |------|----------|----------|
      | 世情/爽文 | 欺压 → 忍耐 → 爆发 → 打脸 | 情绪反弹快、打脸密度高 |
      | 情感/虐心 | 甜蜜 → 破碎 → 挽回 → 错过 | 慢铺垫、后劲大 |
      | 古言/复仇 | 隐忍 → 布局 → 揭穿 → 报应 | 设定简洁、暴力美学 |
      | 悬疑/推理 | 平静 → 不安 → 真相 → 震惊 | 信息差制造不安 |
      | 年代/亲情 | 误解 → 冲突 → 真相 → 和解 | 代际冲突、时代质感 |

      ### 拉扯原则

      1. **每 3-5 个小节有一次情绪转向**（不能一路虐到底或一路爽到底）
      2. **每次转向都要有触发事件**（不能无理由地改变情绪）
      3. **最后一次转向决定结尾余韵的基调**
      4. **爽文允许快速反弹，虐文需要更长铺垫**

      ## 按题材的情感策略差异

      ### 世情/爽文
      - 情绪反弹速度：快（受辱后 2-3 节内打脸）
      - 打脸密度：每 3-5 节一次
      - 反派嚣张度：递增（第一次小嚣张，最后一次大嚣张）
      - 结尾基调：痛快、解气
      - 案例：《准儿媳打分》— 打分制反制、铁盒零分、断绝关系

      ### 情感/虐心
      - 羁绊细节密度：高（前 1/3 必须建立深厚羁绊）
      - 反差设计：先暖后冷，先甜后苦
      - 余韵技法：安静结尾 + 物件细节
      - 结尾基调：意难平、释然
      - 案例：《姐夫捎路要奶粉钱》— 金锁真相 → 假爱 → 独立

      ### 古言/复仇
      - 设定简洁原则：人物关系清晰，不搞复杂世界观
      - 暴力美学写法：打脸要直接，不拖泥带水
      - 底牌时机：最后 1/4 揭示最大底牌
      - 结尾基调：大快人心、因果报应
      - 案例：《皇弟欺负幼子》— 一声令下打二十棍 → 查出真相 → 废后

      ### 悬疑/推理
      - 信息差布局：读者知道角色不知道，或反过来
      - 排除法结构：逐步排除可能性，最后只剩真相
      - 动机揭示节奏：先揭示做了什么，再揭示为什么做
      - 结尾基调：细思极恐、原来如此
      - 案例：《重生弟弟》— 重生设定 + 诈骗犯身份 + 电诈园区

      ### 年代/亲情
      - 代际冲突处理：不站队，展示双方的苦
      - 时代细节质感：用时代特有的物件/习俗建立质感
      - 和解节奏：不急和解，先让双方充分受伤
      - 结尾基调：温暖中带着遗憾
      - 案例：《姐夫捎路要奶粉钱》— 亲子关系 → 金锁真相 → 断裂

      ## 常见失败模式

      | 失败模式 | 识别方法 | 修正方向 |
      |----------|----------|----------|
      | **太平** | 连续 5+ 节没有情绪转折 | 插入意外事件或新信息 |
      | **太赶** | 重大转折只用了 1 节铺垫 | 给转折至少 3 节铺垫 |
      | **假虐** | 读者不心疼，只是看着难受 | 检查羁绊铺设是否具体 |
      | **割裂** | 前半部分和后半部分像两篇不同的故事 | 用伏笔/物件/主题贯穿 |
      | **烂尾** | 反转后拖了 2000 字还在交代 | 反转后 500 字内收尾 |
      | **人设崩** | 角色在关键时刻的行为不符合前面的人设 | 回顾人设，确保行为逻辑一致 |

      ## 快速自查

      - [ ] 前 1/3 有具体羁绊细节（不是抽象描述）？
      - [ ] 中段有反差/撕裂（读者以为 A → 实际是 B）？
      - [ ] 结尾有安静细节（不是大段抒情）？
      - [ ] 每 3-5 节有情绪转向？
      - [ ] 反派行为符合其人设逻辑？
      - [ ] 不存在上述 6 种失败模式？

      ## 三板斧与五段结构映射

      | 三板斧 | 对应五段 | 说明 |
      |--------|----------|------|
      | 第一斧：羁绊铺设（前 1/3） | 铺垫段（第二段，占 30-40%） | 用物件/数字/习惯建立关系质感 |
      | 第二斧：情感撕裂（中后段） | 升级段（第三段）+ 反转段（第四段） | 反差/错位/延迟真相制造撕裂 |
      | 第三斧：余韵钝痛（结尾） | 结尾段（第五段，占 5-10%） | 安静细节收尾，不写大段抒情 |
