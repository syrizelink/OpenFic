id: builtin-skill--villain-reveal
name: 反派与真相揭露设计
summary: 设计反派动机、作恶升级、真相揭露方式和因果报应。
is_enabled: true
content: |
  # 反派系统与真相揭露机制

  ## 一、反派设计模板

  ```
  反派：
  - 身份：{与主角的关系}
  - 动机：{自洽的作恶逻辑：贪婪/嫉妒/控制欲/报复/自保}
  - 作恶方式：{言语打压/经济控制/社交孤立/人身伤害/法律构陷等}
  - 致命弱点：{贪婪/傲慢/秘密/依赖/恐惧等}
  - 报应：{与恶行对应的结局}
  ```

  反派不能只写“坏”。先写清楚他要什么、为什么认为自己有权这样做、害怕失去什么，以及主角如何利用其弱点。反派的实力和智商决定主角胜利的含金量，不能让反派降智送赢。

  ## 二、嚣张度递增

  反派行为要逐级递增，不能跳跃也不能重复：

  | 阶段 | 行为类型 | 示例 |
  |---|---|---|
  | 小恶，前 1/3 | 言语打压、冷暴力 | “你嫁进来就算烧高香了。” |
  | 中恶，中段 | 经济或社交伤害 | 偷拿存折、败坏名声、挑拨关系 |
  | 大恶，后段 | 人身或法律伤害 | 下药、构陷、逼死、拐卖 |

  每次升级必须造成新后果，让主角的处境、选择、关系或证据发生变化。

  ## 三、反派类型

  - 操控型：以爱为名控制一切，弱点是控制欲会留下证据。
  - 贪婪型：无底线索取，弱点是贪心过度暴露真面目。
  - 伪装型：隐藏真实身份或目的，弱点是身份经不起调查。
  - 嚣张型：仗势欺人、无所顾忌，弱点是傲慢导致忽视身后风险。
  - 软刀型：示弱博同情、暗中操控，弱点是假面会被证据击碎。

  ## 四、真相揭露的四种机制

  ### 证物揭露
  在铺垫段埋入看似无关紧要的物件或文件，揭露时翻转其意义。证物本身必须在前文出现，揭示时只收旧账。

  ### 证人揭露
  让边缘角色在关键时刻说出主角不知道的信息。证人不能只是方便作者传话，应有自己的立场、风险和为什么现在开口的原因。

  ### 偷听或撞见
  安排一个主角本不该在场的场景，让主角无意中看到或听到真相。需要说明主角为什么能到场，以及听到的内容如何改变行动。

  ### 延迟剥洋葱
  一层真相引出更深真相，每层都比上一层更残酷或更改变认知。不要连续解释，给读者和角色留出消化时间。

  ## 五、按题材选择揭露节奏

  | 类型 | 推荐方式 | 节奏 |
  |---|---|---|
  | 世情或爽文 | 证物或证人 | 一次大揭露，干净利落 |
  | 情感或虐心 | 偷听/撞见 + 延迟剥洋葱 | 分层揭露，层层更痛 |
  | 古言或复仇 | 证人 + 证物 | 先证人铺垫，再证物定锚 |
  | 悬疑或推理 | 延迟剥洋葱 | 全程分层，最后补齐拼图 |
  | 年代或亲情 | 偷听或撞见 | 意外发现，情绪冲击强 |

  ## 六、报应设计

  报应必须与恶行对应，恶行有多重，报应也要有多重，但不必用长篇描写。对应逻辑可以是：因果轮回、偷走的东西最终失去、假爱真控最终无人可控、骗子被更狠的人收割。

  | 模式 | 适用场景 | 操作 |
  |---|---|---|
  | 法律制裁 | 现代背景的违法行为 | 用简短几句交代报警、起诉或判决 |
  | 社会性死亡 | 虚伪型或操控型反派 | 真相公开，所有人看清真面目 |
  | 因果轮回 | 古言或复仇 | 做过的事回到自己身上 |
  | 精神崩溃 | 虐心或意难平 | 得到一切后发现失去唯一重要之物 |

  报应强度通常为恶行强度的 1.0-1.2 倍，既不要轻描淡写，也不要无限加码。报应的爽感来自对应感，不来自篇幅。

  ## 七、反派与真相自检

  - 反派身份、动机、手段、弱点和报应是否清楚。
  - 作恶是否从小到大升级，是否每次都造成新的后果。
  - 真相是否通过行为、证物、证人或场景揭示。
  - 关键证据是否提前出现，揭示是否只是收回旧账。
  - 反派是否有自己的目标、信念或恐惧。
  - 读者知道真相的时间是否合理；若读者很早知道，后续必须靠更深层真相或行动压力维持兴趣。
  - 是否至少有一条读者会相信的假线索。
  - 真相线索是否正读容易忽略、回看能够找到。
   - 主角和读者在揭示前是否至少有一方不知道真相。
  - 反派建立四要素：实力展示 → 动机可信 → 真实威胁 → 终极意图时机。
  - 反派性格四步：也有梦想；挖掘创伤；逆境磨练缺陷；成为主角的镜子。
  - 真相路由：表面身份 → 异常行为 → 局部证据 → 可信误导 → 线索回收 → 亮牌 → 后果。
  - 误导必须让读者自己走向错误结论，不能使用前文不存在的决定性信息。
   - 揭示之后必须展示关系、行动、资源或情绪的后果，不能用长篇解释替代兑现。
