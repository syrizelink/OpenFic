  - name: 原始反派与揭露案例
    content: |
      # 反派系统原始补充

      ## 反派设计蓝图

      ```
      反派：
      - 身份：{与主角的关系}
      - 动机：{自洽的作恶逻辑：贪婪/嫉妒/控制欲/报复/自保}
      - 作恶方式：{具体手段：言语打压/经济控制/社交孤立/人身伤害/法律构陷}
      - 致命弱点：{可被主角利用的弱点：贪婪/傲慢/秘密/依赖/恐惧}
      - 报应：{与恶行对应的结局}
      ```

      ## 反派类型速查

      | 类型 | 特征 | 代表案例 | 致命弱点 |
      |------|------|----------|----------|
      | 操控型 | 以爱为名控制一切 | 王氏（皇弟） | 控制欲导致行事留下证据 |
      | 贪婪型 | 无底线索取 | 准儿媳 | 贪心过度暴露真面目 |
      | 伪装型 | 隐藏真实身份或目的 | 诈骗犯（重生弟弟） | 身份经不起调查 |
      | 嚣张型 | 仗势欺人，有恃无恐 | 萧琅（皇弟） | 傲慢导致忽视身后风险 |
      | 软刀型 | 示弱博同情，暗中操控 | 妈妈（姐夫捎路） | 假面被证据击碎 |

      ## 真相揭露案例

      ### 证物揭露
      在铺垫段埋入看似无关紧要的物件或文件，揭露时翻转其意义，物证只收旧账。

      ```
      铺垫：妈妈脖子上总戴着一把金锁，说是姐姐送的。
      揭露：打开金锁，里面刻着“金包铜”三个字。
      暴击：她从来没打开过这把锁。
      ```

      ### 证人揭露
      边缘角色必须有自己的立场、风险，以及为什么现在开口的原因，不能只是方便作者传话。

      ```
      铺垫：周嬷嬷总是欲言又止。
      揭露：周嬷嬷临终前交给主角一封信，是先皇后的供状。
      暴击：王氏知道这封信的存在，所以一直在找周嬷嬷。
      ```

      ### 偷听或撞见
      主角不该在场的场景必须解释主角为什么能到场，并说明听到的内容如何改变行动。

      ```
      铺垫：妈妈每次接电话都走到阳台上。
      揭露：主角路过阳台，听到妈妈说“那个金锁是假的，她到现在都不知道”。
      暴击：电话那头是姐夫。
      ```

      ### 延迟剥洋葱
      每层用一个节揭露，且比上一层更残酷：第一层弟弟的女友不是她说的那个人；第二层女友是有犯罪记录的诈骗犯；第三层怀孕是假的；第四层弟弟已经被骗到电诈园区。

      ## 报应对应案例

      | 恶行 | 报应 | 对应逻辑 |
      |------|------|----------|
      | 逼死在冷宫 | 自己住进冷宫 | 因果轮回 |
      | 偷拿存折 | 账户被冻结，一分拿不到 | 偷走别人的，连自己的也失去 |
      | 以爱为名操控 | 被所有人抛弃 | 假爱真控，最终无人可控 |
      | 诈骗钱财 | 被更狠的人骗进园区 | 骗子被更高级骗子收割 |

      报应强度 = 恶行强度 × 1.0-1.2。报应不写长段，2-3 句带过，把留白交给读者；爽感来自对应感，不来自描写长度。

      ## 反转有效性检查表

      | 检查项 | 通过标准 | 不通过时 |
      |--------|----------|----------|
      | 读者知道真相的时机 | >60% 合理；50-60% 是灰区；<50% 不算反转 | 调整线索释放节奏，延后揭露 |
      | 是否有误导假线索 | 至少 1 条读者会信的假线索 | 加入红鲱鱼或选择性叙述 |
      | 真相线索隐蔽度 | 回看能找到，正读会忽略 | 藏进日常细节，不用强调语气 |
      | 角色知道与读者知道 | 反转前至少有一方不知道真相 | 制造读者或角色的信息差 |

      “延迟揭露”不等于反转：若读者在第 2 节就知道真相，后面 10 节只等角色追上来，这是延迟揭露，真正的反转应发生在揭示那一刻，让读者和角色一起震惊。
