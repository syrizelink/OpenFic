id: builtin-skill--character-design
name: 小说人物设计
summary: 设计主角、配角和反派的动机、缺陷、反差、功能与成长轨迹。
is_enabled: true
content: |
  # 角色基础设计与角色设计操作手册

  设计主角/配角/反派时加载。先看决策路由，选对模板，再按步骤操作。此 Skill 也用于创建角色和拆解时的对照标尺；拆解时把源文与标准模式逐项对比，不按模板改写新作品。

  ## 决策路由

  | 你在设计什么 | 用这个模板 | 见哪个章节 |
  |------------|-----------|-----------|
  | 主角 | 主角卡模板 | 第1节 |
  | 配角 | 配角卡模板 | 第2节 |
  | 反派 | 反派层级表 → 反派建立四要素 → 反派性格四步法 | 第3节 |
  | 角色动机 | 动机链模板 → 动机冲突类型 | 第4节 |
  | 角色塑造/深化 | 塑造方法速查（四层法/执念法/重复点/分层展示等） | 第5节 |
  | 主角特殊问题 | 逼格/成长/红线/调子太高/身份与金手指 | 第6节 |
  | 反派塑造深化 | 反派渲染/人设主角化 | 第7节 |

  | 你在做什么 | 用什么方法 |
  |-----------|-----------|
  | 设计角色反差 | 三层标签反差法 + 行为反差进阶 |
  | 设计配角 | 配角功能化 + 群像写作法 |
  | 凸显人设 | 凸显人设速查表 |
  | 设计感情桥段 | 高情商桥段模板 |
  | 深化角色立体感 | 向人设深化法 + 九维人设框架 |
  | 建立代入感 | 代入感构建法 |
  | 管理角色关系 | 人设关系四阶段 + 职场思维结构 |
  | 设计主角特质 | 金手指绑架人设 + 以梗为中心塑造 |

  ## 第1节：主角卡

  ### 填空模板

  ```
  姓名：
  性别：
  角色定位：（一句话说清主角在故事中的功能）
  身份标签：（如：废柴大学生、前特种兵、落魄皇子）
  外貌特征：（3-5 个关键词，要有记忆点）
    例：瘦高、总穿旧夹克、左手有疤、眼神懒散
  性格关键词：（3-5 个，必须有矛盾面）
    例：嘴毒心软、看似冷漠实则护短、冲动但有底线
  核心目标：（全书终点想达成什么）
  核心动机：（必须达成的理由——情感驱动，非理性驱动）
  致命弱点：（让角色犯错的性格缺陷，非能力缺陷）
  口头禅/标志动作：（让读者秒认的标签）
  ```

  ### 设计要点

  - 动机必须是情感层面的——“为母亲复仇”优于“要成为最强”
  - 弱点必须会在关键情节导致主角犯错，否则不是弱点
  - 外貌和口头禅是读者记忆锚点，必须写

  ## 第2节：配角卡

  ### 填空模板

  ```
  姓名：
  性别：
  角色功能：（导师/盟友/情报源/牺牲品/镜像对照）
  与主角关系：
  核心特质：（1-2 个关键词）
  标志性特征：（一句话让读者记住）
  退场方式：（何时/如何退出故事）
  ```

  ### 设计要点

  - 每个配角必须有明确功能——没有功能的角色不要出场
  - 配角退场要主动规划，不能写着写着忘了
  - 同一场景配角不超过 3 个有台词

  ### 配角功能化设计

  1. 配角的能力和特质必须和剧情紧密相关
  2. 配角是为了展现主角而写——配角的能力为主角所用，配角脱离困境靠主角帮助

  #### 复合型配角——白手套角色

  | 功能 | 说明 |
  |------|------|
  | 替主角说话 | 凡是主角不适合说的话，他来说 |
  | 替主角发狠 | 凡是主角不应该发的狠，他来发 |
  | 绝对维护 | 对侵犯主角利益的人坚决反击 |
  | 粗中有细 | 将反派密谋录音再播放，取得大众支持 |
  | 适时搞笑 | 不断输出正反馈，缓解紧张情绪 |

  **设计原则**：光环比主角弱一点，不抢风头；惊艳出场；对主角的质疑第一时间反驳。

  #### 立体人物 vs 扁平人物

  1. 不是所有角色都要立体化，先看功能性
  2. 扁平化角色保持神秘性，反而更恐怖/更强大
  3. “洗白弱三分，黑化强三倍”——高手被立体化就变弱了
  4. 需要什么工具就设计什么工具，不要把所有角色立体化

  #### 人设反差六维度法

  | 反差对 | 操作 |
  |--------|------|
  | 表面性格 vs 内在性格 | 笑面虎/刀子嘴豆腐心 |
  | 外表形象 vs 表面性格 | 看着凶实际软 |
  | 外表形象 vs 内在性格 | 看着柔实际狠 |
  | 身份 vs 生活方式 | 豪门子弟住地下室 |
  | 身份 vs 爱好特长 | 杀手擅长插花 |
  | 身份 vs 内在性格 | 军人内心文艺 |

  ### 执行指令

  1. 设计配角时先确定其功能（替主角说话/发狠/搞笑/提供信息）
  2. 从六维度反差中选 1-2 个维度给配角贴标签
  3. 控制配角光环，不超过主角
  4. 功能性配角不要强行立体化

  #### 配角人设逻辑

  1. “正戏反写”——看似正面的行为背后有反派动机
  2. 配角情感保护壳：看似冷漠无情，实则有深层情感驱动
  3. 避免崩人设：角色的行为选择必须符合已建立的人设逻辑
  4. 先从题材的“标签人物”直接用——成熟题材里的人设角色都是经受过市场考验的

  #### 群像写作法

  1. 每个角色出场都要有功能，没有水分——功能不明确的角色不要出场
  2. 角色间的关系要有层次（引路人、对手、伙伴、障碍）
  3. 不同角色要有不同的说话风格和行为特征
  4. 通过行为而非旁白来展示角色特点

  ##### 配角脸谱化描写

  1. 抓住 1-2 个突出特点做鲜明标签（口头禅/标志性动作/极端性格）
  2. 标签化让读者迅速记住，不过多占用笔墨
  3. 功能性配角要有明确功能：推动剧情、衬托主角、提供信息

  ##### 角色使用的节奏

  1. 高人气角色的出场频率应控制在每3-5章一次，保持期待感而不审美疲劳。每次出场必须有新信息或新功能
  2. 读者不感兴趣的角色该舍弃就舍弃，自然“下线”
  3. 用“以角色带角色”引入新角色——喜爱延续

  ##### 角色池编织法

  1. 以角色带角色：女主讨喜 → 写女主爸妈/姐姐/闺蜜 → 喜爱延续到新角色
  2. 像网一样编织下去 → 很快就有取之不尽的角色池
  3. 每个新角色贴一个标签，个个鲜明

  ## 第3节：反派设计

  ### 3.1 反派层级表

  根据反派出场篇幅选对应层级，按表格要求设计。

  #### 小反派（1-5 章）

  | 维度 | 要求 |
  |------|------|
  | 功能 | 单个小弧线的障碍 |
  | 设计 | 1-2 个鲜明特征即可（嚣张/贪财/欺软怕硬） |
  | 退场 | 被打败或被揭穿，干脆利落 |

  #### 中等反派（10-30 章）

  | 维度 | 要求 |
  |------|------|
  | 功能 | 一卷的主要对手 |
  | 动机 | 为什么跟主角作对（不能是“纯粹的坏”） |
  | 手段 | 武力/权谋/资源 |
  | 逼格 | 至少赢主角一次，让读者恨得牙痒 |
  | 退场 | 被主角正面击败，要有爽感 |

  #### 大弧Boss（一卷或数卷）

  | 维度 | 要求 |
  |------|------|
  | 功能 | 代表一个阶段的核心矛盾 |
  | 人弧 | 完整的人物弧线，有自己的目标和逻辑 |
  | 冲突 | 与主角有理念冲突（不只是利益冲突） |
  | 对决 | 至少一场让主角陷入绝境 |
  | 侧面 | 有一个让读者“恨不起来”的侧面 |
  | 退场 | 有仪式感的终战 + 有余味的落幕 |

  #### 最终Boss（全书）

  | 维度 | 要求 |
  |------|------|
  | 功能 | 全书核心矛盾的具象化 |
  | 伏笔 | 从第一章就有 |
  | 对立 | 与主角的目标/动机直接对立，代表故事主题的反面 |
  | 实力 | 碾压主角，主角必须蜕变才能赢 |
  | 信念 | 有信念，不是纯粹的疯子/怪物 |

  ### 3.2 反派设计铁律

  - 反派的智商/实力决定主角的含金量——反派弱 = 主角赢没意义
  - 反派的行为必须有内在逻辑（从他的视角说得通）
  - 不要让反派降智来给主角送赢

  ### 3.3 反派建立四要素

  按顺序操作，缺一不可：

  1. **实力展示**——出场就展示实力或手段
  2. **动机可信**——从反派视角看行为说得通
  3. **真实威胁**——至少赢主角一次
  4. **终极意图时机**——真实目的留到关键反转点

  ### 3.4 反派性格确立四步法

  | 步骤 | 操作 |
  |------|------|
  | 1. 反派也有梦想 | 在反派眼中他是自己故事的主人公 |
  | 2. 挖掘创伤性过去 | 谁抚养他？谁爱他？谁伤害他？他避免什么痛苦？ |
  | 3. 磨练性格缺陷 | 遭遇逆境时不调动积极特质，而是磨练缺陷——“优势”本身就是致命缺陷 |
  | 4. 反派是主角的镜子 | 反派的长处反映主角的弱点，两者完全相反 = 每次相遇必然摩擦 |

  ### 3.5 反派渲染分量的关键

  - 障碍从反派人设上来，而不是故意给主角制造障碍
  - 反派渲染公式：明确动机 → 动机驱动行为 → 行为形成障碍 → 障碍强度来自反派分量
  - 反派异常强势时，主角要破得“高级”“智慧”“出乎意料”

  ## 第4节：动机设计

  ### 4.1 动机链模板

  ```
  起因（Cause）    → 角色经历了什么
  意图（Intent）   → 角色想做什么
  约束（Constraint）→ 什么在阻碍他
  风险（Risk）     → 失败的代价是什么
  ```

  **示例**：
  ```
  起因：母亲被仇家杀害
  意图：找到凶手并复仇
  约束：凶手是当朝权臣，主角只是平民
  风险：复仇失败会被灭门，复仇成功会失去所有现有生活
  ```

  ### 4.2 动机链设计要点

  - 起因必须具体——“被欺负”不够，“在众目睽睽下被打耳光”才行
  - 约束必须有力——否则主角一路碾压没有张力
  - 风险必须真实——读者要相信主角真的可能失去重要的东西
  - 动机可以随剧情演变，但不能说变就变

  ### 4.3 动机冲突类型

  遇到角色需要内心挣扎时，从下表选一种冲突类型：

  | 类型 | 定义 | 示例 |
  |------|------|------|
  | 目标 vs 道德 | 想做的事和应该做的事冲突 | 复仇但不想伤及无辜 |
  | 情感 vs 利益 | 感性和理性的拉扯 | 知道对方不可靠但放不下 |
  | 短期 vs 长期 | 眼前利益和远大目标的矛盾 | 妥协保命 vs 坚持原则赌未来 |
  | 自我 vs 他人 | 个人需求和他人期望的冲突 | 想过平静生活但背负家族使命 |

  ## 第5节：角色塑造方法速查

  ### 5.1 角色塑造核心原则

  **主角行为三必须**：
  1. **必须可理解**——读者必须理解主角为什么这么做
  2. **必须可共鸣**——主角的思考读者必须能代入
  3. **必须可接受**——主角的三观读者必须能接受

  **展示优于告知**：
  - 角色的目的 → 通过行为展示，不是旁白解释
  - 角色的行动 → 具体的动作和决定，不是形容词堆砌
  - 角色的态度 → 通过对话和反应体现，不是心理独白

  ### 5.2 展示人物特质的方法

  | 方法 | 操作 | 示例 |
  |------|------|------|
  | 敏感性 | 触碰弱点，看反应方式 | 惊慌失措/匆忙逃跑/转移注意力=不同性格 |
  | 逃避 | 展现回避行为暗示弱点 | 角色的“不做什么”比“做了什么”更揭示深层性格 |
  | 先正后缺 | 先展示吸引人特质，再揭示缺陷 | 读者先喜欢角色，才能容忍缺陷 |

  ### 5.3 四大性格属性

  | 属性类别 | 定义 | 设计要点 |
  |---------|------|---------|
  | 道德属性 | 是非信念 | 影响其他性格形成 |
  | 成就属性 | 推动达成目标 | 与道德属性一致，服务目标 |
  | 互动属性 | 与人交流方式 | 数量最多的积极特质 |
  | 身份属性 | 身份认同感 | 定义个性的基本组成部分 |

  选择技巧：以其中一个特质为主要特质，其他为辅。

  ### 5.4 角色塑造四层法

  | 层次 | 方法 |
  |------|------|
  | 移情作用 | 开头不要太多角色，先让读者了解主角并产生期待 |
  | 最小特征（标签） | 主角由内而外塑造，配角由外到内塑造（贴标签） |
  | 角色的不真诚 | 所说≠所想，举动≠态度，日常与便当是深化角色的两极 |
  | 角色的聚光灯 | 配角必须与主角产生强烈联系性，配角压过主角时塑造新配角夺走光环 |

  ### 5.5 人物塑造与人物真相

  | 层面 | 定义 | 示例 |
  |------|------|------|
  | 人物塑造（显型） | 读者第一眼看到的特质 | 外表青春可爱的萝莉 |
  | 人物真相（隐性） | 角色内在的真实面貌 | 实际上是冷血杀手 |
  | 价值取向（内隐） | 关键选择时起决定作用的价值观 | 在道义与野心间选择野心 |

  操作要点：价值取向不必一开始揭示，在关键抉择时自然暴露；人物真相的揭示越晚，戏剧张力越强。

  ### 5.6 人设分层展示法

  | 层次 | 操作 |
  |------|------|
  | 第一层 | 告诉读者类型模型（萝莉/御姐/少妇） |
  | 第二层 | 贴特点标签（胸大/腿长/小麦色皮肤） |
  | 第三层 | 为性格找原因（家庭/内在冲动） |
  | 第四层 | 打破——可爱天然呆其实什么都知道，人设立刻升华 |

  深化记忆：不要吝啬重复词汇，觉得太小白？其实在深化记忆。

  ### 5.7 人物经历三线时间法

  | 时间线 | 内容 |
  |--------|------|
  | 过去 | 身世背景、遭遇变故、性格成因 |
  | 现在 | 与主角的关系定位、当前互动模式 |
  | 未来 | 制造变强动力或危机（老师被劫/女主被抓/反派揭底） |

  ### 5.8 配角执念设定法

  - 给角色一个执念 → 所有行为/爱好/性格围绕执念展开
  - 不需要每次贴合执念，只要不写与执念冲突的东西，关键时揭示即可
  - 过于极端的执念 → 加入“亲民”小细节 → 便于读者认同
  - 适用：支线配角，不适合频繁出现的主要配角

  ### 5.9 人物行为重复点设计

  - 抓住一个人物行为特质反复写
  - 构建方法：确定读者喜欢什么类型 → 具体化为行为 → 不同场景重复
  - 人物看点 + 核心看点 = 层次感，两者循环产生差异化
  - 反派/配角也需要重复看点，能让人爱上的反派会增加读者新鲜感

  ### 5.10 围绕人设写行为

  行为、语言、思维都要围绕人格展开。如果为了剧情需要让角色做出不符合人设的行为 → 先修改剧情，不要改人设。

  ### 5.11 人推事件 vs 事件推人

  | 驱动方式 | 特点 |
  |---------|------|
  | 人推事件 | 情节是人物性格/动机/选择的自然结果，深化人物弧光 |
  | 事件推人 | 外部事件打破平衡，迫使暴露真实自我 |

  卡文时 → 从人物动机找方向，不要硬编剧情。

  ## 第6节：主角特殊问题

  ### 6.1 主角逼格

  - 主角必须有逼格——这是读者的代入基础
  - 不要写太多降智的内心戏和爆粗口
  - 主角可以不完美，但不能让人看不起

  ### 6.2 主角的成长

  - 成长不只体现在实力上，更体现在心智和选择上
  - 每次成长都要有触发事件和内在反思
  - 网文主角成长非必须：开场三观圆满的正常人更容易代入，稳定人设本身就是魅力

  ### 6.3 主角红线

  以下类型的主角绝对不要写：

  | 禁止 | 原因 |
  |------|------|
  | 圣母型主角 | 读者要痛快而非道德说教 |
  | 无脑战斗机器 | 难以产生情感共鸣 |
  | 内核邪恶 | 读者无法代入 |
  | 因蠢/圣母犯错 | 读者无法原谅 |
  | 自暴自弃 | 比被欺负更让读者厌恶 |

  ### 6.4 主角调子起太高怎么办

  **危害信号**：
  - 失去成长空间——能力/地位/资源触达天花板
  - 剧情缺乏张力——陷入“砍瓜切菜”的重复循环
  - 读者失去追更动力

  **化解方法**：
  - **压势不压人**——压低气势和期待，但不打压主角本身的能力和尊严
  - **留出维度差距**——即使某方面很强，总有其他维度是短板
  - **超额收获法**——看似收获很大，经主角盘算后发现更大

  ### 6.5 主角开篇立人设

  - 人设通过选择建立，开篇必须让主角做出选择
  - 智斗型开局比暴力型开局更容易立人设
  - 读者更容易代入“聪明但普通”的主角，而非“上来就无敌”的主角

  ### 6.6 主角的两个身份与两个金手指

  | 维度 | 定义 | 作用 |
  |------|------|------|
  | 显性身份 | 社会身份/职业+状态 | 汇集前期矛盾，必须不断升级或换 |
  | 隐性身份 | 不凡的身世来历 | 汇集中后期矛盾 |
  | 显性金手指 | 系统/玉坠/重生记忆 | 开局获得贯穿全书 |
  | 隐性金手指 | 主角性格 | 让主角与众不同的就是金手指 |

  **最佳写法**：前期以金手指装逼 → 剧情推进中逐步把人设清晰
  **人设与全书气质**：主角人设必须与世界基调相符，四点高度统一：社会身份+身世+金手指+性格

  ### 6.7 性格单一缺陷型主角+动物伙伴体系

  如果主角性格故意设为单一 → 降低读者带入排斥感 → 少做少错 → 最大限度提升代入感。

  **问题**：性格过于单一 → 影响精彩程度 → 难以推进故事
  **解法**：给淡漠型主角配备 3-5 只动物伙伴，每只不同性格。

  | 伙伴类型 | 功能 |
  |---------|------|
  | 蠢萌犯二型 | 负责搞笑，主角不宜吃瘪但动物可以 |
  | 聪敏嘴贱型 | 负责嘴替，主角不该说的话由它说，保持主角逼格 |
  | 耿直蠢笨型 | 负责反差萌 |
  | 奇特能力胆小型 | 负责能力补充 |

  ### 6.8 核心情绪与表达欲平衡

  - 需求的内核不变，变的只是形式
  - 写完一段剧情后，站在读者角度审视是否偏离核心梗
  - 主角牛逼了必须有所得，不能光付出没回报
  - 表达欲旺盛时最容易偏离——要主动检查

  ### 6.9 压势不压人：矛盾的正确来源

  **错误做法**：让反派莫名其妙针对主角，背后逻辑站不住脚。

  **正确做法**：反派有自己的目的，行动客观上导致主角困境，但并非刻意针对主角本人。

  **矛盾链条**：反派目的 → 压制主角所在群体（压势） → 主角推翻 → 底层依旧麻木 → 主角改变路径 → 新冲突自然产生

  核心：所有人被自己想要的利益驱动，背后是三观不同，更深是成长环境，最深层是世界观。

  ## 第7节：反派塑造深化

  ### 7.1 反派塑造核心原则

  - 经典反派一定有完整世界观和逻辑自洽的三观
  - 同样的外部事件发生在不同人身上产生不同变化——外因与内因共振
  - 反派塑造不能只有外部事件，缺乏内在三观和内在逻辑

  ### 7.2 反派人设主角化写法

  **传统问题**：换地图后原反派跟不上节奏 → 引入新反派脸谱化

  **解法**：
  - 把反派当主角去写
  - 在“配角衬主角”基础上加“配角衬配角”
  - 换地图的正确处理：用新地图衬托旧角色含金量，而非用旧角色无力衬托新地图难度

  ## 补充方法：反差、关联与关系阶段

  ### 三层标签反差人设法

  | 层级 | 名称 | 含义 | 示例 |
  |------|------|------|------|
  | 第一层 | 身份标签 | 外界看到的身份 | 豪门弃妇 |
  | 第二层 | 表现标签 | 角色展现给外界的行为 | 隐忍不发、逆来顺受 |
  | 第三层 | 内核标签 | 角色真正的内心 | 冷静、有计划、步步为营 |

  1. 为角色填写三层标签，三层之间必须制造反差——反差 = 立体感
  2. 身份标签和表现标签可以相似（强化刻板印象），但内核标签必须反转
  3. 反差越大，角色的“亮牌时刻”越震撼
  4. 每个重要角色都应至少有一层反差
  5. 用行为对比来体现反差，不要直接描述：

  ```
  身份标签：豪门弃妇
  表现行为：被骂不还口，被赶不反抗
  内核行为：悄悄录音、收集证据、提前转移财产
  ```

  ### 三层标签行为反差进阶

  当关系进入第三层（亲密关系）后，角色在第一、二层关系中能做出的行为反而做不出来了。

  | 关系阶段 | 可做行为 | 不可做行为 |
  |----------|---------|-----------|
  | 身份标签期（陌生） | 调戏、冷漠、保持距离 | — |
  | 表现标签期（熟悉） | 继续之前的行为模式 | — |
  | 内核标签期（亲密） | 展露真实自我 | 之前的调戏/冷漠反而做不出来了 |

  1. 检查角色当前处于哪个关系阶段
  2. 行为反差本身是人设的一部分，必须写进剧情
  3. 用“行为退化 = 感情深化”制造张力——身份标签期爱调戏主角的辣妹，进入亲密关系后反而不敢表白
  4. 不要让角色在亲密阶段仍然维持早期行为，否则反差失效

  ### 人设关联分层（强/中/弱关联）

  | 层级 | 定义 | 功能 | 数量要求 |
  |------|------|------|---------|
  | 强关联 | 直接影响剧情走向和核心梗装逼爽点的设定 | 推动人物碰撞、剧情推进 | 每个角色至少 3 个 |
  | 中关联 | 配角的强关联设定，不能抢主角风头 | 为配角提供功能性和辨识度 | 适量 |
  | 弱关联 | 丰富人物厚度的个人偏好设定 | 增加角色真实感和记忆点 | 不限 |

  1. 把主角的实力、钱财、人脉、背景等影响剧情走向的属性归为强关联
  2. 检查强关联是否达到每个角色至少 3 个
  3. 把“喜欢吃蛋糕”“爱好看美女”等归为弱关联，仅用于丰富人设
  4. 确保弱关联不喧宾夺主——强关联才是延伸剧情的核心

  ### 人设执行规则

  人设 ≠ 人物设定表。

  - 人物设定表 = 身高、外貌、家庭背景等信息堆砌（外在信息）
  - 人设 = 围绕角色“灵魂/特殊人格”展开的功能性设计
  - 人设的使命：服务戏剧张力与情绪拉扯，以人格驱动行为，而非被剧情硬推

  **检查**：如果你写的人物设定只有身高体重爱好，没有“灵魂/特殊人格”的功能性设计，重做。

  ### 凸显人设的方法

  1. 抓亮点——找到角色最突出的那个特质，集中火力展现
  2. 用行动展现人设，不要用旁白描述（如出狱后不卑不亢、争取利益、展现老练）
  3. 用反差碰撞制造张力
  4. 反差拉张力会筛读者，控制尺度——反差太大会劝退部分读者

  ### 高情商/聪明人桥段写法

  1. 高情商通过具体剧情中的表现来体现，不要旁白夸赞
  2. 写察言观色、临场应变、控场接话的具体场景
  3. 高情商表现应参考经典网文中的成功案例模式，每个桥段至少包含一个“读者预期尴尬但主角化解”的反转
  4. 每个桥段至少有一个“反转”——读者以为会尴尬，结果主角完美化解

  ### 用配角做期待枢纽（人物扣）

  1. 选一个配角做“任务基地”——一个人物同时承载多个短期和长期期待
  2. 主角每次解决事件装完逼后去找该人物，开始新一轮装逼
  3. 每个剧情单元结束后利用同一人物展开新剧情
  4. 人物下线时带来更大的好处，用“歪打误撞收获更多”转变读者“损失厌恶”心理

  ### 向人设深化法

  先判断当前项目适合“故事深化”还是“人设深化”：

  | 条件 | 优先方向 | 执行动作 |
  |------|------|------|
  | 主线已经复杂、多势力、多反转 | 向人设深化 | 保持故事结构简单，在人物欲望、反差、关系互动上制造新鲜感 |
  | 主线过直、人物已经鲜明但事件不足 | 向故事深化 | 增加阻碍、目标变化、信息差或代价，不新增无功能角色 |
  | 短篇/轻量篇幅 | 向人设深化 | 用 1-2 个强人设标签驱动冲突，不铺大世界观 |
  | 长篇关键卷/高潮卷 | 两者结合 | 故事升级一个维度，同时让关键人物关系发生可见变化 |

  #### 执行步骤

  1. 拿一个简单甚至老套的故事结构
  2. 在人物身上加“戏剧性”——能让目标读者找到乐子的设定
  3. 通过几个人物的互动循环产生持续剧情

  #### 循环写法（一个简单情节可写5章以上）

  - 第1章：主角装逼 → 师叔更迫切
  - 第2章：师叔逼女生 → 恋人帮着威逼利诱
  - 第3章：女生靠近主角 → 恋人在暗地暗爽
  - 第4章：女生回去哭诉 → 恋人假意安慰一边暗爽
  - 第5章：复命领赏 → 女生发现恋人对奖赏没那么高兴

  ### 人物塑造技巧

  #### 女性角色塑造（男频）

  1. 读者喜欢的是女主的标签（高贵优雅、肤白大长腿），不是外貌描写
  2. 利用刻板印象：吸血鬼=高贵优雅+外貌出众，不用特意描述读者就知道
  3. 网文里美貌是最廉价的资源——不要花大量笔墨写外貌
  4. 性格设定可极端化：傲娇到极致、对主角爱得深沉、不考虑自身利益
  5. 保持性格一致性：设定后言行始终符合

  #### 主角可以犯错但需把握尺度

  | 可原谅 | 不可原谅 |
  |--------|---------|
  | 因不可抗力或信息差导致的错误 | 因蠢、因圣母心泛滥导致的错误 |
  | — | 与实力不匹配的错误（斗帝强者因小人物犯蠢） |

  #### 主角人设内外反差

  1. 可设计表面与内心的反差（如表面色牛实际内心孤僻）
  2. 反差感增加角色深度和趣味，提供丰富的情节冲突可能性

  #### 反派的本质

  反派 = 与主角立场不同、利益相悖的人。赋予反派自己的想法和追求，不要写纯粹的恶。

  #### 渣人设写法

  1. 开头就清晰传达主角人设，穿越前后保持一致
  2. 避免“又当又立”——前面没描写主角是老色皮后面突然追女读者反感
  3. 明确人设 = 筛选接受这种人的读者 = 预期管理

  ### 人物记忆点法

  1. 每个人物至少有一个性格方面特别突出
  2. 只有让某一特征特别突出，才有记忆点
  3. 目标：哪怕剧情不推进，几个人物坐一起聊天，读者都看得津津有味

  ### 金手指绑架人设法

  1. 金手指不只是给主角超能力，目的是让主角的性格合理化
  2. 用金手指规则绑架行为 → 配角反应自然塑造形象 → 不需要直接描写主角品格
  3. 追求道德爽感（最高级爽感）：让主角成为行为层面让读者心服口服的“活圣人”

  ### 以梗为中心塑造人设

  1. 单一标签“杀伐果断”“热血”太模糊 → 用具体梗来建设角色 → 读者产生强记忆点
  2. 例：配角每次看到主角成功 → 羡慕嫉妒恨 → “你真该死啊” → 强记忆点+趣味性
  3. 好人设+平平无奇的金手指+俗套套路 → 也能发挥意想不到的吸引力

  ### 九维人设框架

  | 维度 | 内容 | 要点 |
  |------|------|------|
  | 基本信息 | 前身今世/外貌特征 | 从人物下手建立长期期待感 |
  | 性格 | 反差人设 | 为成长弧线铺垫 |
  | 爱好习惯 | 贪财/好色/杀人后超度 | 做强烈记忆点反复强调 |
  | 人际关系 | 关系网越复杂越能制造冲突 | 牵扯的重要人物个个有实力有背景 |
  | 背景 | 家族/出身/成长环境 | — |
  | 成长弧线 | 见下方三阶段 | — |
  | 对比反差 | 恶人vs好人/医生救死扶伤→扛起枪杀人 | — |
  | 价值观态度 | 不同身份地位看法不同 | 态度=行动目标 |
  | 人物小传 | 典型重要故事 | 浓缩的生平经历 |

  #### 人物成长弧线（三阶段）

  | 阶段 | 核心 | 对应 |
  |------|------|------|
  | 小我（幼年） | 虚构自己，想要成为他人眼中的我 | 动机 |
  | 自我（青年） | 真实自己，夹在两者之间痛苦 | 态度 |
  | 他我（成熟） | 别人眼中的自己就是追求的目标 | 价值观 |

  情绪公式：满足（认同）→ 打击（同情）→ 怀疑（共鸣）→ 心痛（共情）

  ### 人设关系四阶段标签

  | 阶段 | 了解程度 | 表现 |
  |------|---------|------|
  | 相遇（陌生人） | 只知道外表 | 警惕/保持距离/设防 |
  | 相识（过客） | 初步了解不知底线 | 察言观色/阿谀奉承 |
  | 相知（好哥们/闺蜜） | 知道秉性和底线 | 聊骚话/吐露心声/倾诉烦恼 |
  | 相恋（爱人） | 了解内心伤疤 | 占有欲强/喋喋不休/任劳任怨 |

  ### 用职场思维理解网文关系结构

  网文本质：在一个“职场”爽透，然后再到另一个“职场”爽。

  | 共性维度 | 说明 |
  |---------|------|
  | 层级 | 任何环境中都有上下级关系 |
  | 互助 | 同级之间的合作和互利 |
  | 互害 | 同级之间的竞争和倾轧 |

  | 差异维度 | 说明 |
  |---------|------|
  | 合作方式 | 不同环境合作模式不同 |
  | 资源类型 | 不同环境争夺的资源不同 |
  | 个体能力 | 主角的独特优势 |

  #### 执行步骤

  1. 为主角设计一个“职场环境”（学校/宗门/公司/军队）
  2. 设置层级关系（上级/同级/下级/对手）
  3. 利用层级关系自然产生矛盾和冲突
  4. 主角在这个环境中爽透后，换到更大的“职场”

  ### 代入感构建法

  - 代入感维护规则：节奏和情感链条不断裂。断裂标志=读者开始用现实逻辑评判情节
  - 一旦读者开始用现实逻辑评判 = 节奏出了问题
  - 核心是情感链条不断

  | 方法 | 做法 | 效果 |
  |------|------|------|
  | 共情切入点 | 用日常生活常见事件 | 瞬间拉近距离 |
  | 细节真实性 | 填充生活化细节 | 强化世界真实性 |
  | 救猫咪情节 | 开头一个情节强调主角人设某方面 | 读者快速熟悉并代入 |
  | 共情前提 | 让角色暴露真实一面（弱点/困境） | 读者产生保护欲 |
  | 合理化虑点 | “缺钱”这类人人都懂的困境 | 天然共情 |

  #### 共情三层次

  1. **表层共情**：经历类似
  2. **深层共情**：情感类似
  3. **认同感**：价值观一致

  #### 破坏代入感的行为（避免）

  - 角色做出读者无法理解的选择
  - 大段设定说明打断叙事
  - 节奏拖沓导致情感链条断裂
  - 主角三观与目标读者严重偏离

  ### 安全感与核心情绪把控

  1. 不同题材的读者对安全感需求不同，先确认题材
  2. 极道流等紧张感题材：安全感拉爆 = 危机感消失 = 核心情绪偏移——不要给主角找过强的靠山
  3. 禁止为主角设置可随时解决危机的强力靠山——靠山的存在必须不削弱紧迫感。违反此规则时标记为“靠山过度”
  4. 精力有限时，情节始终是第一位的，世界观只是加分项

  ## 质量检查清单

  设计完角色后，逐项检查：

  ### 主角检查

  - [ ] 动机是情感层面的（不是“要成为最强”这种空话）
  - [ ] 有致命弱点，且会在关键情节导致犯错
  - [ ] 外貌有记忆点（3-5 个关键词）
  - [ ] 有口头禅或标志动作
  - [ ] 逼格在线——不会让读者看不起
  - [ ] 没有触碰红线（圣母/无脑战斗机器/内核邪恶/因蠢犯错/自暴自弃）
  - [ ] 核心目标和全书主线对齐

  ### 配角检查

  - [ ] 有明确功能（导师/盟友/情报源/牺牲品/镜像对照）
  - [ ] 核心特质 1-2 个关键词能概括
  - [ ] 有标志性特征让读者记住
  - [ ] 退场方式已规划
  - [ ] 同一场景不超过 3 个配角有台词

  ### 反派检查

  - [ ] 按层级表设计，篇幅与层级匹配
  - [ ] 出场展示了实力或手段
  - [ ] 动机从反派视角说得通
  - [ ] 至少赢主角一次（中等反派及以上）
  - [ ] 没有降智送赢
  - [ ] 大弧Boss有理念冲突（不只是利益冲突）
  - [ ] 最终Boss从第一章就有伏笔

  ### 动机检查

  - [ ] 起因具体（不是“被欺负”这种模糊说法）
  - [ ] 约束有力（主角不能一路碾压）
  - [ ] 风险真实（读者相信主角可能失去重要东西）
  - [ ] 动机演变有铺垫，没有说变就变

  ### 塑造检查

  - [ ] 角色目的通过行为展示，不是旁白解释
  - [ ] 行为/语言/思维围绕人设展开，没有为剧情改人设
  - [ ] 主要角色有行为重复点，维持长篇一致性
  - [ ] 配角与主角有明确联系，不会抢主角风头
  - [ ] 人物真相/价值取向在关键抉择时自然暴露

  ### 综合检查

  - [ ] 角色是否有三层标签（身份/表现/内核），且至少有一层反差
  - [ ] 强关联设定是否达到 3 个以上
  - [ ] 人设是功能性设计还是只有外貌信息堆砌
  - [ ] 配角是否有明确功能，是否抢了主角风头
  - [ ] 每个角色是否有至少一个记忆点
  - [ ] 配角出场是否都有功能，没有无用水分
  - [ ] 不同角色是否有不同的说话风格和行为特征
  - [ ] 主角的错误是否在可原谅范围内
  - [ ] 反派是否有自己的逻辑和追求，不是纯粹的恶
  - [ ] 人设言行是否前后一致，有没有崩人设
  - [ ] 代入感情感链条是否连续，有没有被设定说明打断
  - [ ] 安全感是否匹配题材要求（紧张题材不能给主角太强靠山）
  - [ ] 高情商桥段是否通过具体剧情展现，而非旁白夸赞

references:
  - name: 角色设计完整检查表
    content: |
      - [ ] 动机是情感层面的，不是“要成为最强”这种空话。
      - [ ] 起因具体，约束有力，风险真实，动机演变有铺垫。
      - [ ] 有致命弱点，且会在关键情节导致犯错。
      - [ ] 外貌有 3-5 个记忆关键词，有口头禅或标志动作。
      - [ ] 有身份、表现、内核三层标签，至少有一层反差。
      - [ ] 强关联设定至少 3 个，弱关联不会喧宾夺主。
      - [ ] 目的通过行为展示，行为、语言、思维没有违背人设。
      - [ ] 配角有明确功能、行动、标志和退场方式，不抢主角高光。
      - [ ] 反派展示实力，动机自洽，至少赢主角一次且没有降智送赢。
      - [ ] 主角拥有不可替代的决定、承担和核心收益。
      - [ ] 角色目标属于自己，不是沦为他人的工具人。
      - [ ] 成长有事件和选择，前后身份、能力、关系和行为一致。
  - name: 主角反派与展示规则
    content: |
      - 角色目的、行动和态度优先通过行为、决定、对话和反应展示。
      - 反派要有自己的梦想、创伤、缺陷和信念；障碍应来自其人设和目的。
      - 关键行为不合人设时，先补角色层面的合理动机或调整剧情。
      - 不为所有角色强行立体化：功能角色可保持扁平和神秘。
      - 不让强力靠山随时解决危机；安全感必须符合题材的核心情绪。
