appId: com.openfic.app
productName: OpenFic

directories:
  output: dist-electron

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../frontend/dist
    to: frontend-dist
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: OpenFic-${version}-win-setup.${ext}

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  identity: null
