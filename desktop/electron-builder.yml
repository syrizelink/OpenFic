appId: com.openfic.app
productName: OpenFic

directories:
  output: dist-electron

publish:
  provider: github
  owner: syrizelink
  repo: OpenFic
  releaseType: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../frontend/dist
    to: frontend-dist
    filter:
      - "**/*"
  - from: resources/app-update.yml
    to: app-update.yml

win:
  artifactName: OpenFic-${version}-win-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: OpenFic-${version}-win-${arch}-setup.${ext}

mac:
  artifactName: OpenFic-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  identity: null

linux:
  artifactName: OpenFic-${version}-linux-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
  category: Utility
