name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please 创建/更新 release PR 后，立即用 PAT squash 合并。
      # 私有免费仓库无法启用 "Allow auto-merge"，故不走 enable-automerge，
      # 改为直接合并（普通合并路径，不依赖 auto-merge 设置）。
      # release PR 仅含版本号 bump + CHANGELOG，无代码逻辑，立即合并安全。
      # 用 PAT 合并，确保该 push 能触发下一次 release-please 运行去打 tag。
      # steps.release.outputs.pr 是 JSON 字符串，需用 jq 提取 number 字段。
      # --delete-branch 需本地 git 仓库，故合并前先 checkout。
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr }}
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/setup-python@v6
        if: ${{ steps.release.outputs.pr }}
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
        if: ${{ steps.release.outputs.pr }}
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: 同步 backend uv.lock
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')

          git fetch origin "$PR_HEAD_REF:$PR_HEAD_REF"
          git checkout "$PR_HEAD_REF"

          pushd backend
          uv lock
          popd

          if git diff --quiet -- backend/uv.lock; then
            echo "backend/uv.lock 无需更新"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/uv.lock
          git commit -m "chore(backend): 同步 uv.lock 版本"
          git push origin HEAD:"$PR_HEAD_REF"
      - name: 合并 release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')

          # GitHub may briefly report a newly created or updated PR as not mergeable
          # before its mergeability computation finishes. Wait until the state settles.
          for attempt in {1..18}; do
            MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable -q '.mergeable')
            MERGE_STATE=$(gh pr view "$PR_NUMBER" --json mergeStateStatus -q '.mergeStateStatus')

            echo "Attempt $attempt: mergeable=$MERGEABLE mergeStateStatus=$MERGE_STATE"

            if [[ "$MERGEABLE" == "MERGEABLE" && "$MERGE_STATE" == "CLEAN" ]]; then
              break
            fi

            if [[ "$MERGEABLE" == "CONFLICTING" || "$MERGE_STATE" == "DIRTY" ]]; then
              echo "Release PR has merge conflicts and cannot be auto-merged"
              exit 1
            fi

            sleep 10
          done

          FINAL_MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable -q '.mergeable')
          FINAL_MERGE_STATE=$(gh pr view "$PR_NUMBER" --json mergeStateStatus -q '.mergeStateStatus')

          if [[ "$FINAL_MERGEABLE" != "MERGEABLE" || "$FINAL_MERGE_STATE" != "CLEAN" ]]; then
            echo "Release PR is still not ready to merge: mergeable=$FINAL_MERGEABLE mergeStateStatus=$FINAL_MERGE_STATE"
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch
