name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  PNPM_VERSION: '11.8.0'

jobs:
  # ---------------------------------------------------------------- context
  context:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
      - id: meta
        run: |
          VERSION=$(python3 -c "import tomllib;print(tomllib.loads(open('backend/pyproject.toml','rb').read().decode())['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- test gate
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Type check
        working-directory: frontend
        run: pnpm type-check

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: 安装依赖
        working-directory: backend
        run: uv sync --frozen
      - name: Ruff
        working-directory: backend
        run: uv run ruff check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy app
      - name: Pytest
        working-directory: backend
        run: uv run pytest -q

  # ---------------------------------------------------------------- frontend
  build-frontend:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install & build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  # ---------------------------------------------------------------- preflight
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 校验关键原生依赖存在 aarch64 wheel
        run: |
          python3 - <<'PY'
          import json, urllib.request, sys
          pkgs = ["lancedb", "onnxruntime"]
          missing = []
          for pkg in pkgs:
              data = json.loads(urllib.request.urlopen(f"https://pypi.org/pypi/{pkg}/json").read())
              latest = data["info"]["version"]
              has_arm = any("aarch64" in f["filename"] for f in data["releases"].get(latest, []))
              print(f"{pkg} {latest}: linux aarch64 = {has_arm}")
              if not has_arm:
                  missing.append(pkg)
          if missing:
              print(f"缺少 aarch64 wheel: {missing}", file=sys.stderr)
              sys.exit(1)
          print("预检通过")
          PY

  # ---------------------------------------------------------------- docker
  docker:
    needs: [context, preflight, test-frontend, test-backend]
    runs-on: ubuntu-latest
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tags
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/openfic
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          VER="${{ needs.context.outputs.version }}"
          MAJOR_MINOR=$(echo "$VER" | cut -d. -f1,2)
          echo "tags=${IMAGE}:latest,${IMAGE}:${VER},${IMAGE}:${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------- desktop
  desktop:
    needs: [context, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            electron_args: ''
            artifact_name: desktop-win-x64
          - os: macos-14
            electron_args: '--arm64'
            artifact_name: desktop-mac-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - name: 放入前端产物到包内
        run: |
          mkdir -p backend/app/frontend_dist
          cp -r frontend/dist/. backend/app/frontend_dist/
        shell: bash

      # 版本号已由 release-please 写入 frontend/package.json，无需手动同步
      # 后端 PyInstaller 打包
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: 安装后端依赖并打包
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pyinstaller packaging/openfic.spec --noconfirm

      # Electron 安装包
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: 安装前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: 构建 Electron 安装包
        working-directory: frontend
        run: pnpm exec electron-builder --config electron/electron-builder.yml ${{ matrix.electron_args }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-electron/*

  # ---------------------------------------------------------------- release
  publish-release:
    needs: [context, desktop]
    if: always() && needs.desktop.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: assets
      - name: 列出产物
        run: |
          mkdir -p assets
          find assets -type f -print
      # release-please 已创建 Release（含 changelog body），此处仅追加构建产物
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.context.outputs.release_tag }}
          files: assets/*
