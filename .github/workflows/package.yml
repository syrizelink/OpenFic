name: Package

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  PNPM_VERSION: '11.8.0'
  UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

jobs:
  # ---------------------------------------------------------------- context
  context:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image: ${{ steps.meta.outputs.image }}
      major_minor: ${{ steps.meta.outputs.major_minor }}
    steps:
      - id: meta
        run: |
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${RELEASE_TAG#v}
          IMAGE=ghcr.io/${{ github.repository_owner }}/openfic
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- frontend
  build-frontend:
    needs: [context]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 配置 pnpm store
        run: pnpm config set store-dir "${{ github.workspace }}/.pnpm-store"
      - uses: actions/cache/restore@v5
        id: pnpm-cache
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-frontend-
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-
      - name: 构建前端产物
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          OPENFIC_BUILD_VERSION=${{ needs.context.outputs.version }} pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
      - uses: actions/cache/save@v5
        if: ${{ steps.pnpm-cache.outputs.cache-hit != 'true' }}
        with:
          path: .pnpm-store
          key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}

  # ---------------------------------------------------------------- pypi
  pypi:
    needs: [context, build-frontend]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 配置 pnpm store
        run: pnpm config set store-dir "${{ github.workspace }}/.pnpm-store"
      - uses: actions/cache/restore@v5
        id: pnpm-cache
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-frontend-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-frontend-
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: 生成 uv 缓存 key lock
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("backend/uv.lock")
          target = Path("backend/.uv-cache-key.lock")
          lines = source.read_text(encoding="utf-8").splitlines()
          normalized: list[str] = []
          is_openfic_package = False

          for line in lines:
              if line == "[[package]]":
                  is_openfic_package = False
              elif line == 'name = "openfic"':
                  is_openfic_package = True

              if is_openfic_package and line.startswith("version = "):
                  continue

              normalized.append(line)

          target.write_text("\n".join(normalized) + "\n", encoding="utf-8")
          PY
      - uses: actions/cache/restore@v5
        id: uv-cache
        with:
          path: .uv-cache
          key: ${{ runner.os }}-${{ runner.arch }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/.uv-cache-key.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-uv-${{ env.PYTHON_VERSION }}-
      - name: 构建后端 Python 包
        working-directory: backend
        run: uv build
      - uses: actions/cache/save@v5
        if: ${{ steps.pnpm-cache.outputs.cache-hit != 'true' }}
        with:
          path: .pnpm-store
          key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}
      - uses: actions/cache/save@v5
        if: ${{ steps.uv-cache.outputs.cache-hit != 'true' }}
        with:
          path: .uv-cache
          key: ${{ steps.uv-cache.outputs.cache-primary-key }}
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist

  # ---------------------------------------------------------------- docker
  docker:
    needs: [context]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tags
        run: |
          IMAGE=${{ needs.context.outputs.image }}
          VERSION=${{ needs.context.outputs.version }}
          MAJOR_MINOR=${{ needs.context.outputs.major_minor }}
          SUFFIX=${{ matrix.suffix }}

          echo "tags=${IMAGE}:latest-${SUFFIX},${IMAGE}:${VERSION}-${SUFFIX},${IMAGE}:${MAJOR_MINOR}-${SUFFIX}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=docker-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.suffix }}

  docker-manifest:
    needs: [context, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 发布多架构 Docker 标签
        run: |
          IMAGE=${{ needs.context.outputs.image }}
          VERSION=${{ needs.context.outputs.version }}
          MAJOR_MINOR=${{ needs.context.outputs.major_minor }}

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          docker buildx imagetools create \
            -t "${IMAGE}:${MAJOR_MINOR}" \
            "${IMAGE}:${MAJOR_MINOR}-amd64" \
            "${IMAGE}:${MAJOR_MINOR}-arm64"

  # ---------------------------------------------------------------- desktop
  desktop:
    needs: [context, build-frontend, pypi]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            electron_args: '--win --x64'
            publish: always
            artifact_name: desktop-win-x64
          - os: ubuntu-latest
            electron_args: '--linux --x64'
            publish: never
            artifact_name: desktop-linux-x64
          - os: ubuntu-24.04-arm
            electron_args: '--linux --arm64'
            publish: never
            artifact_name: desktop-linux-arm64
          - os: macos-14
            electron_args: '--mac --arm64'
            publish: never
            artifact_name: desktop-mac-arm64
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 配置 pnpm store
        run: pnpm config set store-dir "${{ github.workspace }}/.pnpm-store"
      - uses: actions/cache/restore@v5
        id: pnpm-cache
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-desktop-${{ hashFiles('desktop/pnpm-lock.yaml', 'frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-desktop-
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-frontend-
            ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ env.PNPM_VERSION }}-
      - uses: actions/cache/restore@v5
        id: electron-cache
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('desktop/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-electron-
      - name: 安装前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: 安装桌面端依赖
        working-directory: desktop
        run: pnpm install --frozen-lockfile
      - name: 构建桌面端
        working-directory: desktop
        run: pnpm build
      - name: 构建 Electron 安装包
        working-directory: desktop
        run: pnpm exec electron-builder --config electron-builder.yml ${{ matrix.electron_args }} --publish ${{ matrix.publish }}

      - uses: actions/upload-artifact@v7
        if: ${{ matrix.publish == 'never' }}
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            desktop/dist-electron/*.exe
            desktop/dist-electron/*.AppImage
            desktop/dist-electron/*.tar.gz
            desktop/dist-electron/*.zip
            desktop/dist-electron/*.dmg
      - uses: actions/cache/save@v5
        if: ${{ steps.pnpm-cache.outputs.cache-hit != 'true' }}
        with:
          path: .pnpm-store
          key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}
      - uses: actions/cache/save@v5
        if: ${{ steps.electron-cache.outputs.cache-hit != 'true' }}
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: ${{ steps.electron-cache.outputs.cache-primary-key }}

  # ---------------------------------------------------------------- release
  publish-release:
    needs: [context, desktop]
    if: always() && needs.desktop.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: assets
      - name: 列出产物
        run: |
          mkdir -p assets
          find assets -type f -print
      # release-please 已创建 Release（含 changelog body），此处仅追加构建产物
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.context.outputs.release_tag }}
          files: assets/*
